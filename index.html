<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İhlas Pazarlama - Antalya Tatili Takibi</title>
    
    <!-- Tailwind CSS (Tasarım için) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (İkonlar için) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- React ve ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (React JSX kodunu tarayıcının anlaması için çevirici) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Uçak Animasyonu için Özel CSS */
        @keyframes flightAnimation {
            0% {
                left: -20%;
                bottom: 10%;
                transform: rotate(15deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                left: 120%;
                bottom: 80%;
                transform: rotate(25deg) scale(1.5);
                opacity: 0;
            }
        }

        .airplane-flyby {
            position: fixed;
            z-index: 9999;
            pointer-events: none; /* Uçak geçerken altındaki tıklamaları engellemesin */
            animation: flightAnimation 2.5s ease-in-out forwards;
            color: #0284c7; /* Tailwind blue-600 */
            filter: drop-shadow(0 20px 13px rgba(0, 0, 0, 0.3));
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Para formatı için yardımcı fonksiyon
        const formatTL = (amount) => {
          return new Intl.NumberFormat('tr-TR', { maximumFractionDigits: 0 }).format(amount) + ' ₺';
        };

        // Tarih formatı için yardımcı fonksiyon (Çökme korumalı)
        const formatDate = (dateString) => {
          if (!dateString) return '-';
          const date = new Date(dateString);
          if (isNaN(date.getTime())) return '-';
          return date.toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        };

        function App() {
          // Tab State
          const [activeTab, setActiveTab] = useState('dashboard');
          
          // Uçak Animasyon State
          const [isFlying, setIsFlying] = useState(false);

          // Dinamik Aylar State'i
          const [months, setMonths] = useState([
            { id: 'm1', name: 'Ocak' },
            { id: 'm2', name: 'Şubat' },
            { id: 'm3', name: 'Mart' }
          ]);
          const [newMonthName, setNewMonthName] = useState('');

          // Hedefler ve Milat Tarihi
          const [targetOld, setTargetOld] = useState(1200000);
          const [targetNew, setTargetNew] = useState(800000);
          const [cutoffDate, setCutoffDate] = useState('2026-01-01');

          // Örnek Veriler (Satışlar artık sales objesi içinde dinamik tutuluyor)
          const [employees, setEmployees] = useState([
            { id: 1, office: 'MERKEZ OFİS', name: 'ESKİ PERSONEL 1', entryDate: '2024-05-15', sales: { m1: 900000, m2: 350000, m3: 0 }, returns: 0 },
            { id: 2, office: 'ŞUBE OFİS', name: 'ESKİ PERSONEL 2', entryDate: '2025-11-20', sales: { m1: 600000, m2: 400000, m3: 100000 }, returns: 50000 },
            { id: 3, office: 'MERKEZ OFİS', name: 'YENİ PERSONEL 1', entryDate: '2026-02-01', sales: { m1: 500000, m2: 300000, m3: 0 }, returns: 0 },
            { id: 4, office: 'ŞUBE OFİS', name: 'YENİ PERSONEL 2', entryDate: '2026-03-10', sales: { m1: 400000, m2: 200000, m3: 50000 }, returns: 10000 },
          ]);

          // Yeni Personel Formu State'leri
          const [formData, setFormData] = useState({
            name: '', office: '', entryDate: '', sales: {}, returns: ''
          });
          
          const [editingId, setEditingId] = useState(null);
          const [deletingId, setDeletingId] = useState(null);
          const [formError, setFormError] = useState('');

          // Tab Değiştirme ve Uçak Animasyonu Yönetimi
          const handleTabChange = (tabName) => {
            if (tabName === 'reports' && activeTab !== 'reports') {
              setIsFlying(true);
              // Animasyon süresi bitince uçağı kaldır (2.5 saniye)
              setTimeout(() => setIsFlying(false), 2500); 
            }
            setActiveTab(tabName);
          };

          // Ay Ekleme / Silme İşlemleri
          const handleAddMonth = () => {
            if (!newMonthName.trim()) return;
            const newId = 'm' + Date.now();
            setMonths([...months, { id: newId, name: newMonthName.trim() }]);
            setNewMonthName('');
          };

          const handleRemoveMonth = (idToRemove) => {
            setMonths(months.filter(m => m.id !== idToRemove));
          };

          const isNewEmployee = (dateStr) => {
            if (!dateStr || !cutoffDate) return false;
            const empDate = new Date(dateStr);
            const cutDate = new Date(cutoffDate);
            if (isNaN(empDate.getTime()) || isNaN(cutDate.getTime())) return false;
            return empDate >= cutDate;
          };

          // Veri İşleme Fonksiyonu (Dinamik Aylara Göre Toplam Alma)
          const processData = (isNewType) => {
            return employees
              .filter(emp => isNewEmployee(emp.entryDate) === isNewType)
              .map(emp => {
                // Sadece aktif ayların satışlarını topla
                const totalSales = months.reduce((sum, m) => sum + (Number(emp.sales[m.id]) || 0), 0);
                const netRevenue = totalSales - (Number(emp.returns) || 0);
                const currentTarget = Number(isNewType ? targetNew : targetOld) || 0;
                const remaining = currentTarget - netRevenue;
                let percentage = currentTarget > 0 ? (netRevenue / currentTarget) * 100 : 0;
                if (isNaN(percentage) || percentage < 0) percentage = 0;

                return {
                  ...emp, target: currentTarget, netRevenue, remaining: remaining > 0 ? remaining : 0, percentage, isWinner: currentTarget > 0 && netRevenue >= currentTarget
                };
              }).sort((a, b) => b.percentage - a.percentage);
          };

          const processedOldData = useMemo(() => processData(false), [employees, targetOld, cutoffDate, months]);
          const processedNewData = useMemo(() => processData(true), [employees, targetNew, cutoffDate, months]);

          const handleInputChange = (e) => {
            const { name, value } = e.target;
            setFormData(prev => ({ ...prev, [name]: value }));
            if (formError) setFormError('');
          };

          const handleSalesChange = (monthId, value) => {
            setFormData(prev => ({
              ...prev,
              sales: { ...prev.sales, [monthId]: value }
            }));
          };

          const handleEdit = (employee) => {
            setFormData({
              name: employee.name, office: employee.office, entryDate: employee.entryDate || '',
              sales: { ...employee.sales }, returns: employee.returns || ''
            });
            setEditingId(employee.id);
            setFormError('');
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const handleCancelEdit = () => {
            setFormData({ name: '', office: '', entryDate: '', sales: {}, returns: '' });
            setEditingId(null);
            setFormError('');
          };

          const handleFormSubmit = (e) => {
            e.preventDefault();
            if (!formData.name || !formData.office || !formData.entryDate) {
              setFormError("Lütfen personel adı, ofis ve işe giriş tarihi bilgilerini eksiksiz doldurunuz.");
              setTimeout(() => setFormError(''), 4000);
              return;
            }

            // Sales objesini temizle ve sayıya çevir
            const cleanSales = {};
            months.forEach(m => { cleanSales[m.id] = Number(formData.sales[m.id]) || 0; });

            if (editingId) {
              setEmployees(prev => prev.map(emp => emp.id === editingId ? {
                ...emp,
                office: formData.office.toUpperCase(), name: formData.name.toUpperCase(), entryDate: formData.entryDate,
                sales: cleanSales, returns: Number(formData.returns) || 0,
              } : emp));
              setEditingId(null);
            } else {
              const newEmp = {
                id: Date.now(),
                office: formData.office.toUpperCase(), name: formData.name.toUpperCase(), entryDate: formData.entryDate,
                sales: cleanSales, returns: Number(formData.returns) || 0,
              };
              setEmployees(prev => [...prev, newEmp]);
            }
            setFormData({ name: '', office: '', entryDate: '', sales: {}, returns: '' });
            setFormError('');
          };

          const handleDeleteClick = (id) => setDeletingId(id);
          const confirmDelete = () => {
            if (deletingId) {
              setEmployees(prev => prev.filter(emp => emp.id !== deletingId));
              setDeletingId(null);
            }
          };

          const totalWinners = processedOldData.filter(e => e.isWinner).length + processedNewData.filter(e => e.isWinner).length;

          const generateWhatsAppText = () => {
            let text = `🏆 *İHLAS PAZARLAMA - ANTALYA TATİLİ RAPORU* 🏆\n\n`;
            text += `📊 *Genel Özet*\n👥 Toplam Personel: ${employees.length}\n🎉 Toplam Kazanan: ${totalWinners}\n\n`;

            const oldWinners = processedOldData.filter(e => e.isWinner);
            if (oldWinners.length > 0) {
              text += `🌟 *ESKİ PERSONEL KAZANANLAR*\n`;
              oldWinners.forEach((e, i) => { text += `${i + 1}. ${e.name} (${e.office}) - %${e.percentage.toFixed(0)}\n`; });
              text += `\n`;
            }

            const newWinners = processedNewData.filter(e => e.isWinner);
            if (newWinners.length > 0) {
              text += `🌟 *YENİ PERSONEL KAZANANLAR*\n`;
              newWinners.forEach((e, i) => { text += `${i + 1}. ${e.name} (${e.office}) - %${e.percentage.toFixed(0)}\n`; });
              text += `\n`;
            }
            return text;
          };

          const handleWhatsAppShare = () => {
            const text = generateWhatsAppText();
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
          };

          const handlePrintPDF = () => window.print();

          return (
            <div 
              className="min-h-screen print:bg-white text-slate-800 font-sans pb-20 relative bg-cover bg-center bg-fixed"
              style={{ backgroundImage: "url('https://images.unsplash.com/photo-1506929562872-bb421503ef21?q=80&w=2068&auto=format&fit=crop')" }}
            >
              {/* Arka plan görselinin çok göz yormaması için yarı saydam ve hafif bulanık bir katman (Overlay) */}
              <div className="absolute inset-0 bg-slate-100/70 backdrop-blur-[6px] -z-10 print:hidden"></div>
              
              {/* Uçak Animasyonu Katmanı */}
              {isFlying && (
                <div className="airplane-flyby">
                  <i className="fa-solid fa-plane text-8xl"></i>
                </div>
              )}

              <div className="bg-white/85 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40 print:hidden shadow-sm">
                <div className="max-w-7xl mx-auto px-4 md:px-8 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                  <div className="flex items-center gap-3">
                    <div className="bg-yellow-100 p-2 rounded-lg text-yellow-600">
                      <i className="fa-solid fa-trophy text-xl"></i>
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-slate-900 leading-tight">İhlas Pazarlama</h1>
                      <p className="text-xs text-slate-500">Antalya Tatili Takip Sistemi</p>
                    </div>
                  </div>
                  
                  <div className="flex bg-slate-100 p-1 rounded-lg">
                    <button onClick={() => handleTabChange('dashboard')} className={`flex items-center gap-2 px-6 py-2.5 rounded-md font-medium text-sm transition-all ${activeTab === 'dashboard' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-600 hover:text-slate-900'}`}>
                      <i className="fa-solid fa-table-columns text-base"></i> Ana Sayfa
                    </button>
                    <button onClick={() => handleTabChange('reports')} className={`flex items-center gap-2 px-6 py-2.5 rounded-md font-medium text-sm transition-all ${activeTab === 'reports' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-600 hover:text-slate-900'}`}>
                      <i className="fa-solid fa-plane-departure text-base"></i> Raporlar
                    </button>
                  </div>
                </div>
              </div>

              <div className="p-4 md:p-8">
                {activeTab === 'dashboard' && (
                  <div className="max-w-7xl mx-auto print:hidden">
                    <div className="flex flex-wrap gap-4 mb-6">
                      <div className="bg-white px-5 py-3 rounded-xl shadow-sm border border-slate-200 flex items-center gap-4 min-w-[200px]">
                        <div className="p-3 bg-blue-50 text-blue-600 rounded-lg">
                          <i className="fa-solid fa-users text-xl"></i>
                        </div>
                        <div>
                          <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-0.5">Toplam Personel</p>
                          <p className="text-2xl font-black text-slate-800">{employees.length}</p>
                        </div>
                      </div>
                      <div className="bg-white px-5 py-3 rounded-xl shadow-sm border border-slate-200 flex items-center gap-4 min-w-[200px]">
                        <div className="p-3 bg-green-50 text-green-600 rounded-lg">
                          <i className="fa-solid fa-trophy text-xl"></i>
                        </div>
                        <div>
                          <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-0.5">Toplam Kazanan</p>
                          <p className="text-2xl font-black text-slate-800">{totalWinners}</p>
                        </div>
                      </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-8">
                      {/* Sol Panel: Ayarlar */}
                      <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 lg:col-span-1 flex flex-col gap-5">
                        
                        <div>
                          <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2 text-blue-500">
                            <i className="fa-solid fa-bullseye text-lg"></i> <span className="text-slate-800">Kampanya Ayarları</span>
                          </h2>
                          <div className="space-y-4">
                            <div>
                              <label className="block text-sm font-semibold text-slate-600 mb-1">Eski Personel Hedefi (TL)</label>
                              <div className="relative">
                                <input type="number" value={targetOld === 0 ? '' : targetOld} onChange={(e) => setTargetOld(Number(e.target.value))} className="w-full pl-3 pr-10 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all font-medium text-sm" />
                                <span className="absolute right-3 top-2 text-slate-400 font-bold">₺</span>
                              </div>
                            </div>
                            <div>
                              <label className="block text-sm font-semibold text-slate-600 mb-1">Yeni Personel Hedefi (TL)</label>
                              <div className="relative">
                                <input type="number" value={targetNew === 0 ? '' : targetNew} onChange={(e) => setTargetNew(Number(e.target.value))} className="w-full pl-3 pr-10 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all font-medium text-sm" />
                                <span className="absolute right-3 top-2 text-slate-400 font-bold">₺</span>
                              </div>
                            </div>
                            <div className="pt-3 border-t border-slate-100">
                              <label className="block text-sm font-semibold text-slate-600 mb-1 flex items-center gap-1 text-orange-500">
                                <i className="fa-solid fa-calendar-days text-sm"></i> <span className="text-slate-600">Yeni Personel Miladı</span>
                              </label>
                              <input type="date" value={cutoffDate} onChange={(e) => setCutoffDate(e.target.value)} className="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none transition-all font-medium text-sm" />
                            </div>
                          </div>
                        </div>

                        {/* Dinamik Aylar Yönetimi */}
                        <div className="pt-4 border-t border-slate-100">
                          <label className="block text-sm font-semibold text-slate-600 mb-3 flex items-center gap-1 text-indigo-500">
                            <i className="fa-solid fa-calendar-check text-sm"></i> <span className="text-slate-600">Aktif Aylar</span>
                          </label>
                          <div className="flex flex-wrap gap-2 mb-3">
                            {months.map(m => (
                              <span key={m.id} className="bg-indigo-50 text-indigo-700 px-2 py-1 rounded text-xs font-bold flex items-center gap-1.5 border border-indigo-100">
                                {m.name}
                                <button type="button" onClick={() => handleRemoveMonth(m.id)} className="text-indigo-400 hover:text-red-500 bg-white rounded-full w-4 h-4 flex items-center justify-center shadow-sm">
                                  <i className="fa-solid fa-xmark text-[10px]"></i>
                                </button>
                              </span>
                            ))}
                            {months.length === 0 && <span className="text-xs text-red-500 font-bold">Lütfen en az bir ay ekleyin!</span>}
                          </div>
                          <div className="flex gap-2">
                            <input 
                              type="text" 
                              value={newMonthName} 
                              onChange={e => setNewMonthName(e.target.value)} 
                              onKeyPress={e => e.key === 'Enter' && handleAddMonth()}
                              placeholder="Örn: Nisan" 
                              className="w-full px-2.5 py-1.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm" 
                            />
                            <button onClick={handleAddMonth} className="bg-indigo-600 text-white px-3 py-1.5 rounded-lg hover:bg-indigo-700 font-bold shadow-sm transition-colors">
                              <i className="fa-solid fa-plus"></i>
                            </button>
                          </div>
                        </div>

                      </div>

                      {/* Sağ Panel: Form */}
                      <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 lg:col-span-3 relative overflow-hidden">
                        {editingId && <div className="absolute top-0 left-0 w-full h-1 bg-blue-500"></div>}
                        <h2 className={`text-lg font-bold text-slate-800 mb-4 flex items-center gap-2 ${editingId ? 'text-blue-500' : 'text-green-500'}`}>
                          {editingId ? <i className="fa-solid fa-pen-to-square text-lg"></i> : <i className="fa-solid fa-plus text-lg"></i>}
                          <span className="text-slate-800">{editingId ? 'Personel Bilgilerini Düzenle' : 'Yeni Personel / Veri Girişi'}</span>
                        </h2>
                        
                        {formError && (
                          <div className="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg flex items-center gap-2 text-sm font-bold animate-pulse">
                            <i className="fa-solid fa-circle-exclamation text-lg shrink-0"></i> {formError}
                          </div>
                        )}

                        <form onSubmit={handleFormSubmit} className="grid grid-cols-1 md:grid-cols-12 gap-4">
                          <div className="md:col-span-4">
                            <label className="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wide">Ad Soyad</label>
                            <input name="name" value={formData.name} onChange={handleInputChange} type="text" placeholder="Örn: Ahmet Yılmaz" className="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                          </div>
                          <div className="md:col-span-4">
                            <label className="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wide">Ofis</label>
                            <input name="office" value={formData.office} onChange={handleInputChange} type="text" placeholder="Örn: Yıldız Ofis" className="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                          </div>
                          <div className="md:col-span-4">
                            <label className="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wide flex items-center gap-1"><i className="fa-solid fa-calendar-days text-sm"></i> Giriş Tarihi</label>
                            <input type="date" name="entryDate" value={formData.entryDate} onChange={handleInputChange} className="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-medium" />
                          </div>
                          
                          {/* Dinamik Satış Giriş Alanları */}
                          <div className="md:col-span-12 mt-2 pt-4 border-t border-slate-100">
                             <label className="block text-xs font-bold text-slate-400 mb-3 uppercase tracking-wide">Aylık Satış Girişleri</label>
                             <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                               {months.map(m => (
                                 <div key={m.id}>
                                   <label className="block text-[11px] font-bold text-slate-600 mb-1">{m.name} Satış (TL)</label>
                                   <input 
                                     type="number" 
                                     value={formData.sales[m.id] || ''} 
                                     onChange={(e) => handleSalesChange(m.id, e.target.value)} 
                                     placeholder="0" 
                                     className="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" 
                                   />
                                 </div>
                               ))}
                               {months.length === 0 && <p className="text-sm text-slate-400 italic">Lütfen ayarlardan ay ekleyin.</p>}
                             </div>
                          </div>

                          <div className="md:col-span-12 border-t border-slate-100 pt-4 flex flex-col md:flex-row items-end justify-between gap-4">
                            <div className="w-full md:w-1/4">
                              <label className="block text-xs font-bold text-red-500 mb-1 uppercase tracking-wide">Toplam İade (TL)</label>
                              <input name="returns" value={formData.returns} onChange={handleInputChange} type="number" placeholder="0" className="w-full px-3 py-2 bg-red-50 border border-red-200 rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-red-700 font-bold" />
                            </div>
                            <div className="flex gap-2">
                              {editingId && (
                                <button type="button" onClick={handleCancelEdit} className="bg-slate-200 hover:bg-slate-300 text-slate-800 px-6 py-2 rounded-lg font-bold transition-colors flex items-center gap-2">
                                  <i className="fa-solid fa-xmark text-base"></i> İptal
                                </button>
                              )}
                              <button type="submit" disabled={months.length === 0} className={`text-white px-6 py-2 rounded-lg font-bold transition-colors flex items-center gap-2 shadow-md ${months.length === 0 ? 'bg-slate-400 cursor-not-allowed' : (editingId ? 'bg-blue-600 hover:bg-blue-700' : 'bg-slate-900 hover:bg-slate-800')}`}>
                                {editingId ? <i className="fa-solid fa-pen-to-square text-base"></i> : <i className="fa-solid fa-plus text-base"></i>}
                                {editingId ? 'Güncelle' : 'Listeye Ekle'}
                              </button>
                            </div>
                          </div>
                        </form>
                      </div>
                    </div>

                    <div className="space-y-8">
                      <EmployeeTable 
                        title="Eski Personeller Tablosu" 
                        icon={<i className="fa-solid fa-briefcase text-purple-600 text-lg"></i>}
                        data={processedOldData} months={months} onEdit={handleEdit} onDelete={handleDeleteClick}
                        badgeClass="bg-purple-100 text-purple-800 border-purple-200" typeLabel="Eski"
                      />
                      <EmployeeTable 
                        title="Yeni Personeller Tablosu" 
                        icon={<i className="fa-solid fa-user-plus text-orange-600 text-lg"></i>}
                        data={processedNewData} months={months} onEdit={handleEdit} onDelete={handleDeleteClick}
                        badgeClass="bg-orange-100 text-orange-800 border-orange-200" typeLabel="Yeni"
                      />
                    </div>
                  </div>
                )}

                {activeTab === 'reports' && (
                  <div className="max-w-4xl mx-auto">
                    <div className="flex flex-wrap justify-end gap-3 mb-6 print:hidden">
                      <button onClick={handleWhatsAppShare} className="bg-green-500 hover:bg-green-600 text-white px-5 py-2.5 rounded-lg font-bold transition-colors shadow-sm flex items-center gap-2">
                        <i className="fa-brands fa-whatsapp text-lg"></i> WhatsApp'ta Paylaş
                      </button>
                      <button onClick={handlePrintPDF} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-bold transition-colors shadow-sm flex items-center gap-2">
                        <i className="fa-solid fa-download text-lg"></i> PDF Olarak İndir / Yazdır
                      </button>
                    </div>

                    <div className="bg-white p-8 md:p-12 rounded-xl shadow-lg border border-slate-200 print:shadow-none print:border-none print:p-0">
                      <div className="text-center mb-10 pb-6 border-b-2 border-slate-100">
                        <div className="flex justify-center mb-4 text-yellow-500 drop-shadow-md">
                          <i className="fa-solid fa-trophy text-5xl"></i>
                        </div>
                        <h1 className="text-3xl font-black text-slate-900 uppercase tracking-tight mb-2">İhlas Pazarlama - Antalya Tatili</h1>
                        <h2 className="text-xl font-bold text-slate-600">Kazananlar Raporu</h2>
                        <p className="text-slate-400 mt-2 text-sm font-medium">Oluşturulma Tarihi: {new Date().toLocaleDateString('tr-TR')}</p>
                      </div>

                      <div className="flex justify-center gap-8 mb-12">
                        <div className="text-center px-8 py-4 bg-slate-50 rounded-2xl border border-slate-100">
                          <p className="text-sm font-bold text-slate-500 uppercase tracking-widest mb-1">Toplam Personel</p>
                          <p className="text-4xl font-black text-slate-800">{employees.length}</p>
                        </div>
                        <div className="text-center px-8 py-4 bg-green-50 rounded-2xl border border-green-100">
                          <p className="text-sm font-bold text-green-600 uppercase tracking-widest mb-1">Hedefe Ulaşan</p>
                          <p className="text-4xl font-black text-green-700">{totalWinners}</p>
                        </div>
                      </div>

                      <ReportListSection title="Eski Personel Kazananları" data={processedOldData.filter(e => e.isWinner)} target={targetOld} colorClass="text-purple-700 border-purple-200" bgClass="bg-purple-50" />
                      <div className="mt-8">
                        <ReportListSection title="Yeni Personel Kazananları" data={processedNewData.filter(e => e.isWinner)} target={targetNew} colorClass="text-orange-700 border-orange-200" bgClass="bg-orange-50" />
                      </div>

                      <div className="mt-16 pt-6 border-t border-slate-100 text-center text-sm font-medium text-slate-400">
                        Bu rapor sistem tarafından otomatik olarak oluşturulmuştur. <br/>Tüm kazanan çalışma arkadaşlarımızı tebrik ederiz.
                      </div>
                    </div>
                  </div>
                )}
              </div>

              {deletingId && (
                <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center p-4 z-50 backdrop-blur-sm print:hidden">
                  <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden animate-in fade-in zoom-in duration-200">
                    <div className="p-6 text-center">
                      <div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4 text-red-600">
                        <i className="fa-solid fa-trash text-3xl"></i>
                      </div>
                      <h3 className="text-xl font-bold text-slate-800 mb-2">Personeli Sil</h3>
                      <p className="text-slate-600 text-sm">Bu personeli listeden çıkarmak istediğinize emin misiniz? Bu işlem geri alınamaz.</p>
                    </div>
                    <div className="p-4 bg-slate-50 border-t border-slate-200 flex justify-center gap-3">
                      <button onClick={() => setDeletingId(null)} className="px-6 py-2.5 rounded-lg font-bold text-slate-700 bg-white border border-slate-300 hover:bg-slate-100 transition-colors">İptal Et</button>
                      <button onClick={confirmDelete} className="px-6 py-2.5 rounded-lg font-bold bg-red-600 hover:bg-red-700 text-white shadow-md transition-colors">Evet, Sil</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        function EmployeeTable({ title, icon, data, months, onEdit, onDelete, badgeClass, typeLabel }) {
          return (
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden print:hidden">
              <div className="p-3 border-b border-slate-200 bg-slate-50 flex items-center justify-between gap-2">
                <div className="flex items-center gap-2">
                  {icon} <h3 className="font-bold text-slate-800 text-sm">{title}</h3>
                </div>
                <span className="text-xs text-slate-600 font-bold px-2 py-1 bg-white border border-slate-200 rounded-full shadow-sm">{data.length} Kayıt</span>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-left whitespace-nowrap">
                  <thead className="text-[11px] text-slate-500 bg-slate-50 uppercase border-b border-slate-200">
                    <tr>
                      <th className="px-3 py-2 font-bold tracking-wider">Ofis</th>
                      <th className="px-3 py-2 font-bold tracking-wider">Personel</th>
                      <th className="px-3 py-2 font-bold tracking-wider">Giriş Tarihi</th>
                      <th className="px-3 py-2 font-bold tracking-wider">Kategori / Hedef</th>
                      <th className="px-3 py-2 font-bold tracking-wider text-right min-w-[120px]">Aylık Satışlar</th>
                      <th className="px-3 py-2 font-bold tracking-wider text-right text-red-600">İade</th>
                      <th className="px-3 py-2 font-bold tracking-wider text-right text-blue-600">Net Ciro</th>
                      <th className="px-3 py-2 font-bold tracking-wider text-right">Kalan</th>
                      <th className="px-3 py-2 font-bold tracking-wider w-32">Başarı Oranı</th>
                      <th className="px-3 py-2 font-bold tracking-wider text-center">Durum</th>
                      <th className="px-3 py-2 font-bold tracking-wider text-center">İşlem</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {data.length === 0 ? (
                      <tr><td colSpan="11" className="px-4 py-6 text-center font-medium text-slate-500 text-sm">Bu kategoride henüz kayıtlı personel bulunmuyor.</td></tr>
                    ) : data.map((emp) => (
                      <tr key={emp.id} className={`transition-all duration-300 ${emp.isWinner ? 'bg-gradient-to-r from-green-50/80 to-transparent border-l-4 border-l-green-500 hover:from-green-100/80' : 'hover:bg-slate-50 border-l-4 border-l-transparent'}`}>
                        <td className="px-3 py-1.5 font-bold text-slate-700 text-xs">{emp.office}</td>
                        <td className="px-3 py-1.5">
                          <div className={`flex items-center gap-1.5 font-black text-sm ${emp.isWinner ? 'text-green-700' : 'text-slate-900'}`}>
                            {emp.isWinner && <i className="fa-solid fa-trophy text-yellow-500 text-[10px] drop-shadow-sm"></i>} {emp.name}
                          </div>
                        </td>
                        <td className="px-3 py-1.5 text-slate-500 font-semibold text-xs">{formatDate(emp.entryDate)}</td>
                        <td className="px-3 py-1.5">
                          <span className={`px-1.5 py-0.5 rounded text-[10px] font-black border uppercase ${badgeClass}`}>{typeLabel}</span>
                          <div className="text-[10px] font-bold text-slate-500 mt-0.5">{formatTL(emp.target)}</div>
                        </td>
                        
                        <td className="px-3 py-1.5 text-right text-[11px] font-semibold text-slate-600 space-y-0.5">
                          {months.length === 0 ? <span className="text-slate-400">-</span> : 
                            months.map(m => (
                              <div key={m.id} className="flex justify-between gap-2 border-b border-slate-100 last:border-0 pb-0.5 last:pb-0">
                                <span className="text-slate-400 w-12 text-left truncate" title={m.name}>{m.name.substring(0,3)}:</span> 
                                <span className="text-slate-700">{formatTL(emp.sales[m.id] || 0)}</span>
                              </div>
                            ))
                          }
                        </td>

                        <td className="px-3 py-1.5 text-right text-red-600 font-bold bg-red-50/30 text-xs">
                          {emp.returns > 0 ? `-${formatTL(emp.returns)}` : '-'}
                        </td>
                        <td className="px-3 py-1.5 text-right font-black text-blue-700 text-sm bg-blue-50/30">
                          {formatTL(emp.netRevenue)}
                        </td>
                        <td className="px-3 py-1.5 text-right font-bold text-slate-600 text-xs">
                          {formatTL(emp.remaining)}
                        </td>
                        <td className="px-3 py-1.5">
                          <div className="flex justify-between items-center mb-0.5">
                            <span className="text-[10px] font-black text-slate-700">% {emp.percentage.toFixed(1)}</span>
                          </div>
                          <div className="w-full bg-slate-200 rounded-full h-1.5 overflow-hidden">
                            <div className={`h-full rounded-full transition-all duration-500 ${emp.percentage >= 100 ? 'bg-green-500' : emp.percentage < 30 ? 'bg-red-500' : 'bg-blue-500'}`} style={{ width: `${Math.min(emp.percentage, 100)}%` }}></div>
                          </div>
                        </td>
                        <td className="px-3 py-1.5 text-center">
                          {emp.isWinner ? (
                            <span className="inline-flex items-center justify-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-black w-24 bg-gradient-to-r from-green-500 to-emerald-600 text-white shadow-[0_0_8px_rgba(34,197,94,0.4)] transform hover:scale-105 transition-all">
                              <i className="fa-solid fa-trophy text-[9px]"></i> KAZANDI
                            </span>
                          ) : (
                            <span className="inline-flex items-center justify-center px-2 py-0.5 rounded-full text-[10px] font-black w-24 bg-red-50 text-red-600 border border-red-100">KAZANAMADI</span>
                          )}
                        </td>
                        <td className="px-3 py-1.5 text-center">
                          <div className="flex items-center justify-center gap-1">
                            <button onClick={() => onEdit(emp)} className="text-slate-400 hover:text-blue-600 transition-colors p-1 hover:bg-blue-50 rounded-md" title="Düzenle">
                              <i className="fa-solid fa-pen-to-square text-sm"></i>
                            </button>
                            <button onClick={() => onDelete(emp.id)} className="text-slate-400 hover:text-red-600 transition-colors p-1 hover:bg-red-50 rounded-md" title="Sil">
                              <i className="fa-solid fa-trash text-sm"></i>
                            </button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          );
        }

        function ReportListSection({ title, data, target, colorClass, bgClass }) {
          if (data.length === 0) return null;
          return (
            <div className="mb-4">
              <h3 className={`text-base font-black uppercase tracking-wider mb-2 border-b-2 pb-1 ${colorClass}`}>
                {title} <span className="text-xs font-bold text-slate-400 ml-2">(Hedef: {formatTL(target)})</span>
              </h3>
              <div className="rounded-lg overflow-hidden border border-slate-200">
                <table className="w-full text-xs text-left">
                  <thead className={`font-bold uppercase tracking-wider ${bgClass} ${colorClass}`}>
                    <tr>
                      <th className="px-4 py-2">Sıra</th>
                      <th className="px-4 py-2">Ofis</th>
                      <th className="px-4 py-2">Personel Adı</th>
                      <th className="px-4 py-2 text-right">Net Ciro</th>
                      <th className="px-4 py-2 text-right">Başarı</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100 bg-white">
                    {data.map((emp, index) => (
                      <tr key={emp.id}>
                        <td className="px-4 py-1.5 font-bold text-slate-400">#{index + 1}</td>
                        <td className="px-4 py-1.5 font-bold text-slate-700">{emp.office}</td>
                        <td className="px-4 py-1.5 font-black text-slate-900">{emp.name}</td>
                        <td className="px-4 py-1.5 text-right font-bold text-green-600">{formatTL(emp.netRevenue)}</td>
                        <td className="px-4 py-1.5 text-right font-black text-slate-800">% {emp.percentage.toFixed(0)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
