<!DOCTYPE html>
<html lang="tr">
<head>
    <!--
    ========================================================================
    🚀 MASAÜSTÜNE YÜKLEME (PWA) İÇİN GEREKLİ EK DOSYALAR 🚀
    Uygulamanın bilgisayara/telefona bir uygulama gibi yüklenebilmesi ve 
    güncellemeleri otomatik alması için bu 'index.html' dosyasının tam yanına 
    (aynı klasöre) aşağıdaki 2 adet dosyayı oluşturmalısınız:

    1. DOSYA ADI: manifest.json
    İçeriği:
    {
      "name": "Antalya Tatili Portalı",
      "short_name": "Antalya Tatili",
      "start_url": "./index.html",
      "display": "standalone",
      "background_color": "#f8fafc",
      "theme_color": "#06b6d4",
      "icons": [
        {
          "src": "https://cdn-icons-png.flaticon.com/512/3135/3135715.png",
          "sizes": "512x512",
          "type": "image/png"
        }
      ]
    }

    2. DOSYA ADI: sw.js
    İçeriği:
    const CACHE_NAME = 'tatil-app-v1'; // Kodu her güncellediğinizde burayı v2, v3 yapın

    self.addEventListener('install', (event) => {
      self.skipWaiting();
    });

    self.addEventListener('activate', (event) => {
      event.waitUntil(clients.claim());
    });

    self.addEventListener('fetch', (event) => {
      // Önce ağdan en güncel halini çekmeye çalışır, yoksa önbelleği kullanır.
      event.respondWith(
        fetch(event.request)
          .then((response) => {
            const responseClone = response.clone();
            caches.open(CACHE_NAME).then((cache) => cache.put(event.request, responseClone));
            return response;
          })
          .catch(() => caches.match(event.request))
      );
    });
    ========================================================================
    -->

    <!-- Service Worker Kayıt ve Güncelleme Kontrolü -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('ServiceWorker başarıyla kaydedildi.');
                    
                    reg.onupdatefound = () => {
                        const installingWorker = reg.installing;
                        installingWorker.onstatechange = () => {
                            if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                if(confirm('Uygulamanın yeni bir sürümü (güncelleme) mevcut! Hemen güncellemek için sayfayı yenilemek ister misiniz?')) {
                                    window.location.reload();
                                }
                            }
                        };
                    };
                }).catch(err => {
                    console.log('ServiceWorker kaydı başarısız oldu (Lokal çalışıyorsanız normaldir):', err);
                });
            });
        }
    </script>

<body class="bg-slate-50 text-slate-800 antialiased">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useMemo, useEffect } = React;

        // Firebase Başlatma
        const firebaseConfig = {
            apiKey: "AIzaSyCsowA7JoTC_maRfzojfXXdg75OM3HLCsI",
            authDomain: "tatil-6fcb9.firebaseapp.com",
            projectId: "tatil-6fcb9",
            storageBucket: "tatil-6fcb9.firebasestorage.app",
            messagingSenderId: "234528583159",
            appId: "1:234528583159:web:4b5dfe518bfa8669b252f2"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "tatil-6fcb9"; 

        // --- Yardımcı Fonksiyonlar ---
        const formatTL = (amount) => new Intl.NumberFormat('tr-TR', { maximumFractionDigits: 0 }).format(amount) + ' ₺';
        const formatInputNumber = (val) => {
          if (val === 0) return '0';
          if (!val) return '';
          const cleanVal = val.toString().replace(/\D/g, '');
          return cleanVal ? new Intl.NumberFormat('tr-TR').format(cleanVal) : '';
        };
        const parseInputNumber = (val) => val ? Number(val.toString().replace(/\D/g, '')) : 0;
        const formatDate = (dateString) => {
          if (!dateString) return '-';
          const date = new Date(dateString);
          return isNaN(date.getTime()) ? '-' : date.toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        };
        const getInitials = (name) => {
            if (!name) return "?";
            const words = name.trim().split(' ');
            if (words.length === 1) return words[0].substring(0, 2).toUpperCase();
            return (words[0][0] + words[words.length - 1][0]).toUpperCase();
        };
        const getAvatarColor = (name) => {
            const colors = ['bg-blue-500', 'bg-emerald-500', 'bg-amber-500', 'bg-rose-500', 'bg-purple-500', 'bg-cyan-500', 'bg-indigo-500'];
            let sum = 0;
            for(let i=0; i<name.length; i++) sum += name.charCodeAt(i);
            return colors[sum % colors.length];
        };

        // --- Alt Bileşenler (Components) ---

        // 1. Geri Sayım Sayacı Bileşeni
        const CountdownTimer = () => {
            const targetDate = new Date('2026-04-01T00:00:00').getTime();
            const [timeLeft, setTimeLeft] = useState(targetDate - new Date().getTime());

            useEffect(() => {
                const interval = setInterval(() => {
                    const now = new Date().getTime();
                    const distance = targetDate - now;
                    setTimeLeft(distance);
                    if (distance < 0) clearInterval(interval);
                }, 1000);
                return () => clearInterval(interval);
            }, [targetDate]);

            const isExpired = timeLeft < 0;
            const days = isExpired ? 0 : Math.floor(timeLeft / (1000 * 60 * 60 * 24));
            const hours = isExpired ? 0 : Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = isExpired ? 0 : Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));

            return (
                <div className="flex flex-col items-center justify-center bg-white/10 rounded-3xl p-6 shadow-xl border border-white/20 text-white w-full md:w-auto">
                    <h3 className="text-sm font-bold uppercase tracking-widest mb-4 opacity-90"><i className="fa-regular fa-clock"></i> TATİL SÜRECİ</h3>
                    <div className="flex gap-4 sm:gap-6 text-center">
                        <div className="flex flex-col"><span className="text-4xl sm:text-5xl font-black drop-shadow-md">{days.toString().padStart(2, '0')}</span><span className="text-[10px] sm:text-xs font-bold opacity-80 mt-1 uppercase tracking-wider">GÜN</span></div>
                        <div className="text-3xl sm:text-4xl font-black opacity-50 mt-1">:</div>
                        <div className="flex flex-col"><span className="text-4xl sm:text-5xl font-black drop-shadow-md">{hours.toString().padStart(2, '0')}</span><span className="text-[10px] sm:text-xs font-bold opacity-80 mt-1 uppercase tracking-wider">SAAT</span></div>
                        <div className="text-3xl sm:text-4xl font-black opacity-50 mt-1">:</div>
                        <div className="flex flex-col"><span className="text-4xl sm:text-5xl font-black drop-shadow-md">{minutes.toString().padStart(2, '0')}</span><span className="text-[10px] sm:text-xs font-bold opacity-80 mt-1 uppercase tracking-wider">DAKİKA</span></div>
                    </div>
                    {isExpired && (
                        <div className="mt-5 pt-4 border-t border-white/20 w-full text-center animate-fade-in">
                            <span className="bg-white/20 px-4 py-1.5 rounded-full text-sm font-black tracking-wide drop-shadow-sm">SÜRE DOLDU</span>
                            <p className="text-xs font-medium mt-3 text-white/90 italic">"Bir sonraki tatilde görüşmek üzere..." 🌴</p>
                        </div>
                    )}
                </div>
            );
        };

        // 2. Liderlik Podyumu Bileşeni
        const Podium = ({ data }) => {
            if (data.length === 0) return null;
            const top3 = [...data].sort((a,b) => {
                if(b.percentage === a.percentage) return b.netRevenue - a.netRevenue;
                return b.percentage - a.percentage;
            }).slice(0, 3);

            const renderCard = (emp, rank) => {
                if(!emp) return <div className="w-1/3 opacity-0"></div>;
                const colors = {
                    1: 'from-amber-300 to-yellow-500 border-yellow-200 text-yellow-900',
                    2: 'from-slate-200 to-slate-400 border-slate-200 text-slate-800',
                    3: 'from-orange-300 to-orange-500 border-orange-200 text-orange-900'
                };
                const medals = { 1: '🥇', 2: '🥈', 3: '🥉' };
                const heights = { 1: 'h-36 sm:h-44 z-10 scale-105', 2: 'h-28 sm:h-36', 3: 'h-24 sm:h-32' };

                return (
                    <div key={emp.id} className={`w-1/3 flex flex-col items-center justify-end transition-transform hover:-translate-y-2 duration-300 ${heights[rank]}`}>
                        <div className="relative mb-2">
                            <div className={`w-10 h-10 sm:w-14 sm:h-14 rounded-full flex items-center justify-center text-white font-black text-sm sm:text-base shadow-md border-2 border-white ${getAvatarColor(emp.name)}`}>
                                {getInitials(emp.name)}
                            </div>
                            <div className="absolute -top-3 -right-2 text-lg sm:text-xl drop-shadow-sm">{medals[rank]}</div>
                        </div>
                        <div className={`w-full bg-gradient-to-b ${colors[rank]} rounded-t-xl shadow-md flex flex-col items-center p-2 sm:p-3 text-center h-full border-t border-x relative overflow-hidden`}>
                            <div className="absolute inset-0 bg-white/20 pattern-dots"></div>
                            <span className="relative z-10 text-[9px] sm:text-[11px] font-black uppercase truncate w-full px-1">{emp.name.split(' ')[0]}</span>
                            <span className="relative z-10 text-[10px] sm:text-xs font-black mt-1 bg-white/30 px-1.5 py-0.5 rounded-md">% {emp.percentage.toFixed(0)}</span>
                            {emp.isWinner && <span className="relative z-10 mt-auto text-[7px] sm:text-[9px] font-black bg-white/50 px-1.5 py-0.5 rounded-full uppercase"><i className="fa-solid fa-plane"></i> Gidiyor</span>}
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex items-end justify-center max-w-md mx-auto pt-6 pb-2 gap-1 sm:gap-2">
                    {renderCard(top3[1], 2)}
                    {renderCard(top3[0], 1)}
                    {renderCard(top3[2], 3)}
                </div>
            );
        };

        // 3. Skeleton Tablo
        const SkeletonTable = () => (
            <div className="space-y-4 p-4">
                {[1,2,3].map(i => (
                    <div key={i} className="flex items-center gap-4">
                        <div className="w-10 h-10 rounded-full skeleton shrink-0"></div>
                        <div className="flex-1 space-y-2">
                            <div className="h-4 w-1/3 rounded skeleton"></div>
                            <div className="h-3 w-1/4 rounded skeleton"></div>
                        </div>
                        <div className="w-24 h-6 rounded-full skeleton shrink-0"></div>
                    </div>
                ))}
            </div>
        );


        // --- Ana Uygulama ---
        function App() {
          const [user, setUser] = useState(null);
          const [dbStatus, setDbStatus] = useState('loading'); 
          const [employees, setEmployees] = useState([]); 

          // UI States
          const [activeTab, setActiveTab] = useState('dashboard');
          const [isFlying, setIsFlying] = useState(false);
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [isDeletingAll, setIsDeletingAll] = useState(false); // Tümünü sil onayı
          const [settingsSaved, setSettingsSaved] = useState(false); // Kaydedildi bildirimi

          // Settings
          const [months, setMonths] = useState([{ id: 'm1', name: 'Ocak' }, { id: 'm2', name: 'Şubat' }, { id: 'm3', name: 'Mart' }]);
          const [newMonthName, setNewMonthName] = useState('');
          const [targetOld, setTargetOld] = useState(1200000);
          const [targetNew, setTargetNew] = useState(800000);
          const [cutoffDate, setCutoffDate] = useState('2026-01-01');
          const [showSettings, setShowSettings] = useState(false);

          // Form
          const [formData, setFormData] = useState({ name: '', office: '', entryDate: '', sales: {}, returns: '' });
          const [editingId, setEditingId] = useState(null);
          const [deletingId, setDeletingId] = useState(null);
          const [formError, setFormError] = useState('');

          useEffect(() => {
            const initAuth = async () => { try { await signInAnonymously(auth); } catch(err) { setDbStatus('error'); } };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, (u) => setUser(u));
            return () => unsubscribe();
          }, []);

          // Personel Verilerini Çekme
          useEffect(() => {
            if (!user) return; 
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'employees'));
            const unsubscribe = onSnapshot(q, (snapshot) => {
              const data = [];
              snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
              setEmployees(data);
              setDbStatus('connected');
            }, (err) => setDbStatus('error'));
            return () => unsubscribe();
          }, [user]);

          // Ayarları Veritabanından Çekme
          useEffect(() => {
            if (!user) return;
            const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'main');
            const unsubscribe = onSnapshot(settingsRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.targetOld !== undefined) setTargetOld(data.targetOld);
                    if (data.targetNew !== undefined) setTargetNew(data.targetNew);
                    if (data.cutoffDate) setCutoffDate(data.cutoffDate);
                    if (data.months) setMonths(data.months);
                }
            }, (err) => console.error("Ayarlar çekilemedi:", err));
            return () => unsubscribe();
          }, [user]);

          const fireConfetti = () => {
            if (typeof confetti !== 'undefined') {
                const end = Date.now() + 3000;
                const frame = () => {
                    confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#2dd4bf', '#f59e0b', '#0ea5e9'] });
                    confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#2dd4bf', '#f59e0b', '#0ea5e9'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                };
                frame();
            }
          };

          const handleTabChange = (tabName) => {
            if (tabName === 'reports' && activeTab !== 'reports') {
              setIsFlying(true); setTimeout(() => setIsFlying(false), 2500); setTimeout(() => fireConfetti(), 800);
            }
            setActiveTab(tabName); window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          // --- Ayarlar İşlemleri ---
          const handleAddMonth = () => {
            if (!newMonthName.trim()) return;
            setMonths([...months, { id: 'm' + Date.now(), name: newMonthName.trim() }]);
            setNewMonthName('');
          };

          const handleRemoveMonth = (idToRemove) => {
            setMonths(months.filter(m => m.id !== idToRemove));
          };

          // Ayarları Kaydet
          const handleSaveSettings = async () => {
              if (dbStatus !== 'connected') return;
              try {
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'main'), {
                      targetOld,
                      targetNew,
                      cutoffDate,
                      months
                  });
                  setSettingsSaved(true);
                  setTimeout(() => setSettingsSaved(false), 3000); // 3 sn sonra tik işaretini gizle
              } catch (err) {
                  console.error("Ayarlar kaydedilemedi:", err);
              }
          };

          // Tüm Verileri Temizle
          const confirmDeleteAll = async () => {
              if (dbStatus !== 'connected') return;
              try {
                  const promises = employees.map(emp => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'employees', emp.id.toString())));
                  await Promise.all(promises);
                  setIsDeletingAll(false);
              } catch (err) {
                  console.error("Tümünü silme hatası:", err);
              }
          };

          const isNewEmployee = (dateStr) => {
            if (!dateStr || !cutoffDate) return false;
            const empDate = new Date(dateStr);
            const cutDate = new Date(cutoffDate);
            if (isNaN(empDate.getTime()) || isNaN(cutDate.getTime())) return false;
            return empDate >= cutDate;
          };

          const processData = (isNewType) => {
            return employees.filter(emp => isNewEmployee(emp.entryDate) === isNewType).map(emp => {
                const totalSales = months.reduce((sum, m) => sum + (Number(emp.sales[m.id]) || 0), 0);
                const netRevenue = totalSales - (Number(emp.returns) || 0);
                const currentTarget = Number(isNewType ? targetNew : targetOld) || 0;
                const remaining = currentTarget - netRevenue;
                let percentage = currentTarget > 0 ? (netRevenue / currentTarget) * 100 : 0;
                return { ...emp, target: currentTarget, netRevenue, remaining: Math.max(0, remaining), percentage, isWinner: currentTarget > 0 && netRevenue >= currentTarget };
              }).sort((a, b) => b.percentage - a.percentage);
          };

          const processedOldData = useMemo(() => processData(false), [employees, targetOld, cutoffDate, months]);
          const processedNewData = useMemo(() => processData(true), [employees, targetNew, cutoffDate, months]);
          const totalWinners = processedOldData.filter(e => e.isWinner).length + processedNewData.filter(e => e.isWinner).length;

          // --- Form Modalı İşlemleri ---
          const openAddModal = () => {
              setFormData({ name: '', office: '', entryDate: '', sales: {}, returns: '' });
              setEditingId(null); setFormError(''); setIsModalOpen(true);
          };
          
          const handleEdit = (employee) => {
            setFormData({ name: employee.name, office: employee.office, entryDate: employee.entryDate || '', sales: { ...employee.sales }, returns: employee.returns || '' });
            setEditingId(employee.id); setFormError(''); setIsModalOpen(true);
          };

          const handleInputChange = (e) => {
            const { name, value } = e.target;
            if (name === 'returns') {
              setFormData(prev => ({ ...prev, [name]: parseInputNumber(value) }));
            } else {
              setFormData(prev => ({ ...prev, [name]: value }));
            }
            if (formError) setFormError('');
          };

          const handleSalesChange = (monthId, value) => {
            setFormData(prev => ({
              ...prev,
              sales: { ...prev.sales, [monthId]: parseInputNumber(value) }
            }));
          };

          const handleFormSubmit = async (e) => {
            e.preventDefault();
            if (!formData.name || !formData.office || !formData.entryDate) {
              setFormError("Lütfen isim, ofis ve giriş tarihini doldurunuz.");
              setTimeout(() => setFormError(''), 4000); return;
            }

            const cleanSales = {};
            months.forEach(m => { cleanSales[m.id] = Number(formData.sales[m.id]) || 0; });
            const payload = { office: formData.office.toUpperCase(), name: formData.name.toUpperCase(), entryDate: formData.entryDate, sales: cleanSales, returns: Number(formData.returns) || 0 };

            try {
              const employeesRef = collection(db, 'artifacts', appId, 'public', 'data', 'employees');
              if (editingId) { await setDoc(doc(employeesRef, editingId.toString()), payload); } 
              else {
                await setDoc(doc(employeesRef, Date.now().toString()), payload);
                const tempNet = Object.values(cleanSales).reduce((a,b)=>a+b,0) - (Number(formData.returns)||0);
                if((isNewEmployee(formData.entryDate) ? targetNew : targetOld) > 0 && tempNet >= (isNewEmployee(formData.entryDate) ? targetNew : targetOld)) setTimeout(()=>fireConfetti(), 300);
              }
              setIsModalOpen(false);
            } catch (err) { setFormError("Bağlantı hatası oluştu."); }
          };

          const handleDeleteClick = (id) => setDeletingId(id);

          const confirmDelete = async () => {
            if (deletingId) {
              try { await deleteDoc(doc(collection(db, 'artifacts', appId, 'public', 'data', 'employees'), deletingId.toString())); } catch (err) {}
              setDeletingId(null);
            }
          };

          // --- Ana Görünüm Render ---
          const bgImageUrl = activeTab === 'dashboard' 
            ? "url('https://images.unsplash.com/photo-1499793983690-e29da59ef1c2?q=80&w=2062&auto=format&fit=crop')" 
            : "url('https://images.unsplash.com/photo-1510414842594-a61c69b5ae57?q=80&w=2070&auto=format&fit=crop')";

          return (
            <div className="min-h-screen print:bg-white text-slate-800 font-sans pb-24 relative bg-cover bg-center bg-fixed transition-all duration-1000" style={{ backgroundImage: bgImageUrl }}>
              <div className="absolute inset-0 bg-gradient-to-b from-cyan-900/60 to-slate-900/80 -z-10 print:hidden transition-all duration-1000"></div>
              
              {isFlying && <div className="airplane-flyby"><i className="fa-solid fa-plane text-6xl sm:text-8xl drop-shadow-xl"></i></div>}

              {/* Üst Navigasyon */}
              <div className="bg-white/10 backdrop-blur-md border-b border-white/20 sticky top-0 z-40 print:hidden shadow-lg shadow-black/10">
                <div className="max-w-7xl mx-auto px-4 py-3 flex flex-col sm:flex-row justify-between items-center gap-4">
                  <div className="flex items-center gap-3">
                    <div className="bg-gradient-to-br from-cyan-400 to-blue-600 p-2.5 rounded-2xl text-white shadow-sm">
                      <i className="fa-solid fa-umbrella-beach text-xl"></i>
                    </div>
                    <div>
                      <h1 className="text-xl font-extrabold text-white leading-tight tracking-tight drop-shadow-sm">İhlas Pazarlama</h1>
                      <p className="text-xs font-bold text-cyan-100 flex items-center gap-2 uppercase tracking-widest drop-shadow-sm">
                        Antalya Tatili 
                        {dbStatus === 'connected' && <span className="flex items-center gap-1 text-[9px] bg-emerald-500/80 text-white px-2 py-0.5 rounded-full"><span className="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span> Çevrimiçi</span>}
                        {dbStatus === 'loading' && <span className="flex items-center gap-1 text-[9px] bg-amber-500/80 text-white px-2 py-0.5 rounded-full"><i className="fa-solid fa-spinner fa-spin"></i> Bağlanıyor</span>}
                        {dbStatus === 'error' && <span className="flex items-center gap-1 text-[9px] bg-rose-500/80 text-white px-2 py-0.5 rounded-full"><i className="fa-solid fa-triangle-exclamation"></i> Hata</span>}
                      </p>
                    </div>
                  </div>
                  <div className="flex bg-black/20 p-1 rounded-xl border border-white/10 w-full sm:w-auto">
                    <button onClick={() => handleTabChange('dashboard')} className={`flex-1 sm:flex-none flex items-center justify-center gap-2 px-6 py-2 rounded-lg font-bold text-sm transition-all duration-300 active:scale-95 ${activeTab === 'dashboard' ? 'bg-white text-cyan-700 shadow-sm' : 'text-white hover:bg-white/10'}`}>
                      <i className="fa-solid fa-map-location-dot"></i> Ana Sayfa
                    </button>
                    <button onClick={() => handleTabChange('reports')} className={`flex-1 sm:flex-none flex items-center justify-center gap-2 px-6 py-2 rounded-lg font-bold text-sm transition-all duration-300 active:scale-95 ${activeTab === 'reports' ? 'bg-white text-cyan-700 shadow-sm' : 'text-white hover:bg-white/10'}`}>
                      <i className="fa-solid fa-plane-departure"></i> Raporlar
                    </button>
                  </div>
                </div>
              </div>

              <div className="p-4 md:p-8 animate-fade-in">
                {activeTab === 'dashboard' && (
                  <div className="max-w-7xl mx-auto print:hidden">
                    
                    {/* Hero Bölümü (Geri Sayım + Özet) */}
                    <div className="flex flex-col lg:flex-row gap-6 mb-8">
                        <CountdownTimer />
                        <div className="flex-1 grid grid-cols-2 gap-4">
                            <div className="bg-white/95 rounded-3xl p-6 shadow-xl border border-slate-100 flex flex-col justify-center items-center text-center transition-transform hover:-translate-y-1">
                                <div className="w-12 h-12 bg-cyan-50 text-cyan-600 rounded-full flex items-center justify-center text-xl mb-2"><i className="fa-solid fa-users"></i></div>
                                <h4 className="text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Katılımcı Sayısı</h4>
                                <p className="text-3xl sm:text-4xl font-black text-slate-800">{employees.length}</p>
                            </div>
                            <div className="bg-white/95 rounded-3xl p-6 shadow-xl border border-slate-100 flex flex-col justify-center items-center text-center transition-transform hover:-translate-y-1 relative overflow-hidden">
                                <i className="fa-solid fa-plane text-7xl text-emerald-500/5 absolute -right-2 -bottom-2 -rotate-45"></i>
                                <div className="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center text-xl mb-2 relative z-10"><i className="fa-solid fa-champagne-glasses"></i></div>
                                <h4 className="text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 relative z-10">Bileti Kapanlar</h4>
                                <p className="text-3xl sm:text-4xl font-black text-emerald-600 relative z-10">{totalWinners}</p>
                            </div>
                        </div>
                    </div>

                    {/* Ayarlar Paneli (Açılır/Kapanır) */}
                    <div className="mb-8 bg-white/95 rounded-3xl shadow-xl border border-slate-100 overflow-hidden transition-all">
                        <button onClick={() => setShowSettings(!showSettings)} className="w-full flex items-center justify-between p-4 sm:p-5 text-left hover:bg-slate-50 transition-colors">
                            <span className="font-black text-slate-700 text-base sm:text-lg flex items-center gap-3">
                                <span className="bg-slate-100 p-1.5 rounded-lg text-slate-500"><i className="fa-solid fa-sliders text-sm"></i></span> Kampanya Kuralları & Ayarlar
                            </span>
                            <i className={`fa-solid fa-chevron-down text-slate-400 transition-transform duration-300 ${showSettings ? 'rotate-180' : ''}`}></i>
                        </button>
                        
                        {showSettings && (
                            <div className="animate-slide-up">
                                <div className="p-5 pt-0 grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="space-y-4">
                                        <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b pb-1.5">Hedef Tutarları</h4>
                                        <div className="flex gap-3">
                                            <div className="flex-1">
                                                <label className="block text-[10px] font-bold text-slate-500 mb-1 ml-1">ESKİ PERSONEL</label>
                                                <div className="relative">
                                                    <input type="text" inputMode="numeric" value={targetOld===0?'':formatInputNumber(targetOld)} onChange={e=>setTargetOld(parseInputNumber(e.target.value))} className="w-full pl-3 pr-8 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-cyan-500 outline-none font-bold text-slate-700 text-sm" />
                                                    <span className="absolute right-3 top-2 text-slate-400 font-bold text-sm">₺</span>
                                                </div>
                                            </div>
                                            <div className="flex-1">
                                                <label className="block text-[10px] font-bold text-slate-500 mb-1 ml-1">YENİ PERSONEL</label>
                                                <div className="relative">
                                                    <input type="text" inputMode="numeric" value={targetNew===0?'':formatInputNumber(targetNew)} onChange={e=>setTargetNew(parseInputNumber(e.target.value))} className="w-full pl-3 pr-8 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-cyan-500 outline-none font-bold text-slate-700 text-sm" />
                                                    <span className="absolute right-3 top-2 text-slate-400 font-bold text-sm">₺</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="pt-1">
                                            <label className="block text-[10px] font-bold text-amber-500 mb-1">YENİ PERSONEL MİLADI (İPAŞ GİRİŞ)</label>
                                            <input type="date" value={cutoffDate} onChange={e=>setCutoffDate(e.target.value)} className="w-full px-3 py-2 bg-amber-50 border border-amber-100 rounded-lg text-amber-800 font-bold outline-none text-sm" />
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b pb-1.5">Geçerli Aylar</h4>
                                        <div className="flex flex-wrap gap-1.5">
                                            {months.map(m => (
                                                <span key={m.id} className="bg-cyan-50 text-cyan-700 px-2 py-1 rounded-md text-[10px] font-bold flex items-center gap-1.5 border border-cyan-100">
                                                {m.name} <button onClick={()=>handleRemoveMonth(m.id)} className="text-cyan-400 hover:text-rose-500"><i className="fa-solid fa-circle-xmark"></i></button>
                                                </span>
                                            ))}
                                        </div>
                                        <div className="flex gap-2">
                                            <input type="text" value={newMonthName} onChange={e=>setNewMonthName(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleAddMonth()} placeholder="Yeni ay ekle (Örn: Nisan)" className="flex-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none text-sm font-medium" />
                                            <button onClick={handleAddMonth} className="bg-cyan-600 text-white px-3 rounded-lg font-bold hover:bg-cyan-700 transition-colors"><i className="fa-solid fa-plus"></i></button>
                                        </div>
                                    </div>
                                </div>
                                
                                {/* Ayarlar Kaydet & Temizle Bölümü */}
                                <div className="p-5 mt-2 bg-slate-50/50 border-t border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-4">
                                    <button onClick={() => setIsDeletingAll(true)} className="text-xs font-bold text-rose-500 hover:text-rose-700 flex items-center gap-1.5 transition-colors p-2 rounded-lg hover:bg-rose-50 w-full sm:w-auto justify-center">
                                        <i className="fa-solid fa-trash-can"></i> Tüm Personel Verilerini Temizle
                                    </button>
                                    <div className="flex items-center gap-3 w-full sm:w-auto">
                                        {settingsSaved && <span className="text-xs font-bold text-emerald-500 animate-fade-in flex items-center gap-1"><i className="fa-solid fa-circle-check"></i> Kaydedildi!</span>}
                                        <button onClick={handleSaveSettings} disabled={dbStatus !== 'connected'} className={`w-full sm:w-auto px-6 py-2.5 rounded-xl font-bold transition-all text-sm flex items-center justify-center gap-2 ${dbStatus === 'connected' ? 'bg-cyan-600 text-white hover:bg-cyan-700 shadow-md shadow-cyan-600/20 active:scale-95' : 'bg-slate-300 text-slate-500 cursor-not-allowed'}`}>
                                            <i className="fa-solid fa-cloud-arrow-up"></i> Ayarları Kaydet
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Tablolar ve Liderlik Podyumları */}
                    <div className="space-y-8">
                      
                      {/* Eski Personel Bölümü */}
                      <div className="bg-white/95 rounded-[2rem] shadow-xl border border-slate-100 overflow-hidden">
                        <div className="bg-gradient-to-r from-indigo-600 to-blue-600 p-4 sm:p-5 text-white text-center relative overflow-hidden">
                            <i className="fa-solid fa-briefcase absolute -left-6 -bottom-6 text-7xl text-white/10 -rotate-12"></i>
                            <h2 className="text-xl sm:text-2xl font-black uppercase tracking-widest drop-shadow-sm relative z-10">Eski Personel</h2>
                            <p className="text-indigo-200 font-medium text-xs mt-0.5 relative z-10">Hedef: {formatTL(targetOld)}</p>
                        </div>
                        <div className="px-2 sm:px-6 -mt-6 relative z-20">
                            <Podium data={processedOldData} />
                        </div>
                        {dbStatus === 'loading' ? <SkeletonTable /> : <EmployeeTable data={processedOldData} months={months} onEdit={handleEdit} onDelete={handleDeleteClick} type="old" />}
                      </div>

                      {/* Yeni Personel Bölümü */}
                      <div className="bg-white/95 rounded-[2rem] shadow-xl border border-slate-100 overflow-hidden">
                        <div className="bg-gradient-to-r from-amber-500 to-orange-500 p-4 sm:p-5 text-white text-center relative overflow-hidden">
                            <i className="fa-solid fa-star absolute -left-6 -bottom-6 text-7xl text-white/10 -rotate-12"></i>
                            <h2 className="text-xl sm:text-2xl font-black uppercase tracking-widest drop-shadow-sm relative z-10">Yeni Personel</h2>
                            <p className="text-amber-100 font-medium text-xs mt-0.5 relative z-10">Hedef: {formatTL(targetNew)}</p>
                        </div>
                        <div className="px-2 sm:px-6 -mt-6 relative z-20">
                            <Podium data={processedNewData} />
                        </div>
                        {dbStatus === 'loading' ? <SkeletonTable /> : <EmployeeTable data={processedNewData} months={months} onEdit={handleEdit} onDelete={handleDeleteClick} type="new" />}
                      </div>

                    </div>

                    {/* Yüzen Ekleme Butonu (FAB) */}
                    <button onClick={openAddModal} className="fixed bottom-6 right-6 sm:bottom-10 sm:right-10 w-14 h-14 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-full shadow-xl shadow-cyan-500/40 text-white flex items-center justify-center text-xl hover:scale-110 active:scale-95 transition-all z-40 animate-slide-up border border-white">
                        <i className="fa-solid fa-plus"></i>
                    </button>
                  </div>
                )}

                {/* --- Raporlar Sekmesi --- */}
                {activeTab === 'reports' && (
                  <div className="max-w-4xl mx-auto animate-fade-in">
                    <div className="flex flex-wrap justify-end gap-2 sm:gap-3 mb-6 print:hidden">
                      <button onClick={()=>window.open(`https://wa.me/?text=${encodeURIComponent(generateWhatsAppText())}`)} className="bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2.5 rounded-xl font-bold transition-all active:scale-95 shadow-md flex items-center gap-2 text-sm">
                        <i className="fa-brands fa-whatsapp text-lg"></i> WhatsApp Paylaş
                      </button>
                      <button onClick={()=>window.print()} className="bg-cyan-600 hover:bg-cyan-700 text-white px-5 py-2.5 rounded-xl font-bold transition-all active:scale-95 shadow-md flex items-center gap-2 text-sm">
                        <i className="fa-solid fa-print text-lg"></i> PDF Çıktısı
                      </button>
                    </div>

                    <div className="bg-white p-6 sm:p-10 rounded-[2rem] shadow-xl border border-slate-100 print:shadow-none print:border-none print:p-0 relative overflow-hidden">
                      <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-500"></div>
                      
                      <div className="text-center mb-10 pb-6 border-b border-dashed border-slate-200">
                        <div className="flex justify-center mb-4 text-amber-500 drop-shadow-md relative inline-block mx-auto">
                          <i className="fa-solid fa-plane-departure text-5xl text-cyan-600"></i>
                        </div>
                        <h1 className="text-2xl sm:text-4xl font-black text-slate-900 uppercase tracking-tighter mb-2">İhlas Pazarlama</h1>
                        <h2 className="text-lg sm:text-xl font-extrabold text-cyan-600 uppercase tracking-widest mb-3">Antalya Tatili Sonuçları</h2>
                        <span className="bg-slate-50 text-slate-500 text-[10px] font-bold px-3 py-1 rounded-full uppercase border border-slate-200">Tarih: {new Date().toLocaleDateString('tr-TR')}</span>
                      </div>

                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-10">
                        <div className="text-center p-5 bg-slate-50 rounded-2xl border border-slate-100">
                          <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Görev Alan Personel</p>
                          <p className="text-4xl font-black text-slate-800">{employees.length}</p>
                        </div>
                        <div className="text-center p-5 bg-emerald-50 rounded-2xl border border-emerald-100 relative overflow-hidden">
                          <i className="fa-solid fa-ticket absolute -right-4 -bottom-4 text-emerald-500/10 text-5xl -rotate-45"></i>
                          <p className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest mb-1.5 relative z-10">Biletini Alanlar</p>
                          <p className="text-4xl font-black text-emerald-700 relative z-10">{totalWinners}</p>
                        </div>
                      </div>

                      <ReportListSection title="Eski Personel Uçuş Listesi" data={processedOldData.filter(e => e.isWinner)} target={targetOld} color="indigo" />
                      <div className="mt-8"><ReportListSection title="Yeni Personel Uçuş Listesi" data={processedNewData.filter(e => e.isWinner)} target={targetNew} color="amber" /></div>

                      <div className="mt-12 pt-6 border-t border-dashed border-slate-200 text-center">
                        <p className="text-sm font-black text-slate-800 uppercase tracking-wider">Antalya'da Görüşmek Üzere! 🌴</p>
                        <p className="text-[10px] font-bold text-slate-400 mt-1">Bu rapor sistem tarafından otomatik oluşturulmuştur.</p>
                      </div>
                    </div>
                  </div>
                )}
              </div>

              {/* --- FORM MODALI --- */}
              {isModalOpen && (
                <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in print:hidden">
                    <div className="bg-white rounded-[1.5rem] shadow-2xl w-full max-w-xl overflow-hidden animate-slide-up flex flex-col max-h-[90vh]">
                        <div className="p-5 bg-slate-50 border-b border-slate-100 flex justify-between items-center shrink-0">
                            <h2 className="text-lg font-black text-slate-800 flex items-center gap-2">
                                <div className="bg-cyan-100 text-cyan-600 w-8 h-8 rounded-lg flex items-center justify-center"><i className="fa-solid fa-id-card-clip text-sm"></i></div>
                                {editingId ? 'Yolcu Güncelle' : 'Yeni Yolcu Ekle'}
                            </h2>
                            <button onClick={()=>setIsModalOpen(false)} className="w-8 h-8 bg-white rounded-full text-slate-400 hover:text-rose-500 hover:bg-rose-50 shadow-sm transition-colors"><i className="fa-solid fa-xmark"></i></button>
                        </div>
                        
                        <div className="p-5 overflow-y-auto custom-scrollbar">
                            {formError && <div className="mb-4 p-3 bg-rose-50 border border-rose-100 text-rose-600 rounded-xl text-xs font-bold animate-pulse"><i className="fa-solid fa-triangle-exclamation mr-1.5"></i> {formError}</div>}
                            
                            <form id="employeeForm" onSubmit={handleFormSubmit} className="space-y-4">
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                    <div>
                                        <label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wide ml-1">Ad Soyad</label>
                                        <input name="name" value={formData.name} onChange={handleInputChange} type="text" placeholder="Örn: Ahmet Yılmaz" className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-cyan-500 outline-none font-bold text-sm" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wide ml-1">Ofis</label>
                                        <input name="office" value={formData.office} onChange={handleInputChange} type="text" placeholder="Örn: Yıldız Ofis" className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-cyan-500 outline-none font-bold text-sm" />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wide ml-1">İPAŞ Giriş Tarihi</label>
                                    <input type="date" name="entryDate" value={formData.entryDate} onChange={handleInputChange} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-cyan-500 outline-none font-bold text-sm" />
                                </div>
                                
                                <div className="p-4 bg-slate-50/50 border border-slate-100 rounded-xl">
                                    <label className="block text-[10px] font-bold text-cyan-600 mb-3 uppercase tracking-widest"><i className="fa-solid fa-chart-line mr-1"></i> Aylık Satış Performansı</label>
                                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                        {months.map(m => (
                                            <div key={m.id}>
                                                <label className="block text-[9px] font-bold text-slate-500 mb-1 ml-1">{m.name} (TL)</label>
                                                <input type="text" inputMode="numeric" value={formData.sales[m.id]?formatInputNumber(formData.sales[m.id]):''} onChange={e=>handleSalesChange(m.id, e.target.value)} placeholder="0" className="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-cyan-500 outline-none font-bold text-sm" />
                                            </div>
                                        ))}
                                    </div>
                                    {months.length === 0 && <p className="text-[10px] text-rose-500 font-bold mt-2">Önce ayarlardan ay eklemelisiniz.</p>}
                                </div>

                                <div>
                                    <label className="block text-[10px] font-bold text-rose-500 mb-1 uppercase tracking-wide ml-1">Toplam İade (TL)</label>
                                    <input name="returns" value={formData.returns?formatInputNumber(formData.returns):''} onChange={handleInputChange} type="text" inputMode="numeric" placeholder="0" className="w-full px-3 py-2.5 bg-rose-50 border border-rose-100 rounded-lg focus:bg-white focus:ring-2 focus:ring-rose-400 outline-none font-black text-rose-700 text-sm" />
                                </div>
                            </form>
                        </div>

                        <div className="p-5 bg-slate-50 border-t border-slate-100 flex gap-2 shrink-0">
                            <button onClick={()=>setIsModalOpen(false)} className="flex-1 py-2.5 rounded-lg font-bold text-slate-600 bg-white border border-slate-200 hover:bg-slate-100 transition-all text-sm">İptal</button>
                            <button form="employeeForm" type="submit" disabled={months.length===0} className="flex-[2] py-2.5 rounded-lg font-bold text-white bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 shadow-md shadow-cyan-500/20 transition-all flex items-center justify-center gap-1.5 text-sm">
                                <i className="fa-solid fa-floppy-disk"></i> {editingId ? 'Güncelle' : 'Kaydet'}
                            </button>
                        </div>
                    </div>
                </div>
              )}

              {/* Silme Onay Modalı */}
              {deletingId && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in print:hidden">
                  <div className="bg-white rounded-[1.5rem] shadow-2xl w-full max-w-sm overflow-hidden animate-slide-up border border-slate-100">
                    <div className="p-6 text-center">
                      <div className="w-16 h-16 bg-rose-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-rose-100"><i className="fa-solid fa-plane-slash text-2xl text-rose-500"></i></div>
                      <h3 className="text-lg font-black text-slate-800 mb-1">Uçuşu İptal Et</h3>
                      <p className="text-slate-500 text-xs font-medium">Bu personeli listeden çıkarmak istediğinize emin misiniz? Bu işlem geri alınamaz.</p>
                    </div>
                    <div className="p-4 bg-slate-50 border-t border-slate-100 flex gap-2">
                      <button onClick={() => setDeletingId(null)} className="flex-1 py-2.5 rounded-lg font-bold text-slate-600 bg-white border border-slate-200 hover:bg-slate-100 transition-all text-sm">Vazgeç</button>
                      <button onClick={confirmDelete} className="flex-1 py-2.5 rounded-lg font-bold bg-rose-600 hover:bg-rose-700 text-white shadow-md shadow-rose-600/20 transition-all text-sm">Evet, Sil</button>
                    </div>
                  </div>
                </div>
              )}

              {/* Tümünü Temizle Onay Modalı */}
              {isDeletingAll && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in print:hidden">
                  <div className="bg-white rounded-[1.5rem] shadow-2xl w-full max-w-sm overflow-hidden animate-slide-up border border-slate-100">
                    <div className="p-6 text-center">
                      <div className="w-16 h-16 bg-rose-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-rose-100">
                        <i className="fa-solid fa-triangle-exclamation text-2xl text-rose-500"></i>
                      </div>
                      <h3 className="text-lg font-black text-slate-800 mb-1">Tüm Verileri Temizle</h3>
                      <p className="text-slate-500 text-xs font-medium leading-relaxed mt-2">Bu işlem <b>TÜM PERSONEL KAYITLARINI</b> kalıcı olarak silecektir. Yeni bir kampanya dönemine geçmek istediğinize emin misiniz?</p>
                    </div>
                    <div className="p-4 bg-slate-50 border-t border-slate-100 flex gap-2">
                      <button onClick={() => setIsDeletingAll(false)} className="flex-1 py-2.5 rounded-lg font-bold text-slate-600 bg-white border border-slate-200 hover:bg-slate-100 transition-all text-sm">İptal Et</button>
                      <button onClick={confirmDeleteAll} className="flex-1 py-2.5 rounded-lg font-bold bg-rose-600 hover:bg-rose-700 text-white shadow-md shadow-rose-600/20 transition-all text-sm">Evet, Tümünü Sil</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        // Yardımcı Render Fonksiyonları
        function EmployeeTable({ data, months, onEdit, onDelete, type }) {
          const isOld = type === 'old';
          const badgeColor = isOld ? 'bg-indigo-100 text-indigo-700' : 'bg-amber-100 text-amber-700';
          const typeLabel = isOld ? 'Eski' : 'Yeni';

          return (
            <div className="overflow-x-auto p-2 sm:p-5 bg-white/50">
                <table className="w-full text-left whitespace-nowrap border-separate border-spacing-y-2">
                  <thead className="text-[9px] sm:text-[10px] text-slate-400 uppercase">
                    <tr>
                      <th className="px-3 sm:px-4 py-2 font-black">Personel / Ofis</th>
                      <th className="px-2 sm:px-3 py-2 font-black text-center">Giriş</th>
                      <th className="px-2 sm:px-3 py-2 font-black text-right min-w-[100px]">Satışlar</th>
                      <th className="px-2 sm:px-3 py-2 font-black text-right text-rose-400">İade</th>
                      <th className="px-2 sm:px-3 py-2 font-black text-right text-cyan-500">Net Ciro</th>
                      <th className="px-2 sm:px-3 py-2 font-black text-right">Hedef / Kalan</th>
                      <th className="px-3 sm:px-4 py-2 font-black w-32 sm:w-40">İlerleme</th>
                      <th className="px-2 sm:px-3 py-2 font-black text-center">Durum</th>
                      <th className="px-3 sm:px-4 py-2 font-black text-center">İşlem</th>
                    </tr>
                  </thead>
                  <tbody>
                    {data.length === 0 ? (
                      <tr><td colSpan="9" className="py-10 text-center text-slate-400"><i className="fa-solid fa-plane text-3xl mb-2 opacity-20 block"></i>Kayıt bulunmuyor.</td></tr>
                    ) : data.map((emp) => (
                      <tr key={emp.id} className={`bg-white shadow-sm hover:shadow-md transition-shadow rounded-xl ${emp.isWinner ? 'border-l-4 border-l-emerald-500' : 'border-l-4 border-l-transparent'}`}>
                        <td className="px-3 sm:px-4 py-2.5 rounded-l-xl">
                          <div className="flex items-center gap-2.5">
                            <div className={`hidden sm:flex w-7 h-7 rounded-full items-center justify-center text-white font-bold text-[9px] ${getAvatarColor(emp.name)}`}>{getInitials(emp.name)}</div>
                            <div>
                                <div className={`font-black text-[11px] sm:text-xs ${emp.isWinner ? 'text-emerald-600' : 'text-slate-800'}`}>{emp.name}</div>
                                <div className="text-[9px] font-bold text-slate-400"><i className="fa-solid fa-location-dot text-[7px] mr-1"></i>{emp.office}</div>
                            </div>
                          </div>
                        </td>
                        <td className="px-2 sm:px-3 py-2.5 text-center">
                          <div className="text-[9px] font-bold text-slate-600">{formatDate(emp.entryDate)}</div>
                          <span className={`inline-block mt-0.5 px-1.5 py-0.5 rounded-md text-[8px] font-black uppercase ${badgeColor}`}>{typeLabel}</span>
                        </td>
                        <td className="px-2 sm:px-3 py-2.5 text-right text-[9px] font-bold text-slate-500 space-y-0.5">
                          {months.length === 0 ? '-' : months.map(m => (
                              <div key={m.id} className="flex justify-end gap-1.5"><span className="text-slate-300">{m.name.substring(0,3)}:</span><span className="text-slate-700">{formatTL(emp.sales[m.id] || 0)}</span></div>
                          ))}
                        </td>
                        <td className="px-2 sm:px-3 py-2.5 text-right text-rose-500 font-black text-[10px]">
                          {emp.returns > 0 ? <span className="bg-rose-50 px-1.5 py-0.5 rounded-md">-{formatTL(emp.returns)}</span> : '-'}
                        </td>
                        <td className="px-2 sm:px-3 py-2.5 text-right font-black text-cyan-600 text-[11px] sm:text-xs">{formatTL(emp.netRevenue)}</td>
                        <td className="px-2 sm:px-3 py-2.5 text-right">
                          <div className="text-[8px] sm:text-[9px] font-bold text-slate-400 border-b border-slate-50 pb-0.5 mb-0.5">H: {formatTL(emp.target)}</div>
                          <div className="text-[9px] sm:text-[10px] font-black text-slate-700">{formatTL(emp.remaining)}</div>
                        </td>
                        <td className="px-3 sm:px-4 py-2.5">
                          <div className="flex justify-between items-center mb-1"><span className={`text-[8px] sm:text-[9px] font-black ${emp.percentage >= 100 ? 'text-emerald-600' : 'text-cyan-600'}`}>% {emp.percentage.toFixed(1)}</span></div>
                          <div className="w-full bg-slate-100 rounded-full h-1.5 sm:h-2 relative overflow-hidden">
                            <div className={`h-full rounded-full transition-all duration-1000 ${emp.percentage >= 100 ? 'bg-gradient-to-r from-emerald-400 to-emerald-500' : emp.percentage < 30 ? 'bg-rose-400' : 'bg-gradient-to-r from-cyan-400 to-blue-500'}`} style={{ width: `${Math.min(emp.percentage, 100)}%` }}></div>
                          </div>
                        </td>
                        <td className="px-2 sm:px-3 py-2.5 text-center">
                          {emp.isWinner ? <span className="bg-emerald-100 text-emerald-600 px-1.5 py-0.5 sm:px-2 sm:py-1 rounded-md sm:rounded-lg text-[8px] sm:text-[9px] font-black"><i className="fa-solid fa-ticket mr-1"></i>BİLET ALDI</span> : <span className="bg-slate-100 text-slate-400 px-1.5 py-0.5 sm:px-2 sm:py-1 rounded-md sm:rounded-lg text-[8px] sm:text-[9px] font-black">BEKLİYOR</span>}
                        </td>
                        <td className="px-3 sm:px-4 py-2.5 text-center rounded-r-xl">
                          <div className="flex items-center justify-center gap-1 sm:gap-1.5">
                            <button onClick={()=>onEdit(emp)} className="w-6 h-6 sm:w-7 sm:h-7 bg-slate-50 hover:bg-cyan-50 text-slate-400 hover:text-cyan-600 rounded-md sm:rounded-lg transition-colors"><i className="fa-solid fa-pen text-[9px] sm:text-[10px]"></i></button>
                            <button onClick={()=>onDelete(emp.id)} className="w-6 h-6 sm:w-7 sm:h-7 bg-slate-50 hover:bg-rose-50 text-slate-400 hover:text-rose-600 rounded-md sm:rounded-lg transition-colors"><i className="fa-solid fa-trash text-[9px] sm:text-[10px]"></i></button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
            </div>
          );
        }

        function ReportListSection({ title, data, target, color }) {
          if (data.length === 0) return null;
          const isIndigo = color === 'indigo';
          return (
            <div className="mb-8">
              <div className={`flex justify-between items-end mb-3 pb-2 border-b border-dashed ${isIndigo ? 'border-indigo-200' : 'border-amber-200'}`}>
                <h3 className={`text-xs sm:text-sm font-black uppercase flex items-center gap-1.5 ${isIndigo ? 'text-indigo-600' : 'text-amber-500'}`}><i className="fa-solid fa-plane-up"></i> {title}</h3>
                <span className="text-[9px] sm:text-[10px] font-bold text-slate-400">Hedef: {formatTL(target)}</span>
              </div>
              <div className="rounded-xl sm:rounded-2xl overflow-hidden border border-slate-100 shadow-sm bg-white">
                <table className="w-full text-left whitespace-nowrap">
                  <thead className={`text-[9px] sm:text-[10px] font-black uppercase ${isIndigo ? 'bg-indigo-50/50 text-indigo-800' : 'bg-amber-50/50 text-amber-800'}`}>
                    <tr>
                      <th className="px-4 sm:px-6 py-3">Sıra</th>
                      <th className="px-4 sm:px-6 py-3">Yolcu</th>
                      <th className="px-4 sm:px-6 py-3 text-right">Ciro</th>
                      <th className="px-4 sm:px-6 py-3 text-right">Başarı</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-50">
                    {data.map((emp, index) => (
                      <tr key={emp.id} className="hover:bg-slate-50/50">
                        <td className="px-4 sm:px-6 py-2.5 sm:py-3 font-bold text-slate-400 text-[10px] sm:text-xs">#{index + 1}</td>
                        <td className="px-4 sm:px-6 py-2.5 sm:py-3"><div className="font-black text-xs sm:text-sm text-slate-800">{emp.name}</div><div className="text-[9px] sm:text-[10px] font-bold text-slate-400">{emp.office}</div></td>
                        <td className="px-4 sm:px-6 py-2.5 sm:py-3 text-right font-black text-emerald-600 text-[11px] sm:text-xs">{formatTL(emp.netRevenue)}</td>
                        <td className="px-4 sm:px-6 py-2.5 sm:py-3 text-right"><span className="bg-emerald-100 text-emerald-700 px-2 sm:px-3 py-1 rounded-lg text-[9px] sm:text-[10px] font-black">% {emp.percentage.toFixed(0)}</span></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
