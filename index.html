                            <h2 className="text-xl sm:text-2xl font-black uppercase tracking-widest drop-shadow-sm relative z-10">Eski Personel</h2>
                            <p className={`${isNightMode?'text-indigo-400':'text-indigo-200'} font-medium text-xs mt-0.5 relative z-10`}>Hedef: {formatTL(targetOld)}</p>
                        </div>
                        <div className="px-2 sm:px-6 -mt-6 relative z-20"><Podium data={processedOldData} /></div>
                        {dbStatus === 'loading' ? <SkeletonTable /> : <EmployeeTable data={processedOldData} months={months} onProfileClick={setSelectedProfile} type="old" isNightMode={isNightMode} />}
                      </div>

                      {/* Yeni Personel Bölümü */}
                      <div className={`rounded-[2rem] shadow-xl overflow-hidden ${isNightMode ? 'bg-slate-800 border border-slate-700' : 'bg-white/95 border border-slate-100'}`}>
                        <div className={`p-4 sm:p-5 text-white text-center relative overflow-hidden ${isNightMode ? 'bg-slate-900' : 'bg-gradient-to-r from-amber-500 to-orange-500'}`}>
                            <i className="fa-solid fa-star absolute -left-6 -bottom-6 text-7xl text-white/5 -rotate-12"></i>
                            <h2 className="text-xl sm:text-2xl font-black uppercase tracking-widest drop-shadow-sm relative z-10">Yeni Personel</h2>
                            <p className={`${isNightMode?'text-amber-500':'text-amber-100'} font-medium text-xs mt-0.5 relative z-10`}>Hedef: {formatTL(targetNew)}</p>
                        </div>
                        <div className="px-2 sm:px-6 -mt-6 relative z-20"><Podium data={processedNewData} /></div>
                        {dbStatus === 'loading' ? <SkeletonTable /> : <EmployeeTable data={processedNewData} months={months} onProfileClick={setSelectedProfile} type="new" isNightMode={isNightMode} />}
                      </div>
                    </div>

                    {/* Yüzen Ekleme Butonu (FAB) - SADECE ADMİN GÖREBİLİR */}
                    {isAdmin && (
                        <button onClick={openAddModal} className={`fixed bottom-6 right-6 sm:bottom-10 sm:right-10 w-14 h-14 rounded-full shadow-xl text-white flex items-center justify-center text-xl hover:scale-110 active:scale-95 transition-all z-40 animate-slide-up border border-white/20 ${isNightMode ? 'bg-amber-600 shadow-amber-900/50' : 'bg-gradient-to-r from-amber-400 to-orange-500 shadow-amber-500/40'}`}>
                            <i className="fa-solid fa-user-plus"></i>
                        </button>
                    )}
                  </div>
                )}

                {/* --- Raporlar Sekmesi --- */}
                {activeTab === 'reports' && (
                  <div className="max-w-4xl mx-auto animate-fade-in">
                    <div className="bg-white/95 backdrop-blur-md p-6 sm:p-10 rounded-[2rem] shadow-2xl border border-white/50 print:shadow-none print:border-none print:p-0 relative overflow-hidden">
                      <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-amber-400 via-orange-500 to-rose-500"></div>
                      
                      <div className="text-center mb-10 pb-6 border-b border-dashed border-slate-200">
                        <div className="flex justify-center mb-4 text-amber-500 drop-shadow-md relative inline-block mx-auto">
                          <i className="fa-solid fa-plane-departure text-5xl text-rose-500"></i>
                        </div>
                        <h1 className="text-2xl sm:text-4xl font-black text-slate-900 uppercase tracking-tighter mb-2">İhlas Pazarlama</h1>
                        <h2 className="text-lg sm:text-xl font-extrabold text-orange-600 uppercase tracking-widest mb-3">Antalya Tatili Sonuçları</h2>
                        <span className="bg-slate-100 text-slate-500 text-[10px] font-bold px-3 py-1 rounded-full uppercase border border-slate-200">Tarih: {new Date().toLocaleDateString('tr-TR')}</span>
                      </div>

                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-10">
                        <div className="text-center p-5 bg-slate-50 rounded-2xl border border-slate-100">
                          <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Görev Alan Personel</p>
                          <p className="text-4xl font-black text-slate-800">{employees.length}</p>
                        </div>
                        <div className="text-center p-5 bg-emerald-50 rounded-2xl border border-emerald-100 relative overflow-hidden">
                          <i className="fa-solid fa-ticket absolute -right-4 -bottom-4 text-emerald-500/10 text-5xl -rotate-45"></i>
                          <p className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest mb-1.5 relative z-10">Biletini Alanlar</p>
                          <p className="text-4xl font-black text-emerald-700 relative z-10">{totalWinners}</p>
                        </div>
                      </div>

                      <ReportListSection title="Eski Personel Uçuş Listesi" data={processedOldData.filter(e => e.isWinner)} target={targetOld} color="indigo" />
                      <div className="mt-8"><ReportListSection title="Yeni Personel Uçuş Listesi" data={processedNewData.filter(e => e.isWinner)} target={targetNew} color="amber" /></div>
                    </div>
                  </div>
                )}

                {/* --- Arşiv Sekmesi --- */}
                {activeTab === 'archives' && (
                  <div className="max-w-6xl mx-auto animate-fade-in print:hidden">
                    {!selectedArchive ? (
                        <>
                        <div className="mb-8 flex justify-between items-center">
                            <h2 className={`text-xl sm:text-2xl font-black uppercase tracking-widest ${isNightMode ? 'text-white' : 'text-slate-800'}`}>
                                <i className="fa-solid fa-box-archive mr-2 opacity-50"></i> Geçmiş Tatil Arşivleri
                            </h2>
                        </div>
                        
                        {archives.length === 0 ? (
                            <div className={`p-12 rounded-3xl text-center border-dashed border-2 ${isNightMode ? 'border-slate-700 bg-slate-800/50 text-slate-400' : 'border-slate-300 bg-white/50 text-slate-500'}`}>
                                <i className="fa-solid fa-folder-open text-6xl mb-4 opacity-30"></i>
                                <p className="font-bold text-lg">Henüz arşivlenmiş bir kayıt bulunmuyor.</p>
                                <p className="text-sm mt-2 opacity-70">Admin moduna geçerek ana sayfadan yeni arşiv oluşturabilirsiniz.</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                                {archives.map(arc => (
                                    <div key={arc.id} onClick={() => setSelectedArchive(arc)} className={`p-6 rounded-3xl cursor-pointer transition-transform hover:-translate-y-1 shadow-xl border relative overflow-hidden group ${isNightMode ? 'bg-slate-800 border-slate-700 hover:bg-slate-700' : 'bg-white border-slate-100 hover:shadow-2xl'}`}>
                                        <i className="fa-solid fa-plane absolute -right-4 -bottom-4 text-7xl opacity-[0.03] group-hover:opacity-[0.06] transition-opacity -rotate-12"></i>
                                        <div className="flex justify-between items-start mb-4 relative z-10">
                                            <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-xl shadow-inner ${isNightMode ? 'bg-indigo-900/50 text-indigo-400' : 'bg-cyan-50 text-cyan-600'}`}>
                                                <i className="fa-solid fa-plane-departure"></i>
                                            </div>
                                            <span className="text-[10px] font-bold opacity-50">{new Date(arc.dateArchived).toLocaleDateString('tr-TR')}</span>
                                        </div>
                                        <h3 className={`text-xl font-black mb-0.5 relative z-10 ${isNightMode ? 'text-white' : 'text-slate-800'}`}>{arc.month} {arc.year}</h3>
                                        <p className={`text-xs font-bold uppercase tracking-widest mb-5 relative z-10 ${isNightMode ? 'text-slate-400' : 'text-slate-500'}`}>Tatili</p>
                                        
                                        <div className="flex gap-4 border-t pt-4 relative z-10 border-slate-500/20">
                                            <div className="flex-1">
                                                <p className="text-[10px] font-bold opacity-60 uppercase">Personel</p>
                                                <p className={`text-lg font-black ${isNightMode ? 'text-slate-300' : 'text-slate-700'}`}>{arc.totalEmployees}</p>
                                            </div>
                                            <div className="flex-1">
                                                <p className="text-[10px] font-bold opacity-60 uppercase">Kazanan</p>
                                                <p className="text-lg font-black text-emerald-500">{arc.totalWinners}</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                        </>
                    ) : (
                        <div className="max-w-4xl mx-auto animate-fade-in relative">
                            <button onClick={() => setSelectedArchive(null)} className="absolute -top-12 sm:top-6 sm:-left-16 w-10 h-10 bg-slate-800/50 hover:bg-slate-800 text-white rounded-full flex items-center justify-center transition-colors z-20 backdrop-blur-md border border-white/20"><i className="fa-solid fa-arrow-left"></i></button>
                            
                            <div className="bg-white/95 backdrop-blur-md p-6 sm:p-10 rounded-[2rem] shadow-2xl border border-white/50 relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-indigo-400 via-purple-500 to-pink-500"></div>
                                
                                <div className="text-center mb-10 pb-6 border-b border-dashed border-slate-200">
                                    <div className="flex justify-center mb-4 text-indigo-500 drop-shadow-md">
                                        <i className="fa-solid fa-box-archive text-5xl"></i>
                                    </div>
                                    <h1 className="text-2xl sm:text-4xl font-black text-slate-900 uppercase tracking-tighter mb-2">İhlas Pazarlama</h1>
                                    <h2 className="text-lg sm:text-xl font-extrabold text-indigo-600 uppercase tracking-widest mb-3">{selectedArchive.month} {selectedArchive.year} Arşivi</h2>
                                    <span className="bg-slate-100 text-slate-500 text-[10px] font-bold px-3 py-1 rounded-full uppercase border border-slate-200">Arşivlenme: {new Date(selectedArchive.dateArchived).toLocaleDateString('tr-TR')}</span>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-10">
                                    <div className="text-center p-5 bg-slate-50 rounded-2xl border border-slate-100">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Görev Alan Personel</p>
                                        <p className="text-4xl font-black text-slate-800">{selectedArchive.totalEmployees}</p>
                                    </div>
                                    <div className="text-center p-5 bg-emerald-50 rounded-2xl border border-emerald-100 relative overflow-hidden">
                                        <i className="fa-solid fa-ticket absolute -right-4 -bottom-4 text-emerald-500/10 text-5xl -rotate-45"></i>
                                        <p className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest mb-1.5 relative z-10">Biletini Alanlar</p>
                                        <p className="text-4xl font-black text-emerald-700 relative z-10">{selectedArchive.totalWinners}</p>
                                    </div>
                                </div>

                                <ReportListSection title="Eski Personel Uçuş Listesi" data={selectedArchive.oldWinners || []} target={selectedArchive.targetOld} color="indigo" />
                                <div className="mt-8"><ReportListSection title="Yeni Personel Uçuş Listesi" data={selectedArchive.newWinners || []} target={selectedArchive.targetNew} color="amber" /></div>
                            </div>
                        </div>
                    )}
                  </div>
                )}
              </div>

              {/* --- ADMİN GİRİŞ MODALI (Statik E-posta / Şifre Destekli) --- */}
              {showAdminLogin && (
                <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-4 z-[60] animate-fade-in print:hidden">
                    <div className={`rounded-[1.5rem] shadow-2xl w-full max-w-sm overflow-hidden animate-slide-up border ${isNightMode ? 'bg-slate-800 border-slate-700 text-white' : 'bg-white border-slate-100'}`}>
                        <div className={`p-5 border-b flex justify-between items-center shrink-0 ${isNightMode ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-100'}`}>
                            <h2 className="text-lg font-black flex items-center gap-2">
                                <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${isNightMode ? 'bg-amber-600 text-white' : 'bg-amber-100 text-amber-600'}`}><i className="fa-solid fa-lock text-sm"></i></div>
                                Yönetici Girişi
                            </h2>
                            <button onClick={()=>setShowAdminLogin(false)} className={`w-8 h-8 rounded-full transition-colors flex items-center justify-center ${isNightMode ? 'bg-slate-700 hover:bg-rose-900 text-slate-300' : 'bg-white hover:bg-rose-50 text-slate-400'}`}><i className="fa-solid fa-xmark"></i></button>
                        </div>
                        <form onSubmit={handleAdminLoginSubmit}>
                            <div className="p-6">
                                <p className="opacity-70 text-xs font-medium leading-relaxed mb-5 text-center">Lütfen yönetici e-posta ve şifrenizi giriniz.</p>
                                
                                {adminError && <div className="mb-4 p-3 bg-rose-50 border border-rose-100 text-rose-600 rounded-xl text-xs font-bold text-center animate-pulse"><i className="fa-solid fa-circle-xmark mr-1.5"></i> {adminError}</div>}

                                <div className="space-y-3">
                                    <input required type="email" placeholder="E-posta Adresi" value={adminEmailInput} onChange={e=>setAdminEmailInput(e.target.value)} className={`w-full px-4 py-3 rounded-xl outline-none font-bold text-center text-sm transition-colors ${isNightMode ? 'bg-slate-900 text-white focus:ring-2 focus:ring-amber-500 border border-slate-700' : 'bg-slate-50 text-slate-800 focus:bg-white focus:ring-2 focus:ring-amber-400 border border-slate-200'}`} />
                                    
                                    <input required type="password" placeholder="Şifre" value={adminPasswordInput} onChange={e=>setAdminPasswordInput(e.target.value)} className={`w-full px-4 py-3 rounded-xl outline-none font-bold text-center tracking-widest text-lg transition-colors ${isNightMode ? 'bg-slate-900 text-white focus:ring-2 focus:ring-amber-500 border border-slate-700' : 'bg-slate-50 text-slate-800 focus:bg-white focus:ring-2 focus:ring-amber-400 border border-slate-200'}`} />
                                </div>
                            </div>
                            <div className={`p-4 border-t flex gap-2 ${isNightMode ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-100'}`}>
                                <button type="button" onClick={() => setShowAdminLogin(false)} className={`flex-1 py-3 rounded-xl font-bold transition-all text-sm ${isNightMode ? 'bg-slate-800 hover:bg-slate-700 text-white' : 'bg-white border border-slate-200 hover:bg-slate-100 text-slate-600'}`}>İptal</button>
                                <button type="submit" className={`flex-1 py-3 rounded-xl font-bold text-white shadow-md transition-all text-sm active:scale-95 ${isNightMode ? 'bg-amber-600 hover:bg-amber-700 shadow-amber-600/20' : 'bg-amber-500 hover:bg-amber-600 shadow-amber-500/30'}`}>Giriş Yap</button>
                            </div>
                        </form>
                    </div>
                </div>
              )}

              {/* --- YOLCU DETAY PANELI --- */}
              {selectedProfile && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in print:hidden">
                    <div className={`rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden animate-slide-up flex flex-col relative ${isNightMode ? 'bg-slate-800 border border-slate-700 text-white' : 'bg-white border border-slate-100 text-slate-800'}`}>
                        {/* Bilet Üst Kısmı */}
                        <div className={`p-6 relative overflow-hidden ${selectedProfile.isWinner ? 'bg-gradient-to-r from-emerald-500 to-teal-600' : (isNightMode ? 'bg-slate-900' : 'bg-gradient-to-r from-cyan-500 to-blue-600')} text-white`}>
                            <i className="fa-solid fa-plane absolute -right-6 -bottom-6 text-8xl text-white/10 -rotate-45"></i>
                            <button onClick={()=>setSelectedProfile(null)} className="absolute top-4 right-4 w-8 h-8 bg-black/20 rounded-full flex items-center justify-center hover:bg-black/40 transition-colors"><i className="fa-solid fa-xmark"></i></button>
                            
                            <div className="flex items-center gap-4 mb-4 relative z-10">
                                <div className={`w-16 h-16 rounded-2xl flex items-center justify-center text-2xl font-black shadow-lg border-2 border-white/50 ${getAvatarColor(selectedProfile.name)}`}>
                                    {getInitials(selectedProfile.name)}
                                </div>
                                <div>
                                    <div className="text-[10px] font-bold uppercase tracking-widest text-white/70">Yolcu Kartı</div>
                                    <h2 className="text-xl font-black leading-tight">{selectedProfile.name}</h2>
                                    <p className="text-sm font-medium text-white/80"><i className="fa-solid fa-location-dot text-xs mr-1"></i> {selectedProfile.office}</p>
                                </div>
                            </div>
                            {selectedProfile.isWinner && <div className="absolute top-6 right-16 text-emerald-200 border-2 border-emerald-200 px-2 py-1 rounded text-xs font-black uppercase -rotate-12">ONAYLANDI</div>}
                        </div>

                        {/* Bilet Detay / İstatistikler */}
                        <div className="p-6">
                            {selectedProfile.badges && selectedProfile.badges.length > 0 && (
                                <div className="flex flex-wrap gap-2 mb-5 pb-5 border-b border-dashed border-slate-200">
                                    {selectedProfile.badges.map((b,i) => (
                                        <span key={i} className={`px-2.5 py-1 rounded-lg text-[10px] font-black flex items-center gap-1.5 ${b.color}`}>{b.icon} {b.name}</span>
                                    ))}
                                </div>
                            )}

                            <div className="grid grid-cols-2 gap-4 mb-6">
                                <div className={`p-4 rounded-2xl ${isNightMode ? 'bg-slate-900' : 'bg-slate-50'}`}>
                                    <p className="text-[10px] font-bold uppercase tracking-widest opacity-50 mb-1">Hedef</p>
                                    <p className="text-lg font-black">{formatTL(selectedProfile.target)}</p>
                                </div>
                                <div className={`p-4 rounded-2xl ${isNightMode ? 'bg-indigo-900/40 text-indigo-400' : 'bg-cyan-50 text-cyan-600'}`}>
                                    <p className="text-[10px] font-bold uppercase tracking-widest opacity-60 mb-1">Net Ciro</p>
                                    <p className="text-lg font-black">{formatTL(selectedProfile.netRevenue)}</p>
                                </div>
                            </div>

                            {months.length > 0 && (
                                <div className="mb-6">
                                    <p className="text-[10px] font-bold uppercase tracking-widest opacity-50 mb-3"><i className="fa-solid fa-chart-column mr-1"></i> Performans Özeti</p>
                                    <div className="flex items-end gap-2 h-24 pt-4">
                                        {months.map(m => {
                                            const val = Number(selectedProfile.sales[m.id]) || 0;
                                            const maxSalesInMonths = Math.max(...months.map(x => Number(selectedProfile.sales[x.id])||0), 1);
                                            const heightPct = val > 0 ? Math.max((val / maxSalesInMonths) * 100, 10) : 0;
                                            return (
                                                <div key={m.id} className="flex-1 flex flex-col items-center gap-1 group">
                                                    <div className="w-full relative flex items-end justify-center h-full bg-slate-100 rounded-t-sm overflow-hidden">
                                                        <div className={`w-full bar-chart-fill rounded-t-sm ${selectedProfile.isWinner ? 'bg-emerald-400' : 'bg-cyan-400'}`} style={{height: `${heightPct}%`}}></div>
                                                        {val > 0 && <span className="absolute -top-4 text-[8px] font-bold opacity-0 group-hover:opacity-100 transition-opacity">{formatTL(val).split(' ')[0]}</span>}
                                                    </div>
                                                    <span className="text-[9px] font-bold opacity-50 uppercase">{m.name.substring(0,3)}</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    {selectedProfile.returns > 0 && <p className="text-[10px] text-rose-500 font-bold mt-2 text-right">İade Toplamı: -{formatTL(selectedProfile.returns)}</p>}
                                </div>
                            )}

                            <div className={`p-4 rounded-2xl border ${selectedProfile.percentage >= 100 ? 'bg-emerald-50/10 border-emerald-100/20' : 'bg-slate-50/10 border-slate-100/20'}`}>
                                <div className="flex justify-between items-center mb-2">
                                    <span className="text-[10px] font-bold uppercase tracking-widest opacity-60">Uçuş Durumu</span>
                                    <span className={`text-[12px] font-black ${selectedProfile.percentage >= 100 ? 'text-emerald-500' : 'text-cyan-500'}`}>% {selectedProfile.percentage.toFixed(1)}</span>
                                </div>
                                <div className="w-full bg-slate-200/30 rounded-full h-2 relative mb-3">
                                    <div className={`h-full rounded-full ${selectedProfile.percentage >= 100 ? 'bg-emerald-500' : 'bg-cyan-500'}`} style={{ width: `${Math.min(selectedProfile.percentage, 100)}%` }}></div>
                                </div>
                                <p className="text-[11px] font-medium leading-relaxed opacity-80 flex items-start gap-2">
                                    <i className="fa-solid fa-robot mt-0.5 opacity-50"></i> {getAIAdvice(selectedProfile)}
                                </p>
                            </div>
                        </div>

                        {/* Aksiyon Butonları (SADECE ADMIN GÖREBİLİR) */}
                        {isAdmin && (
                            <div className={`p-4 border-t flex gap-2 shrink-0 ${isNightMode ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-100'}`}>
                                <button onClick={()=>{ handleDeleteClick(selectedProfile.id); }} className={`flex-1 py-3 rounded-xl font-bold transition-all text-xs flex items-center justify-center gap-1.5 ${isNightMode ? 'bg-slate-800 text-rose-400 hover:bg-slate-700' : 'bg-white text-rose-500 border border-slate-200 hover:bg-rose-50'}`}><i className="fa-solid fa-trash"></i> Sil</button>
                                <button onClick={()=>{ handleEdit(selectedProfile); }} className={`flex-[2] py-3 rounded-xl font-bold transition-all text-xs flex items-center justify-center gap-1.5 text-white shadow-md active:scale-95 ${isNightMode ? 'bg-amber-600 hover:bg-amber-700' : 'bg-amber-500 hover:bg-amber-600'}`}><i className="fa-solid fa-pen"></i> Bilgileri Güncelle</button>
                            </div>
                        )}
                    </div>
                </div>
              )}

              {/* --- YENİ/DÜZENLE FORM MODALI --- */}
              {isModalOpen && isAdmin && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in print:hidden">
                    <div className={`rounded-[1.5rem] shadow-2xl w-full max-w-xl overflow-hidden animate-slide-up flex flex-col max-h-[90vh] ${isNightMode ? 'bg-slate-800 text-white border border-slate-700' : 'bg-white'}`}>
                        <div className={`p-5 border-b flex justify-between items-center shrink-0 ${isNightMode ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-100'}`}>
                            <h2 className="text-lg font-black flex items-center gap-2">
                                <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${isNightMode ? 'bg-amber-600 text-white' : 'bg-amber-100 text-amber-600'}`}><i className="fa-solid fa-id-card-clip text-sm"></i></div>
                                {editingId ? 'Yolcu Güncelle' : 'Yeni Yolcu Ekle'}
                            </h2>
                            <button onClick={()=>setIsModalOpen(false)} className={`w-8 h-8 rounded-full transition-colors flex items-center justify-center ${isNightMode ? 'bg-slate-700 hover:bg-rose-900 text-slate-300' : 'bg-white hover:bg-rose-50 text-slate-400'}`}><i className="fa-solid fa-xmark"></i></button>
                        </div>
                        
                        <div className="p-5 overflow-y-auto custom-scrollbar">
                            {formError && <div className="mb-4 p-3 bg-rose-50 border border-rose-100 text-rose-600 rounded-xl text-xs font-bold animate-pulse"><i className="fa-solid fa-triangle-exclamation mr-1.5"></i> {formError}</div>}
                            
                            <form id="employeeForm" onSubmit={handleFormSubmit} className="space-y-4">
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                    <div>
                                        <label className="block text-[10px] font-bold opacity-70 mb-1 uppercase tracking-wide ml-1">Ad Soyad</label>
                                        <input name="name" value={formData.name} onChange={handleInputChange} type="text" placeholder="Örn: Ahmet Yılmaz" className={`w-full px-3 py-2.5 rounded-lg outline-none font-bold text-sm ${isNightMode ? 'bg-slate-900 focus:ring-amber-500' : 'bg-slate-50 focus:bg-white focus:ring-2 focus:ring-amber-500 border border-slate-200'}`} />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-bold opacity-70 mb-1 uppercase tracking-wide ml-1">Ofis</label>
                                        <input name="office" value={formData.office} onChange={handleInputChange} type="text" placeholder="Örn: Yıldız Ofis" className={`w-full px-3 py-2.5 rounded-lg outline-none font-bold text-sm ${isNightMode ? 'bg-slate-900 focus:ring-amber-500' : 'bg-slate-50 focus:bg-white focus:ring-2 focus:ring-amber-500 border border-slate-200'}`} />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-[10px] font-bold opacity-70 mb-1 uppercase tracking-wide ml-1">İPAŞ Giriş Tarihi</label>
                                    <input type="date" name="entryDate" value={formData.entryDate} onChange={handleInputChange} className={`w-full px-3 py-2.5 rounded-lg outline-none font-bold text-sm ${isNightMode ? 'bg-slate-900 focus:ring-amber-500 text-slate-300' : 'bg-slate-50 focus:bg-white focus:ring-2 focus:ring-amber-500 border border-slate-200'}`} />
                                </div>
                                
                                <div className={`p-4 rounded-xl ${isNightMode ? 'bg-slate-900/50 border border-slate-700' : 'bg-slate-50/50 border border-slate-100'}`}>
                                    <label className={`block text-[10px] font-bold mb-3 uppercase tracking-widest ${isNightMode ? 'text-amber-500' : 'text-amber-600'}`}><i className="fa-solid fa-chart-line mr-1"></i> Aylık Satış Performansı</label>
                                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                        {months.map(m => (
                                            <div key={m.id}>
                                                <label className="block text-[9px] font-bold opacity-60 mb-1 ml-1">{m.name} (TL)</label>
                                                <input type="text" inputMode="numeric" value={formData.sales[m.id]?formatInputNumber(formData.sales[m.id]):''} onChange={e=>handleSalesChange(m.id, e.target.value)} placeholder="0" className={`w-full px-3 py-2 rounded-lg outline-none font-bold text-sm ${isNightMode ? 'bg-slate-800 focus:ring-amber-500' : 'bg-white focus:ring-2 focus:ring-amber-500 border border-slate-200'}`} />
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-[10px] font-bold text-rose-500 mb-1 uppercase tracking-wide ml-1">Toplam İade (TL)</label>
                                    <input name="returns" value={formData.returns?formatInputNumber(formData.returns):''} onChange={handleInputChange} type="text" inputMode="numeric" placeholder="0" className={`w-full px-3 py-2.5 rounded-lg outline-none font-black text-rose-500 text-sm ${isNightMode ? 'bg-rose-900/20 focus:ring-rose-500' : 'bg-rose-50 focus:bg-white focus:ring-2 focus:ring-rose-400 border border-rose-100'}`} />
                                </div>
                            </form>
                        </div>

                        <div className={`p-5 border-t flex gap-2 shrink-0 ${isNightMode ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-100'}`}>
                            <button onClick={()=>setIsModalOpen(false)} className={`flex-1 py-2.5 rounded-lg font-bold transition-all text-sm ${isNightMode ? 'bg-slate-800 hover:bg-slate-700' : 'bg-white border border-slate-200 hover:bg-slate-100 text-slate-600'}`}>İptal</button>
                            <button form="employeeForm" type="submit" disabled={months.length===0} className={`flex-[2] py-2.5 rounded-lg font-bold text-white transition-all flex items-center justify-center gap-1.5 text-sm active:scale-95 ${months.length===0 ? 'opacity-50 cursor-not-allowed bg-slate-500' : (isNightMode ? 'bg-amber-600 hover:bg-amber-700' : 'bg-gradient-to-r from-amber-500 to-orange-500 shadow-md')}`}>
                                <i className="fa-solid fa-floppy-disk"></i> {editingId ? 'Güncelle' : 'Kaydet'}
                            </button>
                        </div>
                    </div>
                </div>
              )}

              {/* --- ARŞİV OLUŞTURMA MODALI (SADECE ADMIN) --- */}
              {isArchiveModalOpen && isAdmin && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in print:hidden">
                    <div className={`rounded-[1.5rem] shadow-2xl w-full max-w-sm overflow-hidden animate-slide-up border ${isNightMode ? 'bg-slate-800 border-slate-700 text-white' : 'bg-white border-slate-100'}`}>
                        <div className={`p-5 border-b flex justify-between items-center shrink-0 ${isNightMode ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-100'}`}>
                            <h2 className="text-lg font-black flex items-center gap-2">
                                <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${isNightMode ? 'bg-indigo-600 text-white' : 'bg-indigo-100 text-indigo-600'}`}><i className="fa-solid fa-box-archive text-sm"></i></div>
                                Arşiv Oluştur
                            </h2>
                            <button onClick={()=>setIsArchiveModalOpen(false)} className={`w-8 h-8 rounded-full transition-colors flex items-center justify-center ${isNightMode ? 'bg-slate-700 hover:bg-rose-900 text-slate-300' : 'bg-white hover:bg-rose-50 text-slate-400'}`}><i className="fa-solid fa-xmark"></i></button>
                        </div>
                        <form onSubmit={handleArchiveSubmit}>
                            <div className="p-5">
                                <p className="opacity-70 text-xs font-medium leading-relaxed mb-4">Mevcut kampanyayı sonlandırıp güncel kazananları arşive kaldıracaksınız. Lütfen dönemi belirtin.</p>
                                
                                <div className="space-y-3">
                                    <div>
                                        <label className="block text-[10px] font-bold opacity-70 mb-1 uppercase tracking-wide ml-1">Kampanya Ayı</label>
                                        <select required value={archiveMonth} onChange={e=>setArchiveMonth(e.target.value)} className={`w-full px-3 py-2.5 rounded-lg outline-none font-bold text-sm ${isNightMode ? 'bg-slate-900 focus:ring-indigo-500' : 'bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 border border-slate-200'}`}>
                                            <option value="">Seçiniz...</option>
                                            <option value="Ocak">Ocak</option>
                                            <option value="Şubat">Şubat</option>
                                            <option value="Mart">Mart</option>
                                            <option value="Nisan">Nisan</option>
                                            <option value="Mayıs">Mayıs</option>
                                            <option value="Haziran">Haziran</option>
                                            <option value="Temmuz">Temmuz</option>
                                            <option value="Ağustos">Ağustos</option>
                                            <option value="Eylül">Eylül</option>
                                            <option value="Ekim">Ekim</option>
                                            <option value="Kasım">Kasım</option>
                                            <option value="Aralık">Aralık</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-bold opacity-70 mb-1 uppercase tracking-wide ml-1">Kampanya Yılı</label>
                                        <input required type="number" value={archiveYear} onChange={e=>setArchiveYear(e.target.value)} className={`w-full px-3 py-2.5 rounded-lg outline-none font-bold text-sm ${isNightMode ? 'bg-slate-900 focus:ring-indigo-500' : 'bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 border border-slate-200'}`} />
                                    </div>
                                </div>
                                <div className="mt-5 p-3 bg-amber-50 border border-amber-200 text-amber-800 rounded-xl text-xs font-bold">
                                    <i className="fa-solid fa-triangle-exclamation mr-1.5 text-amber-600"></i> Bu işlemi onayladığınızda, <b>mevcut tüm personel kayıtları</b> temizlenecek ve sadece başarılı personeller arşive aktarılacaktır.
                                </div>
                            </div>
                            <div className={`p-4 border-t flex gap-2 ${isNightMode ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-100'}`}>
                                <button type="button" onClick={() => setIsArchiveModalOpen(false)} className={`flex-1 py-2.5 rounded-lg font-bold transition-all text-sm ${isNightMode ? 'bg-slate-800 hover:bg-slate-700 text-white' : 'bg-white border border-slate-200 hover:bg-slate-100 text-slate-600'}`}>İptal Et</button>
                                <button type="submit" disabled={employees.length===0} className={`flex-1 py-2.5 rounded-lg font-bold text-white shadow-md transition-all text-sm active:scale-95 ${employees.length===0 ? 'bg-slate-500 opacity-50 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 shadow-indigo-600/20'}`}>Arşivle</button>
                            </div>
                        </form>
                    </div>
                </div>
              )}

              {/* Silme Onay Modalı */}
              {deletingId && isAdmin && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in print:hidden">
                  <div className={`rounded-[1.5rem] shadow-2xl w-full max-w-sm overflow-hidden animate-slide-up border ${isNightMode ? 'bg-slate-800 border-slate-700 text-white' : 'bg-white border-slate-100'}`}>
                    <div className="p-6 text-center">
                      <div className="w-16 h-16 bg-rose-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-rose-100"><i className="fa-solid fa-plane-slash text-2xl text-rose-500"></i></div>
                      <h3 className="text-lg font-black mb-1">Uçuşu İptal Et</h3>
                      <p className="opacity-70 text-xs font-medium">Bu personeli listeden çıkarmak istediğinize emin misiniz? Bu işlem geri alınamaz.</p>
                    </div>
                    <div className={`p-4 border-t flex gap-2 ${isNightMode ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-100'}`}>
                      <button onClick={() => setDeletingId(null)} className={`flex-1 py-2.5 rounded-lg font-bold transition-all text-sm ${isNightMode ? 'bg-slate-800 hover:bg-slate-700' : 'bg-white border border-slate-200 hover:bg-slate-100 text-slate-600'}`}>Vazgeç</button>
                      <button onClick={confirmDelete} className="flex-1 py-2.5 rounded-lg font-bold bg-rose-600 hover:bg-rose-700 text-white shadow-md shadow-rose-600/20 transition-all text-sm active:scale-95">Evet, Sil</button>
                    </div>
                  </div>
                </div>
              )}

              {/* Tümünü Temizle Onay Modalı */}
              {isDeletingAll && isAdmin && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in print:hidden">
                  <div className={`rounded-[1.5rem] shadow-2xl w-full max-w-sm overflow-hidden animate-slide-up border ${isNightMode ? 'bg-slate-800 border-slate-700 text-white' : 'bg-white border-slate-100'}`}>
                    <div className="p-6 text-center">
                      <div className="w-16 h-16 bg-rose-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-rose-500/20">
                        <i className="fa-solid fa-triangle-exclamation text-2xl text-rose-500"></i>
                      </div>
                      <h3 className="text-lg font-black mb-1">Tüm Verileri Temizle</h3>
                      <p className="opacity-70 text-xs font-medium leading-relaxed mt-2">Bu işlem <b>TÜM PERSONEL KAYITLARINI</b> kalıcı olarak silecektir. Arşiv oluşturmadan silmek istediğinize emin misiniz?</p>
                    </div>
                    <div className={`p-4 border-t flex gap-2 ${isNightMode ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-100'}`}>
                      <button onClick={() => setIsDeletingAll(false)} className={`flex-1 py-2.5 rounded-lg font-bold transition-all text-sm ${isNightMode ? 'bg-slate-800 hover:bg-slate-700' : 'bg-white border border-slate-200 hover:bg-slate-100 text-slate-600'}`}>İptal Et</button>
                      <button onClick={confirmDeleteAll} className="flex-1 py-2.5 rounded-lg font-bold bg-rose-600 hover:bg-rose-700 text-white shadow-md shadow-rose-600/20 transition-all text-sm active:scale-95">Tümünü Sil</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        // Yardımcı Render Fonksiyonları (Tablo)
        function EmployeeTable({ data, months, onProfileClick, type, isNightMode }) {
          const isOld = type === 'old';
          const badgeClass = isOld ? (isNightMode ? 'bg-indigo-900/50 text-indigo-300' : 'bg-indigo-100 text-indigo-700') : (isNightMode ? 'bg-amber-900/50 text-amber-300' : 'bg-amber-100 text-amber-700');
          const typeLabel = isOld ? 'Eski' : 'Yeni';

          return (
            <div className={`overflow-x-auto p-2 sm:p-5 ${isNightMode ? 'bg-slate-800/50' : 'bg-white/50'}`}>
                <table className="w-full text-left whitespace-nowrap border-separate border-spacing-y-2">
                  <thead className={`text-[9px] sm:text-[10px] uppercase ${isNightMode ? 'text-slate-500' : 'text-slate-400'}`}>
                    <tr>
                      <th className="px-3 sm:px-4 py-2 font-black">Personel / Ofis</th>
                      <th className="px-2 sm:px-3 py-2 font-black text-center">Giriş</th>
                      <th className="px-2 sm:px-3 py-2 font-black text-right min-w-[100px]">Satışlar</th>
                      <th className="px-2 sm:px-3 py-2 font-black text-right text-rose-400">İade</th>
                      <th className="px-2 sm:px-3 py-2 font-black text-right text-cyan-500">Net Ciro</th>
                      <th className="px-2 sm:px-3 py-2 font-black text-right">Hedef / Kalan</th>
                      <th className="px-3 sm:px-4 py-2 font-black w-32 sm:w-40">İlerleme</th>
                      <th className="px-2 sm:px-3 py-2 font-black text-center">Durum</th>
                    </tr>
                  </thead>
                  <tbody>
                    {data.length === 0 ? (
                      <tr><td colSpan="8" className="py-10 text-center opacity-40"><i className="fa-solid fa-plane text-3xl mb-2 block"></i>Kayıt bulunmuyor.</td></tr>
                    ) : data.map((emp) => (
                      <tr key={emp.id} onClick={()=>onProfileClick(emp)} className={`cursor-pointer transition-all rounded-xl transform hover:-translate-y-0.5 ${isNightMode ? 'bg-slate-800 hover:bg-slate-700 shadow-md' : 'bg-white shadow-sm hover:shadow-md'} ${emp.isWinner ? 'border-l-4 border-l-emerald-500' : 'border-l-4 border-l-transparent'}`}>
                        <td className="px-3 sm:px-4 py-2.5 rounded-l-xl">
                          <div className="flex items-center gap-2.5">
                            <div className={`hidden sm:flex w-8 h-8 rounded-full items-center justify-center text-white font-bold text-[10px] shadow-sm ${getAvatarColor(emp.name)}`}>{getInitials(emp.name)}</div>
                            <div>
                                <div className={`font-black text-[11px] sm:text-xs flex items-center gap-1.5 ${emp.isWinner ? 'text-emerald-500' : (isNightMode ? 'text-slate-200' : 'text-slate-800')}`}>
                                    {emp.name} {emp.badges && emp.badges.map((b,i)=><span key={i} title={b.name}>{b.icon}</span>)}
                                </div>
                                <div className="text-[9px] font-bold opacity-50 mt-0.5"><i className="fa-solid fa-location-dot text-[7px] mr-1"></i>{emp.office}</div>
                            </div>
                          </div>
                        </td>
                        <td className="px-2 sm:px-3 py-2.5 text-center">
                          <div className={`text-[9px] font-bold ${isNightMode ? 'text-slate-400' : 'text-slate-600'}`}>{formatDate(emp.entryDate)}</div>
                          <span className={`inline-block mt-1 px-1.5 py-0.5 rounded-md text-[8px] font-black uppercase ${badgeClass}`}>{typeLabel}</span>
                        </td>
                        <td className="px-2 sm:px-3 py-2.5 text-right text-[9px] font-bold opacity-70 space-y-0.5">
                          {months.length === 0 ? '-' : months.map(m => (
                              <div key={m.id} className="flex justify-end gap-1.5"><span className="opacity-50">{m.name.substring(0,3)}:</span><span>{formatTL(emp.sales[m.id] || 0)}</span></div>
                          ))}
                        </td>
                        <td className="px-2 sm:px-3 py-2.5 text-right text-rose-500 font-black text-[10px]">
                          {emp.returns > 0 ? <span className={`${isNightMode ? 'bg-rose-900/30' : 'bg-rose-50'} px-1.5 py-0.5 rounded-md`}>-{formatTL(emp.returns)}</span> : '-'}
                        </td>
                        <td className={`px-2 sm:px-3 py-2.5 text-right font-black text-[11px] sm:text-xs ${isNightMode ? 'text-indigo-400' : 'text-cyan-600'}`}>{formatTL(emp.netRevenue)}</td>
                        <td className="px-2 sm:px-3 py-2.5 text-right">
                          <div className="text-[8px] sm:text-[9px] font-bold opacity-50 border-b border-slate-500/20 pb-0.5 mb-0.5">H: {formatTL(emp.target)}</div>
                          <div className={`text-[9px] sm:text-[10px] font-black ${isNightMode ? 'text-slate-300' : 'text-slate-700'}`}>{formatTL(emp.remaining)}</div>
                        </td>
                        <td className="px-3 sm:px-4 py-2.5 rounded-r-xl sm:rounded-none">
                          <div className="flex justify-between items-center mb-1"><span className={`text-[8px] sm:text-[9px] font-black ${emp.percentage >= 100 ? 'text-emerald-500' : (isNightMode ? 'text-indigo-400' : 'text-cyan-600')}`}>% {emp.percentage.toFixed(1)}</span></div>
                          <div className={`w-full rounded-full h-1.5 sm:h-2 relative overflow-hidden ${isNightMode ? 'bg-slate-700' : 'bg-slate-100'}`}>
                            <div className={`h-full rounded-full transition-all duration-1000 ${emp.percentage >= 100 ? 'bg-gradient-to-r from-emerald-400 to-emerald-500' : emp.percentage < 30 ? 'bg-rose-500' : (isNightMode ? 'bg-indigo-500' : 'bg-cyan-500')}`} style={{ width: `${Math.min(emp.percentage, 100)}%` }}></div>
                          </div>
                        </td>
                        <td className="hidden sm:table-cell px-2 sm:px-3 py-2.5 text-center rounded-r-xl">
                          {emp.isWinner ? <span className="bg-emerald-500/20 text-emerald-600 px-2 py-1 rounded-lg text-[9px] font-black"><i className="fa-solid fa-ticket mr-1"></i>BİLET ALDI</span> : <span className={`px-2 py-1 rounded-lg text-[9px] font-black ${isNightMode ? 'bg-slate-700 text-slate-400' : 'bg-slate-100 text-slate-400'}`}>BEKLİYOR</span>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
            </div>
          );
        }

        function ReportListSection({ title, data, target, color }) {
          if (data.length === 0) return null;
          const isIndigo = color === 'indigo';
          return (
            <div className="mb-8">
              <div className={`flex justify-between items-end mb-3 pb-2 border-b border-dashed ${isIndigo ? 'border-indigo-200' : 'border-amber-200'}`}>
                <h3 className={`text-xs sm:text-sm font-black uppercase flex items-center gap-1.5 ${isIndigo ? 'text-indigo-600' : 'text-amber-500'}`}><i className="fa-solid fa-plane-up"></i> {title}</h3>
                <span className="text-[9px] sm:text-[10px] font-bold text-slate-400">Hedef: {formatTL(target)}</span>
              </div>
              <div className="rounded-xl sm:rounded-2xl overflow-hidden border border-slate-100 shadow-sm bg-white">
                <table className="w-full text-left whitespace-nowrap">
                  <thead className={`text-[9px] sm:text-[10px] font-black uppercase ${isIndigo ? 'bg-indigo-50/50 text-indigo-800' : 'bg-amber-50/50 text-amber-800'}`}>
                    <tr>
                      <th className="px-4 sm:px-6 py-3">Sıra</th>
                      <th className="px-4 sm:px-6 py-3">Yolcu</th>
                      <th className="px-4 sm:px-6 py-3 text-right">Ciro</th>
                      <th className="px-4 sm:px-6 py-3 text-right">Başarı</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-50">
                    {data.map((emp, index) => (
                      <tr key={emp.id} className="hover:bg-slate-50/50">
                        <td className="px-4 sm:px-6 py-2.5 sm:py-3 font-bold text-slate-400 text-[10px] sm:text-xs">#{index + 1}</td>
                        <td className="px-4 sm:px-6 py-2.5 sm:py-3"><div className="font-black text-xs sm:text-sm text-slate-800 flex items-center gap-1">{emp.name} {emp.badges && emp.badges.map((b,i)=><span key={i} title={b.name}>{b.icon}</span>)}</div><div className="text-[9px] sm:text-[10px] font-bold text-slate-400">{emp.office}</div></td>
                        <td className="px-4 sm:px-6 py-2.5 sm:py-3 text-right font-black text-emerald-600 text-[11px] sm:text-xs">{formatTL(emp.netRevenue)}</td>
                        <td className="px-4 sm:px-6 py-2.5 sm:py-3 text-right"><span className="bg-emerald-100 text-emerald-700 px-2 sm:px-3 py-1 rounded-lg text-[9px] sm:text-[10px] font-black">% {emp.percentage.toFixed(0)}</span></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
