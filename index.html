<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İhlas Pazarlama - Antalya Tatili Portalı</title>
    
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } }
                    }
                }
            }
        }
    </script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- PWA Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(()=>{});
            });
        }
    </script>

    <style>
        /* Scrollbar & Genel Ayarlar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { -webkit-tap-highlight-color: transparent; }
        
        /* Uçak Geçiş Animasyonu */
        @keyframes flightAnimation {
            0% { left: -20%; bottom: 10%; transform: rotate(15deg) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { left: 120%; bottom: 80%; transform: rotate(25deg) scale(1.5); opacity: 0; }
        }
        .airplane-flyby {
            position: fixed; z-index: 9999; pointer-events: none;
            animation: flightAnimation 2.5s ease-in-out forwards;
            color: #fff; filter: drop-shadow(0 20px 20px rgba(0, 0, 0, 0.4));
        }

        /* Progress Bar Suyu */
        .water-fill {
            background: linear-gradient(90deg, #06b6d4 0%, #3b82f6 50%, #06b6d4 100%);
            background-size: 200% 200%;
            animation: gradientMove 3s ease infinite;
        }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Grafik Çubukları Animasyonu */
        .bar-chart-fill {
            transition: height 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { initializeFirestore, persistentLocalCache, persistentMultipleTabManager, collection, query, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useMemo, useEffect, useRef } = React;

        // --- Firebase Başlatma ---
        const firebaseConfig = {
            apiKey: "AIzaSyCsowA7JoTC_maRfzojfXXdg75OM3HLCsI",
            authDomain: "tatil-6fcb9.firebaseapp.com",
            projectId: "tatil-6fcb9",
            storageBucket: "tatil-6fcb9.firebasestorage.app",
            messagingSenderId: "234528583159",
            appId: "1:234528583159:web:4b5dfe518bfa8669b252f2"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // Çevrimdışı destekli Firestore Başlatma
        const db = initializeFirestore(app, {
            localCache: persistentLocalCache({tabManager: persistentMultipleTabManager()})
        });
        const appId = "tatil-6fcb9"; 

        // --- Yardımcı Fonksiyonlar ---
        const formatTL = (amount) => new Intl.NumberFormat('tr-TR', { maximumFractionDigits: 0 }).format(amount) + ' ₺';
        const formatInputNumber = (val) => {
          if (val === 0) return '0';
          if (!val) return '';
          const cleanVal = val.toString().replace(/\D/g, '');
          return cleanVal ? new Intl.NumberFormat('tr-TR').format(cleanVal) : '';
        };
        const parseInputNumber = (val) => val ? Number(val.toString().replace(/\D/g, '')) : 0;
        const formatDate = (dateString) => {
          if (!dateString) return '-';
          const date = new Date(dateString);
          return isNaN(date.getTime()) ? '-' : date.toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        };
        const getInitials = (name) => {
            if (!name) return "?";
            const words = name.trim().split(' ');
            if (words.length === 1) return words[0].substring(0, 2).toUpperCase();
            return (words[0][0] + words[words.length - 1][0]).toUpperCase();
        };
        const getAvatarColor = (name) => {
            const colors = ['bg-blue-500', 'bg-emerald-500', 'bg-amber-500', 'bg-rose-500', 'bg-purple-500', 'bg-cyan-500', 'bg-indigo-500'];
            let sum = 0;
            for(let i=0; i<name.length; i++) sum += name.charCodeAt(i);
            return colors[sum % colors.length];
        };

        // Ses Efektleri Sentezleyici
        const playSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'swoosh') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(150, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.8);
                    gain.gain.setValueAtTime(0, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.4);
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.8);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.8);
                } else if (type === 'cheer') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(400, ctx.currentTime);
                    osc.frequency.setValueAtTime(600, ctx.currentTime + 0.1);
                    osc.frequency.setValueAtTime(800, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.5);
                }
            } catch(e) {}
        };

        // --- Alt Bileşenler ---

        const CountdownTimer = () => {
            const targetDate = new Date('2026-04-01T00:00:00').getTime();
            const [timeLeft, setTimeLeft] = useState(targetDate - new Date().getTime());

            useEffect(() => {
                const interval = setInterval(() => {
                    const now = new Date().getTime();
                    const distance = targetDate - now;
                    setTimeLeft(distance);
                    if (distance < 0) clearInterval(interval);
                }, 1000);
                return () => clearInterval(interval);
            }, [targetDate]);

            const isExpired = timeLeft < 0;
            const days = isExpired ? 0 : Math.floor(timeLeft / (1000 * 60 * 60 * 24));
            const hours = isExpired ? 0 : Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = isExpired ? 0 : Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));

            return (
                <div className="flex flex-col items-center justify-center bg-white/10 backdrop-blur-md rounded-3xl p-6 shadow-2xl border border-white/20 text-white w-full md:w-auto h-full">
                    <h3 className="text-sm font-bold uppercase tracking-widest mb-4 opacity-90"><i className="fa-regular fa-clock"></i> TATİL SÜRECİ</h3>
                    <div className="flex gap-4 sm:gap-6 text-center">
                        <div className="flex flex-col"><span className="text-4xl sm:text-5xl font-black drop-shadow-md">{days.toString().padStart(2, '0')}</span><span className="text-[10px] sm:text-xs font-bold opacity-80 mt-1 uppercase tracking-wider">GÜN</span></div>
                        <div className="text-3xl sm:text-4xl font-black opacity-50 mt-1">:</div>
                        <div className="flex flex-col"><span className="text-4xl sm:text-5xl font-black drop-shadow-md">{hours.toString().padStart(2, '0')}</span><span className="text-[10px] sm:text-xs font-bold opacity-80 mt-1 uppercase tracking-wider">SAAT</span></div>
                        <div className="text-3xl sm:text-4xl font-black opacity-50 mt-1">:</div>
                        <div className="flex flex-col"><span className="text-4xl sm:text-5xl font-black drop-shadow-md">{minutes.toString().padStart(2, '0')}</span><span className="text-[10px] sm:text-xs font-bold opacity-80 mt-1 uppercase tracking-wider">DAKİKA</span></div>
                    </div>
                    {isExpired && (
                        <div className="mt-5 pt-4 border-t border-white/20 w-full text-center animate-fade-in">
                            <span className="bg-white/20 px-4 py-1.5 rounded-full text-sm font-black tracking-wide drop-shadow-sm">SÜRE DOLDU</span>
                            <p className="text-xs font-medium mt-3 text-white/90 italic">"Bir sonraki tatilde görüşmek üzere..." 🌴</p>
                        </div>
                    )}
                </div>
            );
        };

        const Podium = ({ data }) => {
            if (data.length === 0) return null;
            const top3 = [...data].sort((a,b) => {
                if(b.percentage === a.percentage) return b.netRevenue - a.netRevenue;
                return b.percentage - a.percentage;
            }).slice(0, 3);

            const renderCard = (emp, rank) => {
                if(!emp) return <div className="w-1/3 opacity-0"></div>;
                const colors = {
                    1: 'from-amber-300 to-yellow-500 border-yellow-200 text-yellow-900',
                    2: 'from-slate-200 to-slate-400 border-slate-200 text-slate-800',
                    3: 'from-orange-300 to-orange-500 border-orange-200 text-orange-900'
                };
                const medals = { 1: '🥇', 2: '🥈', 3: '🥉' };
                const heights = { 1: 'h-36 sm:h-44 z-10 scale-105', 2: 'h-28 sm:h-36', 3: 'h-24 sm:h-32' };

                return (
                    <div key={emp.id} className={`w-1/3 flex flex-col items-center justify-end transition-transform hover:-translate-y-2 duration-300 ${heights[rank]}`}>
                        <div className="relative mb-2">
                            <div className={`w-10 h-10 sm:w-14 sm:h-14 rounded-full flex items-center justify-center text-white font-black text-sm sm:text-base shadow-md border-2 border-white ${getAvatarColor(emp.name)}`}>
                                {getInitials(emp.name)}
                            </div>
                            <div className="absolute -top-3 -right-2 text-lg sm:text-xl drop-shadow-sm">{medals[rank]}</div>
                        </div>
                        <div className={`w-full bg-gradient-to-b ${colors[rank]} rounded-t-xl shadow-md flex flex-col items-center p-2 sm:p-3 text-center h-full border-t border-x relative overflow-hidden`}>
                            <div className="absolute inset-0 bg-white/20 pattern-dots"></div>
                            <span className="relative z-10 text-[9px] sm:text-[11px] font-black uppercase truncate w-full px-1">{emp.name.split(' ')[0]}</span>
                            <span className="relative z-10 text-[10px] sm:text-xs font-black mt-1 bg-white/30 px-1.5 py-0.5 rounded-md">% {emp.percentage.toFixed(0)}</span>
                            {emp.isWinner && <span className="relative z-10 mt-auto text-[7px] sm:text-[9px] font-black bg-white/50 px-1.5 py-0.5 rounded-full uppercase"><i className="fa-solid fa-plane"></i> Gidiyor</span>}
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex items-end justify-center max-w-md mx-auto pt-6 pb-2 gap-1 sm:gap-2">
                    {renderCard(top3[1], 2)}
                    {renderCard(top3[0], 1)}
                    {renderCard(top3[2], 3)}
                </div>
            );
        };

        const SkeletonTable = () => (
            <div className="space-y-4 p-4">
                {[1,2,3].map(i => (
                    <div key={i} className="flex items-center gap-4">
                        <div className="w-10 h-10 rounded-full skeleton shrink-0"></div>
                        <div className="flex-1 space-y-2">
                            <div className="h-4 w-1/3 rounded skeleton"></div>
                            <div className="h-3 w-1/4 rounded skeleton"></div>
                        </div>
                        <div className="w-24 h-6 rounded-full skeleton shrink-0"></div>
                    </div>
                ))}
            </div>
        );

        // --- Ana Uygulama ---
        function App() {
          const [user, setUser] = useState(null);
          const [dbStatus, setDbStatus] = useState('loading'); 
          const [employees, setEmployees] = useState([]); 
          const [archives, setArchives] = useState([]);

          // --- ADMIN YETKİLENDİRME STATE'LERİ ---
          const [isAdmin, setIsAdmin] = useState(false);
          const [showAdminLogin, setShowAdminLogin] = useState(false);
          const [adminEmailInput, setAdminEmailInput] = useState('');
          const [adminPasswordInput, setAdminPasswordInput] = useState('');
          const [adminError, setAdminError] = useState('');

          // UI States
          const [activeTab, setActiveTab] = useState('dashboard');
          const [flightKey, setFlightKey] = useState(0);
          const flightTimeoutRef = useRef(null);
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [isDeletingAll, setIsDeletingAll] = useState(false);
          const [settingsSaved, setSettingsSaved] = useState(false);
          
          // Profil & Arşiv Modalı
          const [selectedProfile, setSelectedProfile] = useState(null); 
          const [searchTerm, setSearchTerm] = useState('');
          const [filterOffice, setFilterOffice] = useState('All');
          
          // Arşivleme State'leri
          const [isArchiveModalOpen, setIsArchiveModalOpen] = useState(false);
          const [archiveMonth, setArchiveMonth] = useState('');
          const [archiveYear, setArchiveYear] = useState(new Date().getFullYear().toString());
          const [selectedArchive, setSelectedArchive] = useState(null);

          // Tema Ayarı
          const [isNightMode, setIsNightMode] = useState(false);
          
          // Canlı Hava Durumu Ayarı
          const [weather, setWeather] = useState({ temp: null, desc: '', icon: '' });

          // Settings
          const [months, setMonths] = useState([{ id: 'm1', name: 'Ocak' }, { id: 'm2', name: 'Şubat' }, { id: 'm3', name: 'Mart' }]);
          const [newMonthName, setNewMonthName] = useState('');
          const [targetOld, setTargetOld] = useState(1200000);
          const [targetNew, setTargetNew] = useState(800000);
          const [cutoffDate, setCutoffDate] = useState('2026-01-01');
          const [showSettings, setShowSettings] = useState(false);

          // Form
          const [formData, setFormData] = useState({ name: '', office: '', entryDate: '', sales: {}, returns: '' });
          const [editingId, setEditingId] = useState(null);
          const [deletingId, setDeletingId] = useState(null);
          const [formError, setFormError] = useState('');

          // Saat Kontrolü (Atmosfer)
          useEffect(() => {
              const checkTime = () => {
                  const hour = new Date().getHours();
                  setIsNightMode(hour >= 19 || hour < 6); 
              };
              checkTime();
              const timer = setInterval(checkTime, 60000);
              return () => clearInterval(timer);
          }, []);

          // Canlı Hava Durumu Çekimi (Open-Meteo)
          useEffect(() => {
              const fetchWeather = async () => {
                  const CACHE_KEY = 'antalya_weather_data';
                  const CACHE_TIME_KEY = 'antalya_weather_time';
                  const cacheTime = localStorage.getItem(CACHE_TIME_KEY);
                  const now = new Date().getTime();

                  // Cache'i kontrol et. 3 saat (10800000 ms) geçmediyse cache'den kullan
                  if (cacheTime && (now - parseInt(cacheTime) < 10800000)) {
                      const cachedData = localStorage.getItem(CACHE_KEY);
                      if (cachedData) {
                          setWeather(JSON.parse(cachedData));
                          return;
                      }
                  }

                  try {
                      // Antalya için Open-Meteo üzerinden veri çek
                      const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=36.9081&longitude=30.6956&current=temperature_2m,weather_code,is_day&timezone=Europe%2FIstanbul');
                      const data = await res.json();
                      const temp = Math.round(data.current.temperature_2m);
                      const code = data.current.weather_code;
                      const isDay = data.current.is_day;

                      let desc = 'Güneşli';
                      let icon = isDay ? '☀️' : '🌙';

                      // WMO Hava Durumu Yorumlama Kodları
                      if (code === 0) { desc = isDay ? 'Güneşli' : 'Açık'; icon = isDay ? '☀️' : '🌙'; }
                      else if (code === 1 || code === 2) { desc = isDay ? 'Az Bulutlu' : 'Açık'; icon = isDay ? '🌤️' : '☁️'; }
                      else if (code === 3) { desc = 'Çok Bulutlu'; icon = '☁️'; }
                      else if (code >= 45 && code <= 48) { desc = 'Sisli'; icon = '🌫️'; }
                      else if (code >= 51 && code <= 55) { desc = 'Çisenti'; icon = '🌧️'; }
                      else if (code >= 61 && code <= 65) { desc = 'Yağmurlu'; icon = '🌧️'; }
                      else if (code >= 71 && code <= 77) { desc = 'Kar Yağışlı'; icon = '❄️'; }
                      else if (code >= 95) { desc = 'Fırtınalı'; icon = '⛈️'; }

                      const weatherData = { temp, desc, icon };
                      setWeather(weatherData);
                      
                      // Önbelleğe kaydet
                      localStorage.setItem(CACHE_KEY, JSON.stringify(weatherData));
                      localStorage.setItem(CACHE_TIME_KEY, now.toString());
                  } catch (err) {
                      console.error("Hava durumu çekilirken bir sorun oluştu", err);
                  }
              };

              fetchWeather();
          }, []);

          const uniqueOffices = useMemo(() => {
              const offices = employees.map(e => e.office).filter(Boolean);
              return [...new Set(offices)].sort();
          }, [employees]);

          // Statik şifre kontrolü için Auth dinleyicisi düzenlendi
          useEffect(() => {
            const unsubscribe = onAuthStateChanged(auth, async (u) => {
              if (u) {
                setUser(u);
                setDbStatus('connected');
              } else {
                try {
                  await signInAnonymously(auth);
                } catch(err) {
                  setDbStatus('error');
                }
              }
            });
            return () => unsubscribe();
          }, []);

          // Çalışanları Çek
          useEffect(() => {
            if (!user) return; 
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'employees'));
            const unsubscribe = onSnapshot(q, (snapshot) => {
              const data = [];
              snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
              setEmployees(data);
              setDbStatus('connected');
            }, (err) => setDbStatus('error'));
            return () => unsubscribe();
          }, [user]);

          // Arşivleri Çek
          useEffect(() => {
            if (!user) return;
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'archives'));
            const unsubscribe = onSnapshot(q, (snapshot) => {
                const data = [];
                snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                data.sort((a, b) => b.dateArchived - a.dateArchived); 
                setArchives(data);
            }, (err) => console.log("Arşivler çekilemedi", err));
            return () => unsubscribe();
          }, [user]);

          // Ayarları Çek
          useEffect(() => {
            if (!user) return;
            const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'main');
            const unsubscribe = onSnapshot(settingsRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.targetOld !== undefined) setTargetOld(data.targetOld);
                    if (data.targetNew !== undefined) setTargetNew(data.targetNew);
                    if (data.cutoffDate) setCutoffDate(data.cutoffDate);
                    if (data.months) setMonths(data.months);
                }
            });
            return () => unsubscribe();
          }, [user]);

          // --- ADMIN GİRİŞ İŞLEMİ (Statik E-Posta / Şifre) ---
          const handleAdminLoginSubmit = (e) => {
            e.preventDefault();
            if (adminEmailInput === 'admin@ihlas.com' && adminPasswordInput === '190546') {
                setIsAdmin(true);
                setShowAdminLogin(false);
                setAdminPasswordInput('');
                setAdminEmailInput('');
                setAdminError('');
            } else {
                setAdminError('E-posta veya şifre hatalı.');
            }
          };

          const handleAdminLogout = () => {
              setIsAdmin(false);
          };

          const handleTabChange = (tabName) => {
            if (activeTab !== tabName) {
              setFlightKey(Date.now()); 
              playSound('swoosh');
              
              if (flightTimeoutRef.current) clearTimeout(flightTimeoutRef.current);
              flightTimeoutRef.current = setTimeout(() => setFlightKey(0), 2500);
            }
            setActiveTab(tabName); 
            setSelectedArchive(null);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          // --- Ayarlar & Temizleme İşlemleri ---
          const handleAddMonth = () => {
            if (!newMonthName.trim()) return;
            setMonths([...months, { id: 'm' + Date.now(), name: newMonthName.trim() }]);
            setNewMonthName('');
          };
          const handleRemoveMonth = (idToRemove) => setMonths(months.filter(m => m.id !== idToRemove));
          
          const handleSaveSettings = async () => {
              if (dbStatus !== 'connected') return;
              try {
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'main'), { targetOld, targetNew, cutoffDate, months });
                  setSettingsSaved(true); setTimeout(() => setSettingsSaved(false), 3000);
              } catch (err) {}
          };

          const confirmDeleteAll = async () => {
              if (dbStatus !== 'connected') return;
              try {
                  const promises = employees.map(emp => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'employees', emp.id.toString())));
                  await Promise.all(promises);
                  setIsDeletingAll(false);
              } catch (err) {}
          };

          const isNewEmployee = (dateStr) => {
            if (!dateStr || !cutoffDate) return false;
            const empDate = new Date(dateStr);
            const cutDate = new Date(cutoffDate);
            if (isNaN(empDate.getTime()) || isNaN(cutDate.getTime())) return false;
            return empDate >= cutDate;
          };

          // Gelişmiş Veri İşleme
          const processData = (isNewType) => {
            let filtered = employees.filter(emp => isNewEmployee(emp.entryDate) === isNewType);
            
            if (searchTerm) {
                filtered = filtered.filter(e => e.name.toLowerCase().includes(searchTerm.toLowerCase()));
            }
            if (filterOffice !== 'All') {
                filtered = filtered.filter(e => e.office === filterOffice);
            }

            const processed = filtered.map(emp => {
                const totalSales = months.reduce((sum, m) => sum + (Number(emp.sales[m.id]) || 0), 0);
                const netRevenue = totalSales - (Number(emp.returns) || 0);
                const currentTarget = Number(isNewType ? targetNew : targetOld) || 0;
                const remaining = currentTarget - netRevenue;
                let percentage = currentTarget > 0 ? (netRevenue / currentTarget) * 100 : 0;
                
                return { ...emp, target: currentTarget, totalSales, netRevenue, remaining: Math.max(0, remaining), percentage, isWinner: currentTarget > 0 && netRevenue >= currentTarget, badges: [] };
            }).sort((a, b) => b.percentage - a.percentage);

            if (processed.length > 0) {
                const maxCiro = Math.max(...processed.map(e => e.netRevenue));
                if (maxCiro > 0) {
                    processed.forEach(e => { if(e.netRevenue === maxCiro) e.badges.push({icon: '👑', name: 'Ciro Kralı', color: 'text-amber-500 bg-amber-100'}); });
                }
                processed.forEach(e => { if(e.returns === 0 && e.netRevenue > 0) e.badges.push({icon: '🛡️', name: 'Kusursuz', color: 'text-indigo-500 bg-indigo-100'}); });
            }

            return processed;
          };

          const processedOldData = useMemo(() => processData(false), [employees, targetOld, cutoffDate, months, searchTerm, filterOffice]);
          const processedNewData = useMemo(() => processData(true), [employees, targetNew, cutoffDate, months, searchTerm, filterOffice]);
          const totalWinners = processedOldData.filter(e => e.isWinner).length + processedNewData.filter(e => e.isWinner).length;

          // --- Arşivleme İşlemi ---
          const handleArchiveSubmit = async (e) => {
            e.preventDefault();
            if (!archiveMonth || !archiveYear || employees.length === 0) return;
            
            const archiveData = {
                month: archiveMonth,
                year: archiveYear,
                dateArchived: Date.now(),
                targetOld: targetOld,
                targetNew: targetNew,
                totalEmployees: employees.length,
                totalWinners: totalWinners,
                oldWinners: processedOldData.filter(e => e.isWinner).map((e, index) => ({id: index, name: e.name, office: e.office, netRevenue: e.netRevenue, percentage: e.percentage, badges: e.badges})),
                newWinners: processedNewData.filter(e => e.isWinner).map((e, index) => ({id: index, name: e.name, office: e.office, netRevenue: e.netRevenue, percentage: e.percentage, badges: e.badges}))
            };

            try {
                await setDoc(doc(collection(db, 'artifacts', appId, 'public', 'data', 'archives'), Date.now().toString()), archiveData);
                const promises = employees.map(emp => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'employees', emp.id.toString())));
                await Promise.all(promises);
                
                setIsArchiveModalOpen(false);
                setArchiveMonth('');
                handleTabChange('archives');
            } catch(err) {
                console.error("Arşivleme hatası:", err);
            }
          };

          // --- Form Modalı İşlemleri ---
          const openAddModal = () => {
              setFormData({ name: '', office: '', entryDate: '', sales: {}, returns: '' });
              setEditingId(null); setFormError(''); setIsModalOpen(true);
          };
          
          const handleEdit = (employee) => {
            setFormData({ name: employee.name, office: employee.office, entryDate: employee.entryDate || '', sales: { ...employee.sales }, returns: employee.returns || '' });
            setEditingId(employee.id); setFormError(''); setIsModalOpen(true); setSelectedProfile(null);
          };

          const handleInputChange = (e) => {
            const { name, value } = e.target;
            if (name === 'returns') setFormData(prev => ({ ...prev, [name]: parseInputNumber(value) }));
            else setFormData(prev => ({ ...prev, [name]: value }));
            if (formError) setFormError('');
          };

          const handleSalesChange = (monthId, value) => {
            setFormData(prev => ({ ...prev, sales: { ...prev.sales, [monthId]: parseInputNumber(value) } }));
          };

          const handleFormSubmit = async (e) => {
            e.preventDefault();
            if (!formData.name || !formData.office || !formData.entryDate) {
              setFormError("Lütfen isim, ofis ve giriş tarihini doldurunuz."); setTimeout(() => setFormError(''), 4000); return;
            }
            const cleanSales = {};
            months.forEach(m => { cleanSales[m.id] = Number(formData.sales[m.id]) || 0; });
            const payload = { office: formData.office.toUpperCase(), name: formData.name.toUpperCase(), entryDate: formData.entryDate, sales: cleanSales, returns: Number(formData.returns) || 0 };

            try {
              const employeesRef = collection(db, 'artifacts', appId, 'public', 'data', 'employees');
              if (editingId) { await setDoc(doc(employeesRef, editingId.toString()), payload); } 
              else {
                await setDoc(doc(employeesRef, Date.now().toString()), payload);
                const tempNet = Object.values(cleanSales).reduce((a,b)=>a+b,0) - (Number(formData.returns)||0);
                if((isNewEmployee(formData.entryDate) ? targetNew : targetOld) > 0 && tempNet >= (isNewEmployee(formData.entryDate) ? targetNew : targetOld)) {
                    playSound('cheer');
                }
              }
              setIsModalOpen(false);
            } catch (err) { setFormError("Bağlantı hatası oluştu."); }
          };

          const handleDeleteClick = (id) => { setDeletingId(id); setSelectedProfile(null); };
          const confirmDelete = async () => {
            if (deletingId) {
              try { await deleteDoc(doc(collection(db, 'artifacts', appId, 'public', 'data', 'employees'), deletingId.toString())); } catch (err) {}
              setDeletingId(null);
            }
          };

          // Tema URL'leri
          const bgImageUrl = (activeTab === 'reports' || (activeTab === 'archives' && selectedArchive))
            ? "url('https://images.unsplash.com/photo-1510414842594-a61c69b5ae57?q=80&w=2070&auto=format&fit=crop')" 
            : isNightMode 
                ? "url('https://images.unsplash.com/photo-1534008757030-27299c4371b6?q=80&w=2070&auto=format&fit=crop')" 
                : "url('https://images.unsplash.com/photo-1499793983690-e29da59ef1c2?q=80&w=2062&auto=format&fit=crop')"; 

          const overlayClass = isNightMode 
            ? "bg-slate-900/70 backdrop-blur-[6px]" 
            : "bg-cyan-900/40 sm:bg-white/60 backdrop-blur-md";

          const getAIAdvice = (emp) => {
              if (emp.isWinner) return "Harika iş çıkardın! Valizini hazırlamaya başla. 🏖️";
              if (emp.percentage > 75) return "Çok yaklaştın! Sadece ufak bir itici güce ihtiyacın var, gaza bas! 🚀";
              if (emp.percentage > 40) return "İyi gidiyorsun ama Antalya için tempoyu biraz daha artırmalısın. 💪";
              return "Daha yolun başındayız, Antalya'yı hayal et ve motivasyonunu yüksek tut! 🌟";
          };

          return (
            <div className="min-h-screen print:bg-white text-slate-800 font-sans pb-24 relative bg-cover bg-center bg-fixed transition-all duration-1000" style={{ backgroundImage: bgImageUrl }}>
              <div className={`absolute inset-0 -z-10 print:hidden transition-all duration-1000 ${overlayClass}`}></div>
              
              {flightKey !== 0 && <div key={flightKey} className="airplane-flyby"><i className="fa-solid fa-plane text-6xl sm:text-8xl drop-shadow-xl text-white"></i></div>}

              {/* Üst Navigasyon & Atmosfer Paneli */}
              <div className={`border-b sticky top-0 z-40 print:hidden transition-colors duration-1000 shadow-lg ${isNightMode ? 'bg-slate-900/80 border-slate-700/50' : 'bg-white/10 backdrop-blur-xl border-white/20'}`}>
                <div className="max-w-7xl mx-auto px-4 py-3 flex flex-col sm:flex-row justify-between items-center gap-4">
                  <div className="flex items-center justify-between w-full sm:w-auto gap-4">
                      <div className="flex items-center gap-3">
                        <div className={`p-2.5 rounded-2xl text-white shadow-lg ${isNightMode ? 'bg-indigo-600' : 'bg-gradient-to-br from-cyan-400 to-blue-600'}`}>
                          <i className="fa-solid fa-umbrella-beach text-xl"></i>
                        </div>
                        <div>
                          <h1 className={`text-xl font-extrabold leading-tight tracking-tight drop-shadow-md ${isNightMode ? 'text-white' : 'text-white sm:text-slate-800'}`}>İhlas Pazarlama</h1>
                          <div className="flex items-center gap-2">
                            <p className={`text-xs font-bold flex items-center gap-2 uppercase tracking-widest drop-shadow-md ${isNightMode ? 'text-indigo-200' : 'text-cyan-100 sm:text-cyan-600'}`}>
                                Antalya Tatili 
                                {dbStatus === 'connected' && <span className="flex items-center gap-1 text-[9px] bg-emerald-500/80 text-white px-2 py-0.5 rounded-full"><span className="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span></span>}
                            </p>
                            {/* Admin Mode Toggle */}
                            <button onClick={() => isAdmin ? handleAdminLogout() : setShowAdminLogin(true)} className={`px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-wider flex items-center gap-1 transition-colors border ${isAdmin ? 'bg-amber-500/90 text-white border-amber-400 shadow-md' : (isNightMode ? 'bg-slate-800/80 text-slate-400 border-slate-600 hover:text-white' : 'bg-white/60 text-slate-500 border-slate-300 hover:text-slate-800')}`}>
                                <i className={`fa-solid ${isAdmin ? 'fa-unlock' : 'fa-lock'}`}></i> {isAdmin ? 'Yönetici Çıkış' : 'Admin'}
                            </button>
                          </div>
                        </div>
                      </div>
                      {/* Hava Durumu Widget (Güncel Veri) */}
                      <div className={`hidden md:flex flex-col items-end text-sm font-bold ${isNightMode ? 'text-slate-300' : 'text-white sm:text-slate-600'}`}>
                          <span><i className="fa-solid fa-location-dot"></i> Antalya</span>
                          <span className="text-xs font-medium">
                              {weather.temp !== null 
                                  ? `${weather.temp}°C ${weather.icon} ${weather.desc}` 
                                  : (isNightMode ? 'Yükleniyor...' : 'Yükleniyor...')}
                          </span>
                      </div>

                  <div className={`flex p-1.5 rounded-2xl backdrop-blur-md w-full sm:w-auto transition-colors ${isNightMode ? 'bg-black/40 border border-slate-700' : 'bg-black/20 sm:bg-white/50 border border-white/10 sm:border-white'}`}>
                    <button onClick={() => handleTabChange('dashboard')} className={`flex-1 sm:flex-none flex items-center justify-center gap-1.5 sm:gap-2 px-3 sm:px-6 py-2 sm:py-2.5 rounded-xl font-bold text-[11px] sm:text-sm transition-all duration-300 active:scale-95 ${activeTab === 'dashboard' ? (isNightMode ? 'bg-indigo-600 text-white' : 'bg-white text-cyan-700 shadow-md') : (isNightMode ? 'text-slate-300' : 'text-white sm:text-slate-600 hover:bg-white/20')}`}>
                      <i className="fa-solid fa-map-location-dot"></i> Ana Sayfa
                    </button>
                    <button onClick={() => handleTabChange('reports')} className={`flex-1 sm:flex-none flex items-center justify-center gap-1.5 sm:gap-2 px-3 sm:px-6 py-2 sm:py-2.5 rounded-xl font-bold text-[11px] sm:text-sm transition-all duration-300 active:scale-95 ${activeTab === 'reports' ? (isNightMode ? 'bg-indigo-600 text-white' : 'bg-white text-cyan-700 shadow-md') : (isNightMode ? 'text-slate-300' : 'text-white sm:text-slate-600 hover:bg-white/20')}`}>
                      <i className="fa-solid fa-plane-departure"></i> Raporlar
                    </button>
                    <button onClick={() => handleTabChange('archives')} className={`flex-1 sm:flex-none flex items-center justify-center gap-1.5 sm:gap-2 px-3 sm:px-6 py-2 sm:py-2.5 rounded-xl font-bold text-[11px] sm:text-sm transition-all duration-300 active:scale-95 ${activeTab === 'archives' ? (isNightMode ? 'bg-indigo-600 text-white' : 'bg-white text-cyan-700 shadow-md') : (isNightMode ? 'text-slate-300' : 'text-white sm:text-slate-600 hover:bg-white/20')}`}>
                      <i className="fa-solid fa-box-archive"></i> Arşiv
                    </button>
                  </div>
                </div>
              </div>

              <div className="p-4 md:p-8 animate-fade-in">
                {activeTab === 'dashboard' && (
                  <div className="max-w-7xl mx-auto print:hidden">
                    
                    {/* Hero Bölümü */}
                    <div className="flex flex-col lg:flex-row gap-6 mb-8">
                        <CountdownTimer />
                        <div className="flex-1 grid grid-cols-2 gap-4">
                            <div className={`rounded-3xl p-6 shadow-xl flex flex-col justify-center items-center text-center transition-transform hover:-translate-y-1 ${isNightMode ? 'bg-slate-800/90 border border-slate-700 text-slate-200' : 'bg-white/95 border border-slate-100'}`}>
                                <div className="w-12 h-12 bg-cyan-100 text-cyan-600 rounded-full flex items-center justify-center text-xl mb-2"><i className="fa-solid fa-users"></i></div>
                                <h4 className="text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Katılımcı Sayısı</h4>
                                <p className={`text-3xl sm:text-4xl font-black ${isNightMode ? 'text-white' : 'text-slate-800'}`}>{employees.length}</p>
                            </div>
                            <div className={`rounded-3xl p-6 shadow-xl flex flex-col justify-center items-center text-center transition-transform hover:-translate-y-1 relative overflow-hidden ${isNightMode ? 'bg-slate-800/90 border border-slate-700' : 'bg-white/95 border border-slate-100'}`}>
                                <i className="fa-solid fa-plane text-7xl text-emerald-500/5 absolute -right-2 -bottom-2 -rotate-45"></i>
                                <div className="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center text-xl mb-2 relative z-10"><i className="fa-solid fa-champagne-glasses"></i></div>
                                <h4 className="text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 relative z-10">Bileti Kapanlar</h4>
                                <p className="text-3xl sm:text-4xl font-black text-emerald-500 relative z-10">{totalWinners}</p>
                            </div>
                        </div>
                    </div>

                    {/* Arama ve Filtreleme */}
                    <div className={`mb-6 p-2 rounded-2xl flex flex-col md:flex-row items-center gap-3 shadow-lg transition-colors ${isNightMode ? 'bg-slate-800/90 border border-slate-700' : 'bg-white/90 backdrop-blur-md border border-white'}`}>
                        <div className="relative w-full md:w-1/3">
                            <i className="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-400"></i>
                            <input 
                                type="text" 
                                placeholder="Yolcu Ara..." 
                                value={searchTerm}
                                onChange={e=>setSearchTerm(e.target.value)}
                                className={`w-full pl-10 pr-4 py-3 rounded-xl outline-none font-medium text-sm transition-colors ${isNightMode ? 'bg-slate-900 text-white placeholder-slate-500 focus:ring-2 focus:ring-indigo-500' : 'bg-slate-50 focus:bg-white focus:ring-2 focus:ring-cyan-500 text-slate-700'}`}
                            />
                        </div>
                        <div className="flex-1 w-full overflow-x-auto flex items-center gap-2 pb-1 md:pb-0 custom-scrollbar">
                            <button onClick={()=>setFilterOffice('All')} className={`px-4 py-2 rounded-xl text-xs font-bold shrink-0 transition-colors ${filterOffice==='All' ? (isNightMode ? 'bg-indigo-600 text-white' : 'bg-cyan-600 text-white') : (isNightMode ? 'bg-slate-700 text-slate-300' : 'bg-slate-100 text-slate-600')}`}>Tüm Ofisler</button>
                            {uniqueOffices.map(o => (
                                <button key={o} onClick={()=>setFilterOffice(o)} className={`px-4 py-2 rounded-xl text-xs font-bold shrink-0 transition-colors ${filterOffice===o ? (isNightMode ? 'bg-indigo-600 text-white' : 'bg-cyan-600 text-white') : (isNightMode ? 'bg-slate-700 text-slate-300 hover:bg-slate-600' : 'bg-slate-100 text-slate-600 hover:bg-slate-200')}`}>{o}</button>
                            ))}
                        </div>
                    </div>

                    {/* Admin Ayarlar Paneli (SADECE ADMİN GÖREBİLİR) */}
                    {isAdmin && (
                        <div className={`mb-8 rounded-3xl shadow-xl overflow-hidden transition-all border-2 ${isNightMode ? 'bg-slate-800/90 border-amber-500/30' : 'bg-white/95 border-amber-400/40'}`}>
                            <button onClick={() => setShowSettings(!showSettings)} className="w-full flex items-center justify-between p-4 sm:p-5 text-left hover:bg-black/5 transition-colors">
                                <span className={`font-black text-base sm:text-lg flex items-center gap-3 ${isNightMode ? 'text-white' : 'text-slate-700'}`}>
                                    <span className={`p-1.5 rounded-lg bg-amber-500 text-white shadow-md`}><i className="fa-solid fa-sliders text-sm"></i></span> Yönetici Ayarları & Kampanya Kuralları
                                </span>
                                <i className={`fa-solid fa-chevron-down text-slate-400 transition-transform duration-300 ${showSettings ? 'rotate-180' : ''}`}></i>
                            </button>
                            
                            {showSettings && (
                                <div className="animate-slide-up">
                                    <div className={`p-5 pt-0 grid grid-cols-1 md:grid-cols-2 gap-6 ${isNightMode ? 'border-slate-700' : 'border-slate-100'}`}>
                                        <div className="space-y-4">
                                            <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-slate-500/30 pb-1.5">Hedef Tutarları</h4>
                                            <div className="flex gap-3">
                                                <div className="flex-1">
                                                    <label className="block text-[10px] font-bold text-slate-500 mb-1 ml-1">ESKİ PERSONEL</label>
                                                    <div className="relative">
                                                        <input type="text" inputMode="numeric" value={targetOld===0?'':formatInputNumber(targetOld)} onChange={e=>setTargetOld(parseInputNumber(e.target.value))} className={`w-full pl-3 pr-8 py-2 rounded-lg outline-none font-bold text-sm ${isNightMode?'bg-slate-900 text-white focus:ring-amber-500':'bg-slate-50 text-slate-700 focus:ring-amber-500 border border-slate-200'}`} />
                                                        <span className="absolute right-3 top-2 text-slate-400 font-bold text-sm">₺</span>
                                                    </div>
                                                </div>
                                                <div className="flex-1">
                                                    <label className="block text-[10px] font-bold text-slate-500 mb-1 ml-1">YENİ PERSONEL</label>
                                                    <div className="relative">
                                                        <input type="text" inputMode="numeric" value={targetNew===0?'':formatInputNumber(targetNew)} onChange={e=>setTargetNew(parseInputNumber(e.target.value))} className={`w-full pl-3 pr-8 py-2 rounded-lg outline-none font-bold text-sm ${isNightMode?'bg-slate-900 text-white focus:ring-amber-500':'bg-slate-50 text-slate-700 focus:ring-amber-500 border border-slate-200'}`} />
                                                        <span className="absolute right-3 top-2 text-slate-400 font-bold text-sm">₺</span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="pt-1">
                                                <label className="block text-[10px] font-bold text-amber-600 mb-1">YENİ PERSONEL MİLADI</label>
                                                <input type="date" value={cutoffDate} onChange={e=>setCutoffDate(e.target.value)} className={`w-full px-3 py-2 rounded-lg font-bold outline-none text-sm ${isNightMode?'bg-amber-900/30 text-amber-400 border border-amber-900/50':'bg-amber-50 text-amber-800 border border-amber-200'}`} />
                                            </div>
                                        </div>
                                        <div className="space-y-4">
                                            <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-slate-500/30 pb-1.5">Geçerli Aylar</h4>
                                            <div className="flex flex-wrap gap-1.5">
                                                {months.map(m => (
                                                    <span key={m.id} className={`px-2 py-1 rounded-md text-[10px] font-bold flex items-center gap-1.5 border ${isNightMode?'bg-indigo-900/30 text-indigo-300 border-indigo-700':'bg-cyan-50 text-cyan-700 border-cyan-100'}`}>
                                                    {m.name} <button onClick={()=>handleRemoveMonth(m.id)} className="hover:text-rose-500"><i className="fa-solid fa-circle-xmark"></i></button>
                                                    </span>
                                                ))}
                                            </div>
                                            <div className="flex gap-2">
                                                <input type="text" value={newMonthName} onChange={e=>setNewMonthName(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleAddMonth()} placeholder="Yeni ay ekle" className={`flex-1 px-3 py-2 rounded-lg outline-none text-sm font-medium ${isNightMode?'bg-slate-900 text-white':'bg-slate-50 text-slate-700 border border-slate-200'}`} />
                                                <button onClick={handleAddMonth} className={`text-white px-3 rounded-lg font-bold transition-colors ${isNightMode?'bg-amber-600 hover:bg-amber-700':'bg-amber-500 hover:bg-amber-600 shadow-md'}`}><i className="fa-solid fa-plus"></i></button>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    {/* Ayarlar Kaydet, Temizle & Arşivle Bölümü */}
                                    <div className={`p-5 mt-2 border-t flex flex-col lg:flex-row justify-between items-center gap-4 ${isNightMode ? 'bg-slate-900/50 border-slate-700' : 'bg-slate-50/50 border-slate-200'}`}>
                                        <div className="flex flex-col sm:flex-row w-full lg:w-auto gap-2">
                                            <button onClick={() => setIsDeletingAll(true)} className="text-xs font-bold text-rose-500 hover:text-rose-700 flex items-center justify-center gap-1.5 transition-colors p-2.5 rounded-lg bg-rose-500/10 hover:bg-rose-500/20 border border-rose-500/20">
                                                <i className="fa-solid fa-trash-can"></i> Tümünü Temizle
                                            </button>
                                            <button onClick={() => setIsArchiveModalOpen(true)} className="text-xs font-bold text-indigo-500 hover:text-indigo-700 flex items-center justify-center gap-1.5 transition-colors p-2.5 rounded-lg bg-indigo-500/10 hover:bg-indigo-500/20 border border-indigo-500/20">
                                                <i className="fa-solid fa-box-archive"></i> Verileri Arşivle
                                            </button>
                                        </div>
                                        <div className="flex items-center gap-3 w-full lg:w-auto">
                                            {settingsSaved && <span className="text-xs font-bold text-emerald-500 animate-fade-in flex items-center gap-1"><i className="fa-solid fa-circle-check"></i> Kaydedildi!</span>}
                                            <button onClick={handleSaveSettings} disabled={dbStatus !== 'connected'} className={`w-full sm:w-auto px-6 py-2.5 rounded-xl font-bold transition-all text-sm flex items-center justify-center gap-2 ${dbStatus === 'connected' ? (isNightMode?'bg-amber-600 hover:bg-amber-700 text-white':'bg-amber-500 text-white hover:bg-amber-600 shadow-md shadow-amber-500/30 active:scale-95') : 'bg-slate-600 text-slate-400 cursor-not-allowed'}`}>
                                                <i className="fa-solid fa-cloud-arrow-up"></i> Ayarları Kaydet
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* Tablolar ve Liderlik Podyumları */}
                    <div className="space-y-8">
                      {/* Eski Personel Bölümü */}
                      <div className={`rounded-[2rem] shadow-xl overflow-hidden ${isNightMode ? 'bg-slate-800 border border-slate-700' : 'bg-white/95 border border-slate-100'}`}>
                        <div className={`p-4 sm:p-5 text-white text-center relative overflow-hidden ${isNightMode ? 'bg-slate-900' : 'bg-gradient-to-r from-indigo-600 to-blue-600'}`}>
