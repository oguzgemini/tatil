<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İhlas Pazarlama - Antalya Tatili Takibi</title>
    
    <!-- Tailwind CSS (Tasarım için) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (İkonlar için) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- React ve ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (React JSX kodunu tarayıcının anlaması için çevirici) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Uçak Animasyonu için Özel CSS */
        @keyframes flightAnimation {
            0% {
                left: -20%;
                bottom: 10%;
                transform: rotate(15deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                left: 120%;
                bottom: 80%;
                transform: rotate(25deg) scale(1.5);
                opacity: 0;
            }
        }

        .airplane-flyby {
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            animation: flightAnimation 2.5s ease-in-out forwards;
            color: #0284c7;
            filter: drop-shadow(0 20px 13px rgba(0, 0, 0, 0.3));
        }

        /* Scrollbar Gizleme/İnceltme */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        
        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useMemo, useEffect } = React;

        // Firebase Başlatma
        const firebaseConfig = {
            apiKey: "AIzaSyCsowA7JoTC_maRfzojfXXdg75OM3HLCsI",
            authDomain: "tatil-6fcb9.firebaseapp.com",
            projectId: "tatil-6fcb9",
            storageBucket: "tatil-6fcb9.firebasestorage.app",
            messagingSenderId: "234528583159",
            appId: "1:234528583159:web:4b5dfe518bfa8669b252f2"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "tatil-6fcb9"; 

        const formatTL = (amount) => {
          return new Intl.NumberFormat('tr-TR', { maximumFractionDigits: 0 }).format(amount) + ' ₺';
        };

        const formatDate = (dateString) => {
          if (!dateString) return '-';
          const date = new Date(dateString);
          if (isNaN(date.getTime())) return '-';
          return date.toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        };

        function App() {
          const [user, setUser] = useState(null);
          const [dbStatus, setDbStatus] = useState('loading'); 
          const [employees, setEmployees] = useState([]); 

          const [activeTab, setActiveTab] = useState('dashboard');
          const [isFlying, setIsFlying] = useState(false);
          const [months, setMonths] = useState([
            { id: 'm1', name: 'Ocak' },
            { id: 'm2', name: 'Şubat' },
            { id: 'm3', name: 'Mart' }
          ]);
          const [newMonthName, setNewMonthName] = useState('');
          const [targetOld, setTargetOld] = useState(1200000);
          const [targetNew, setTargetNew] = useState(800000);
          const [cutoffDate, setCutoffDate] = useState('2026-01-01');

          const [formData, setFormData] = useState({ name: '', office: '', entryDate: '', sales: {}, returns: '' });
          const [editingId, setEditingId] = useState(null);
          const [deletingId, setDeletingId] = useState(null);
          const [formError, setFormError] = useState('');

          useEffect(() => {
            const initAuth = async () => {
              try {
                await signInAnonymously(auth);
              } catch(err) {
                console.error("Yetkilendirme Hatası", err);
                setDbStatus('error');
              }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, (u) => setUser(u));
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return; 
            setDbStatus('loading');
            const employeesRef = collection(db, 'artifacts', appId, 'public', 'data', 'employees');
            const q = query(employeesRef);
            
            const unsubscribe = onSnapshot(q, (snapshot) => {
              const data = [];
              snapshot.forEach(doc => {
                data.push({ id: doc.id, ...doc.data() });
              });
              setEmployees(data);
              setDbStatus('connected');
            }, (err) => {
              console.error("Veri çekme hatası:", err);
              setDbStatus('error');
            });
            return () => unsubscribe();
          }, [user]);

          const handleTabChange = (tabName) => {
            if (tabName === 'reports' && activeTab !== 'reports') {
              setIsFlying(true);
              setTimeout(() => setIsFlying(false), 2500); 
            }
            setActiveTab(tabName);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const handleAddMonth = () => {
            if (!newMonthName.trim()) return;
            const newId = 'm' + Date.now();
            setMonths([...months, { id: newId, name: newMonthName.trim() }]);
            setNewMonthName('');
          };

          const handleRemoveMonth = (idToRemove) => {
            setMonths(months.filter(m => m.id !== idToRemove));
          };

          const isNewEmployee = (dateStr) => {
            if (!dateStr || !cutoffDate) return false;
            const empDate = new Date(dateStr);
            const cutDate = new Date(cutoffDate);
            if (isNaN(empDate.getTime()) || isNaN(cutDate.getTime())) return false;
            return empDate >= cutDate;
          };

          const processData = (isNewType) => {
            return employees
              .filter(emp => isNewEmployee(emp.entryDate) === isNewType)
              .map(emp => {
                const totalSales = months.reduce((sum, m) => sum + (Number(emp.sales[m.id]) || 0), 0);
                const netRevenue = totalSales - (Number(emp.returns) || 0);
                const currentTarget = Number(isNewType ? targetNew : targetOld) || 0;
                const remaining = currentTarget - netRevenue;
                let percentage = currentTarget > 0 ? (netRevenue / currentTarget) * 100 : 0;
                if (isNaN(percentage) || percentage < 0) percentage = 0;

                return {
                  ...emp, target: currentTarget, netRevenue, remaining: remaining > 0 ? remaining : 0, percentage, isWinner: currentTarget > 0 && netRevenue >= currentTarget
                };
              }).sort((a, b) => b.percentage - a.percentage);
          };

          const processedOldData = useMemo(() => processData(false), [employees, targetOld, cutoffDate, months]);
          const processedNewData = useMemo(() => processData(true), [employees, targetNew, cutoffDate, months]);

          const handleInputChange = (e) => {
            const { name, value } = e.target;
            setFormData(prev => ({ ...prev, [name]: value }));
            if (formError) setFormError('');
          };

          const handleSalesChange = (monthId, value) => {
            setFormData(prev => ({
              ...prev,
              sales: { ...prev.sales, [monthId]: value }
            }));
          };

          const handleEdit = (employee) => {
            setFormData({
              name: employee.name, office: employee.office, entryDate: employee.entryDate || '',
              sales: { ...employee.sales }, returns: employee.returns || ''
            });
            setEditingId(employee.id);
            setFormError('');
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const handleCancelEdit = () => {
            setFormData({ name: '', office: '', entryDate: '', sales: {}, returns: '' });
            setEditingId(null);
            setFormError('');
          };

          const handleFormSubmit = async (e) => {
            e.preventDefault();
            if (!formData.name || !formData.office || !formData.entryDate) {
              setFormError("Lütfen personel adı, ofis ve işe giriş tarihi bilgilerini eksiksiz doldurunuz.");
              setTimeout(() => setFormError(''), 4000);
              return;
            }

            const cleanSales = {};
            months.forEach(m => { cleanSales[m.id] = Number(formData.sales[m.id]) || 0; });

            const payload = {
              office: formData.office.toUpperCase(), 
              name: formData.name.toUpperCase(), 
              entryDate: formData.entryDate,
              sales: cleanSales, 
              returns: Number(formData.returns) || 0,
            };

            const employeesRef = collection(db, 'artifacts', appId, 'public', 'data', 'employees');
            try {
              if (editingId) {
                await setDoc(doc(employeesRef, editingId.toString()), payload);
              } else {
                const newId = Date.now().toString();
                await setDoc(doc(employeesRef, newId), payload);
              }
            } catch (err) {
              console.error("Veri kaydetme hatası", err);
              setFormError("Veri kaydedilirken hata oluştu. Lütfen bağlantınızı kontrol edin.");
            }

            setEditingId(null);
            setFormData({ name: '', office: '', entryDate: '', sales: {}, returns: '' });
            setFormError('');
          };

          const handleDeleteClick = (id) => setDeletingId(id);

          const confirmDelete = async () => {
            if (deletingId) {
              const employeesRef = collection(db, 'artifacts', appId, 'public', 'data', 'employees');
              try {
                await deleteDoc(doc(employeesRef, deletingId.toString()));
              } catch (err) {
                console.error("Veri silme hatası", err);
              }
              setDeletingId(null);
            }
          };

          const totalWinners = processedOldData.filter(e => e.isWinner).length + processedNewData.filter(e => e.isWinner).length;

          const generateWhatsAppText = () => {
            let text = `🏆 *İHLAS PAZARLAMA - ANTALYA TATİLİ RAPORU* 🏆\n\n`;
            text += `📊 *Genel Özet*\n👥 Toplam Personel: ${employees.length}\n🎉 Toplam Kazanan: ${totalWinners}\n\n`;

            const oldWinners = processedOldData.filter(e => e.isWinner);
            if (oldWinners.length > 0) {
              text += `🌟 *ESKİ PERSONEL KAZANANLAR*\n`;
              oldWinners.forEach((e, i) => { text += `${i + 1}. ${e.name} (${e.office}) - %${e.percentage.toFixed(0)}\n`; });
              text += `\n`;
            }

            const newWinners = processedNewData.filter(e => e.isWinner);
            if (newWinners.length > 0) {
              text += `🌟 *YENİ PERSONEL KAZANANLAR*\n`;
              newWinners.forEach((e, i) => { text += `${i + 1}. ${e.name} (${e.office}) - %${e.percentage.toFixed(0)}\n`; });
              text += `\n`;
            }
            return text;
          };

          const handleWhatsAppShare = () => {
            const text = generateWhatsAppText();
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
          };

          const handlePrintPDF = () => window.print();

          return (
            <div 
              className="min-h-screen print:bg-white text-slate-800 font-sans pb-24 relative bg-cover bg-center bg-fixed"
              style={{ backgroundImage: "url('https://images.unsplash.com/photo-1506929562872-bb421503ef21?q=80&w=2068&auto=format&fit=crop')" }}
            >
              {/* Arka plan overlay */}
              <div className="absolute inset-0 bg-slate-50/80 backdrop-blur-md -z-10 print:hidden"></div>
              
              {isFlying && (
                <div className="airplane-flyby">
                  <i className="fa-solid fa-plane text-6xl sm:text-8xl text-blue-600"></i>
                </div>
              )}

              {/* Üst Navigasyon Mobil Uyumu */}
              <div className="bg-white/80 backdrop-blur-xl border-b border-slate-200 sticky top-0 z-40 print:hidden shadow-sm">
                <div className="max-w-7xl mx-auto px-4 md:px-8 py-3 sm:py-4 flex flex-col sm:flex-row justify-between items-center gap-3 sm:gap-4">
                  
                  {/* Logo ve Başlık */}
                  <div className="flex items-center justify-between w-full sm:w-auto gap-3">
                    <div className="flex items-center gap-3">
                        <div className="bg-gradient-to-br from-yellow-100 to-orange-100 p-2 sm:p-2.5 rounded-xl text-yellow-600 shadow-inner">
                          <i className="fa-solid fa-trophy text-lg sm:text-xl"></i>
                        </div>
                        <div>
                          <h1 className="text-lg sm:text-xl font-extrabold text-slate-900 leading-tight">İhlas Pazarlama</h1>
                          <p className="text-[10px] sm:text-xs font-medium text-slate-500 flex items-center gap-1 sm:gap-2">
                            Antalya Tatili 
                            {dbStatus === 'connected' && <span className="flex items-center gap-1 text-[9px] sm:text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold"><span className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span> Çevrimiçi</span>}
                            {dbStatus === 'loading' && <span className="flex items-center gap-1 text-[9px] sm:text-[10px] bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full font-bold"><i className="fa-solid fa-spinner fa-spin"></i> Bağlanıyor</span>}
                            {dbStatus === 'error' && <span className="flex items-center gap-1 text-[9px] sm:text-[10px] bg-red-100 text-red-700 px-2 py-0.5 rounded-full font-bold"><i className="fa-solid fa-circle-xmark"></i> Hata</span>}
                          </p>
                        </div>
                    </div>
                  </div>
                  
                  {/* Menü Butonları - Mobil Uyumlu */}
                  <div className="flex w-full sm:w-auto bg-slate-200/50 p-1 rounded-xl">
                    <button onClick={() => handleTabChange('dashboard')} className={`flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 sm:px-6 py-2.5 rounded-lg font-bold text-xs sm:text-sm transition-all duration-300 active:scale-95 ${activeTab === 'dashboard' ? 'bg-white text-blue-600 shadow-md ring-1 ring-black/5' : 'text-slate-600 hover:text-slate-900'}`}>
                      <i className="fa-solid fa-table-columns"></i> <span className="hidden xs:inline">Ana Sayfa</span>
                    </button>
                    <button onClick={() => handleTabChange('reports')} className={`flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 sm:px-6 py-2.5 rounded-lg font-bold text-xs sm:text-sm transition-all duration-300 active:scale-95 ${activeTab === 'reports' ? 'bg-white text-blue-600 shadow-md ring-1 ring-black/5' : 'text-slate-600 hover:text-slate-900'}`}>
                      <i className="fa-solid fa-plane-departure"></i> <span className="hidden xs:inline">Raporlar</span>
                    </button>
                  </div>
                </div>
              </div>

              <div className="p-3 sm:p-4 md:p-8">
                {activeTab === 'dashboard' && (
                  <div className="max-w-7xl mx-auto print:hidden">
                    
                    {/* Üst İstatistik Kartları (Mobil: 2 Sütun, Desktop: Flex) */}
                    <div className="grid grid-cols-2 md:flex md:flex-wrap gap-3 sm:gap-4 mb-6">
                      <div className="bg-white/90 backdrop-blur-sm px-4 sm:px-5 py-3 sm:py-4 rounded-2xl shadow-lg shadow-slate-200/50 border border-white/50 flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-4 min-w-[140px] sm:min-w-[200px] transition-transform hover:-translate-y-1 duration-300">
                        <div className="p-2.5 sm:p-3 bg-blue-50 text-blue-600 rounded-xl w-fit">
                          <i className="fa-solid fa-users text-lg sm:text-xl"></i>
                        </div>
                        <div>
                          <p className="text-[10px] sm:text-xs text-slate-500 font-bold uppercase tracking-wider mb-0.5">Toplam Personel</p>
                          <p className="text-xl sm:text-2xl font-black text-slate-800">{employees.length}</p>
                        </div>
                      </div>
                      <div className="bg-white/90 backdrop-blur-sm px-4 sm:px-5 py-3 sm:py-4 rounded-2xl shadow-lg shadow-green-200/30 border border-white/50 flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-4 min-w-[140px] sm:min-w-[200px] transition-transform hover:-translate-y-1 duration-300">
                        <div className="p-2.5 sm:p-3 bg-green-50 text-green-600 rounded-xl w-fit">
                          <i className="fa-solid fa-trophy text-lg sm:text-xl"></i>
                        </div>
                        <div>
                          <p className="text-[10px] sm:text-xs text-slate-500 font-bold uppercase tracking-wider mb-0.5">Toplam Kazanan</p>
                          <p className="text-xl sm:text-2xl font-black text-slate-800">{totalWinners}</p>
                        </div>
                      </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-4 sm:gap-6 mb-8">
                      {/* Sol Panel: Ayarlar */}
                      <div className="bg-white/95 backdrop-blur-sm p-4 sm:p-6 rounded-3xl shadow-xl shadow-slate-200/40 border border-white lg:col-span-1 flex flex-col gap-5">
                        
                        <div>
                          <h2 className="text-base sm:text-lg font-black text-slate-800 mb-4 flex items-center gap-2">
                            <div className="bg-blue-100 text-blue-600 p-1.5 rounded-lg"><i className="fa-solid fa-bullseye text-sm"></i></div> 
                            Kampanya Ayarları
                          </h2>
                          <div className="space-y-4">
                            <div>
                              <label className="block text-xs font-bold text-slate-500 mb-1.5 ml-1 uppercase tracking-wide">Eski Personel Hedefi</label>
                              <div className="relative">
                                <input type="number" value={targetOld === 0 ? '' : targetOld} onChange={(e) => setTargetOld(Number(e.target.value))} className="w-full pl-4 pr-10 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all font-bold text-sm text-slate-700" />
                                <span className="absolute right-4 top-2.5 text-slate-400 font-bold">₺</span>
                              </div>
                            </div>
                            <div>
                              <label className="block text-xs font-bold text-slate-500 mb-1.5 ml-1 uppercase tracking-wide">Yeni Personel Hedefi</label>
                              <div className="relative">
                                <input type="number" value={targetNew === 0 ? '' : targetNew} onChange={(e) => setTargetNew(Number(e.target.value))} className="w-full pl-4 pr-10 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all font-bold text-sm text-slate-700" />
                                <span className="absolute right-4 top-2.5 text-slate-400 font-bold">₺</span>
                              </div>
                            </div>
                            <div className="pt-4 border-t border-slate-100">
                              <label className="block text-xs font-bold text-orange-500 mb-1 flex items-center gap-1.5 uppercase tracking-wide">
                                <i className="fa-solid fa-calendar-days"></i> Yeni Personel Miladı
                              </label>
                              <p className="text-[10px] text-slate-400 mb-2 ml-1 leading-tight">Bu tarih ve sonrasında işe girenler otomatik "Yeni" sayılır.</p>
                              <input type="date" value={cutoffDate} onChange={(e) => setCutoffDate(e.target.value)} className="w-full px-4 py-2.5 bg-orange-50/50 border border-orange-100 rounded-xl focus:bg-white focus:ring-4 focus:ring-orange-500/20 focus:border-orange-400 outline-none transition-all font-bold text-sm text-orange-800" />
                            </div>
                          </div>
                        </div>

                        {/* Dinamik Aylar Yönetimi */}
                        <div className="pt-4 border-t border-slate-100">
                          <label className="block text-xs font-bold text-indigo-500 mb-3 flex items-center gap-1.5 uppercase tracking-wide">
                            <i className="fa-solid fa-calendar-check"></i> Aktif Aylar
                          </label>
                          <div className="flex flex-wrap gap-2 mb-4">
                            {months.map(m => (
                              <span key={m.id} className="bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-lg text-[11px] font-bold flex items-center gap-2 border border-indigo-100 shadow-sm">
                                {m.name}
                                <button type="button" onClick={() => handleRemoveMonth(m.id)} className="text-indigo-400 hover:text-red-500 hover:bg-red-50 bg-white rounded-full w-4 h-4 flex items-center justify-center transition-colors">
                                  <i className="fa-solid fa-xmark text-[10px]"></i>
                                </button>
                              </span>
                            ))}
                            {months.length === 0 && <span className="text-[10px] text-red-500 font-bold bg-red-50 px-2 py-1 rounded-lg">Lütfen en az bir ay ekleyin!</span>}
                          </div>
                          <div className="flex gap-2">
                            <input 
                              type="text" 
                              value={newMonthName} 
                              onChange={e => setNewMonthName(e.target.value)} 
                              onKeyPress={e => e.key === 'Enter' && handleAddMonth()}
                              placeholder="Örn: Nisan" 
                              className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-400 outline-none text-sm font-medium transition-all" 
                            />
                            <button onClick={handleAddMonth} className="bg-indigo-600 text-white px-4 py-2.5 rounded-xl hover:bg-indigo-700 font-bold shadow-lg shadow-indigo-600/30 active:scale-95 transition-all">
                              <i className="fa-solid fa-plus"></i>
                            </button>
                          </div>
                        </div>

                      </div>

                      {/* Sağ Panel: Form */}
                      <div className="bg-white/95 backdrop-blur-sm p-4 sm:p-6 rounded-3xl shadow-xl shadow-slate-200/40 border border-white lg:col-span-3 relative overflow-hidden transition-all duration-500">
                        {editingId && <div className="absolute top-0 left-0 w-full h-1.5 bg-blue-500 animate-pulse"></div>}
                        <h2 className={`text-base sm:text-lg font-black mb-5 flex items-center gap-2 ${editingId ? 'text-blue-600' : 'text-slate-800'}`}>
                          <div className={`p-1.5 rounded-lg ${editingId ? 'bg-blue-100' : 'bg-green-100 text-green-600'}`}>
                             {editingId ? <i className="fa-solid fa-pen-to-square text-sm"></i> : <i className="fa-solid fa-user-plus text-sm"></i>}
                          </div>
                          {editingId ? 'Personel Bilgilerini Düzenle' : 'Yeni Personel / Veri Girişi'}
                        </h2>
                        
                        {formError && (
                          <div className="mb-5 p-3 sm:p-4 bg-red-50 border border-red-100 text-red-600 rounded-xl flex items-center gap-3 text-xs sm:text-sm font-bold animate-pulse shadow-sm">
                            <i className="fa-solid fa-circle-exclamation text-lg shrink-0"></i> {formError}
                          </div>
                        )}

                        <form onSubmit={handleFormSubmit} className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-12 gap-3 sm:gap-4">
                          <div className="sm:col-span-2 md:col-span-4">
                            <label className="block text-[11px] font-bold text-slate-500 mb-1.5 ml-1 uppercase tracking-wide">Ad Soyad</label>
                            <input name="name" value={formData.name} onChange={handleInputChange} type="text" placeholder="Örn: Ahmet Yılmaz" className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none font-bold text-sm text-slate-800 transition-all" />
                          </div>
                          <div className="sm:col-span-1 md:col-span-4">
                            <label className="block text-[11px] font-bold text-slate-500 mb-1.5 ml-1 uppercase tracking-wide">Ofis</label>
                            <input name="office" value={formData.office} onChange={handleInputChange} type="text" placeholder="Örn: Yıldız Ofis" className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none font-bold text-sm text-slate-800 transition-all" />
                          </div>
                          <div className="sm:col-span-1 md:col-span-4">
                            <label className="block text-[11px] font-bold text-slate-500 mb-1.5 ml-1 uppercase tracking-wide flex items-center gap-1.5"><i className="fa-solid fa-calendar-days"></i> Giriş Tarihi</label>
                            <input type="date" name="entryDate" value={formData.entryDate} onChange={handleInputChange} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none font-bold text-sm text-slate-800 transition-all" />
                          </div>
                          
                          {/* Dinamik Satış Giriş Alanları */}
                          <div className="sm:col-span-2 md:col-span-12 mt-2 pt-4 border-t border-slate-100">
                             <label className="block text-[11px] font-bold text-slate-400 mb-3 ml-1 uppercase tracking-widest">Aylık Satış Girişleri (TL)</label>
                             <div className="grid grid-cols-2 md:grid-cols-4 gap-3 sm:gap-4">
                               {months.map(m => (
                                 <div key={m.id}>
                                   <label className="block text-[10px] sm:text-[11px] font-bold text-slate-600 mb-1 ml-1">{m.name} Satış</label>
                                   <input 
                                     type="number" 
                                     value={formData.sales[m.id] || ''} 
                                     onChange={(e) => handleSalesChange(m.id, e.target.value)} 
                                     placeholder="0" 
                                     className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none font-bold text-sm text-slate-700 transition-all" 
                                   />
                                 </div>
                               ))}
                               {months.length === 0 && <p className="text-xs text-slate-400 italic bg-slate-50 p-2 rounded-lg col-span-2">Ayları soldaki panelden ekleyin.</p>}
                             </div>
                          </div>

                          <div className="sm:col-span-2 md:col-span-12 border-t border-slate-100 pt-4 mt-2 flex flex-col sm:flex-row items-start sm:items-end justify-between gap-4">
                            <div className="w-full sm:w-1/3 md:w-1/4">
                              <label className="block text-[11px] font-bold text-red-500 mb-1.5 ml-1 uppercase tracking-wide">Toplam İade (TL)</label>
                              <input name="returns" value={formData.returns} onChange={handleInputChange} type="number" placeholder="0" className="w-full px-4 py-2.5 bg-red-50 border border-red-100 rounded-xl focus:bg-white focus:ring-4 focus:ring-red-500/20 focus:border-red-400 outline-none text-red-700 font-black text-sm transition-all" />
                            </div>
                            <div className="flex w-full sm:w-auto gap-2 mt-2 sm:mt-0">
                              {editingId && (
                                <button type="button" onClick={handleCancelEdit} className="flex-1 sm:flex-none bg-slate-100 hover:bg-slate-200 text-slate-700 px-5 sm:px-6 py-3 rounded-xl font-bold transition-all active:scale-95 flex items-center justify-center gap-2">
                                  <i className="fa-solid fa-xmark"></i> İptal
                                </button>
                              )}
                              <button type="submit" disabled={months.length === 0 || dbStatus === 'error'} className={`flex-1 sm:flex-none text-white px-5 sm:px-8 py-3 rounded-xl font-bold transition-all active:scale-95 flex items-center justify-center gap-2 shadow-lg ${(months.length === 0 || dbStatus === 'error') ? 'bg-slate-300 shadow-none cursor-not-allowed' : (editingId ? 'bg-blue-600 hover:bg-blue-700 shadow-blue-600/30' : 'bg-slate-900 hover:bg-slate-800 shadow-slate-900/30')}`}>
                                {editingId ? <i className="fa-solid fa-pen-to-square"></i> : <i className="fa-solid fa-check"></i>}
                                {editingId ? 'Güncelle' : 'Kaydet'}
                              </button>
                            </div>
                          </div>
                        </form>
                      </div>
                    </div>

                    {/* Tablolar (Mobil ve Desktop Tasarımları) */}
                    <div className="space-y-6 sm:space-y-8">
                      <EmployeeTable 
                        title="Eski Personeller" 
                        icon={<div className="bg-purple-100 text-purple-600 p-1.5 rounded-lg"><i className="fa-solid fa-briefcase text-sm"></i></div>}
                        data={processedOldData} months={months} onEdit={handleEdit} onDelete={handleDeleteClick}
                        badgeClass="bg-purple-50 text-purple-700 border-purple-100" typeLabel="Eski"
                      />
                      <EmployeeTable 
                        title="Yeni Personeller" 
                        icon={<div className="bg-orange-100 text-orange-600 p-1.5 rounded-lg"><i className="fa-solid fa-user-plus text-sm"></i></div>}
                        data={processedNewData} months={months} onEdit={handleEdit} onDelete={handleDeleteClick}
                        badgeClass="bg-orange-50 text-orange-700 border-orange-100" typeLabel="Yeni"
                      />
                    </div>
                  </div>
                )}

                {activeTab === 'reports' && (
                  <div className="max-w-4xl mx-auto">
                    <div className="flex flex-wrap justify-end gap-2 sm:gap-3 mb-6 print:hidden">
                      <button onClick={handleWhatsAppShare} className="flex-1 sm:flex-none bg-green-500 hover:bg-green-600 text-white px-4 sm:px-6 py-3 rounded-xl font-bold transition-all active:scale-95 shadow-lg shadow-green-500/30 flex items-center justify-center gap-2 text-sm">
                        <i className="fa-brands fa-whatsapp text-lg"></i> WhatsApp
                      </button>
                      <button onClick={handlePrintPDF} className="flex-1 sm:flex-none bg-blue-600 hover:bg-blue-700 text-white px-4 sm:px-6 py-3 rounded-xl font-bold transition-all active:scale-95 shadow-lg shadow-blue-600/30 flex items-center justify-center gap-2 text-sm">
                        <i className="fa-solid fa-print text-lg"></i> PDF / Yazdır
                      </button>
                    </div>

                    <div className="bg-white p-6 sm:p-10 md:p-14 rounded-3xl shadow-2xl shadow-slate-200/50 border border-white print:shadow-none print:border-none print:p-0">
                      <div className="text-center mb-8 sm:mb-12 pb-6 sm:pb-8 border-b-2 border-slate-100/60">
                        <div className="flex justify-center mb-4 sm:mb-6 text-yellow-500 drop-shadow-xl">
                          <i className="fa-solid fa-trophy text-5xl sm:text-6xl"></i>
                        </div>
                        <h1 className="text-2xl sm:text-4xl font-black text-slate-900 uppercase tracking-tight mb-2 sm:mb-3">İhlas Pazarlama</h1>
                        <h2 className="text-lg sm:text-2xl font-extrabold text-blue-600 uppercase tracking-widest">Antalya Tatili Raporu</h2>
                        <p className="text-slate-400 mt-3 sm:mt-4 text-xs sm:text-sm font-bold bg-slate-50 inline-block px-3 py-1 rounded-full">Tarih: {new Date().toLocaleDateString('tr-TR')}</p>
                      </div>

                      <div className="flex flex-col sm:flex-row justify-center gap-4 sm:gap-8 mb-10 sm:mb-14">
                        <div className="text-center px-6 sm:px-10 py-4 sm:py-5 bg-slate-50/80 rounded-2xl border border-slate-100 flex-1">
                          <p className="text-[10px] sm:text-xs font-bold text-slate-500 uppercase tracking-widest mb-1.5">Toplam Personel</p>
                          <p className="text-3xl sm:text-5xl font-black text-slate-800">{employees.length}</p>
                        </div>
                        <div className="text-center px-6 sm:px-10 py-4 sm:py-5 bg-gradient-to-b from-green-50 to-emerald-50 rounded-2xl border border-green-100 flex-1 shadow-inner">
                          <p className="text-[10px] sm:text-xs font-bold text-green-600 uppercase tracking-widest mb-1.5">Tatili Kazanan</p>
                          <p className="text-3xl sm:text-5xl font-black text-green-700">{totalWinners}</p>
                        </div>
                      </div>

                      <ReportListSection title="Eski Personel Kazananları" data={processedOldData.filter(e => e.isWinner)} target={targetOld} colorClass="text-purple-700 border-purple-200" bgClass="bg-purple-50" />
                      <div className="mt-8 sm:mt-12">
                        <ReportListSection title="Yeni Personel Kazananları" data={processedNewData.filter(e => e.isWinner)} target={targetNew} colorClass="text-orange-700 border-orange-200" bgClass="bg-orange-50" />
                      </div>

                      <div className="mt-12 sm:mt-20 pt-6 sm:pt-8 border-t-2 border-dashed border-slate-100 text-center">
                        <p className="text-xs sm:text-sm font-bold text-slate-400">Bu rapor sistem tarafından otomatik olarak oluşturulmuştur.</p>
                        <p className="text-xs sm:text-sm font-black text-slate-600 mt-1">Tüm kazanan çalışma arkadaşlarımızı tebrik ederiz! 🌴🌊</p>
                      </div>
                    </div>
                  </div>
                )}
              </div>

              {deletingId && (
                <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-50 backdrop-blur-sm print:hidden">
                  <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden animate-in fade-in zoom-in duration-200 border border-slate-100">
                    <div className="p-6 sm:p-8 text-center">
                      <div className="w-16 sm:w-20 h-16 sm:h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4 sm:mb-5 border border-red-100">
                        <i className="fa-solid fa-trash-can text-3xl sm:text-4xl text-red-500"></i>
                      </div>
                      <h3 className="text-lg sm:text-xl font-black text-slate-800 mb-2">Personeli Sil</h3>
                      <p className="text-slate-500 text-xs sm:text-sm font-medium">Bu personeli listeden çıkarmak istediğinize emin misiniz? Bu işlem geri alınamaz.</p>
                    </div>
                    <div className="p-4 sm:p-5 bg-slate-50 border-t border-slate-100 flex flex-col sm:flex-row justify-center gap-3">
                      <button onClick={() => setDeletingId(null)} className="w-full px-6 py-3 rounded-xl font-bold text-slate-600 bg-white border border-slate-200 hover:bg-slate-100 active:scale-95 transition-all text-sm">İptal Et</button>
                      <button onClick={confirmDelete} className="w-full px-6 py-3 rounded-xl font-bold bg-red-600 hover:bg-red-700 text-white shadow-lg shadow-red-600/30 active:scale-95 transition-all text-sm">Evet, Sil</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        // ANA SAYFA TABLOSU (Mobil Kart Görünümü Entegre Edildi)
        function EmployeeTable({ title, icon, data, months, onEdit, onDelete, badgeClass, typeLabel }) {
          return (
            <div className="bg-white/95 backdrop-blur-sm rounded-3xl shadow-xl shadow-slate-200/40 border border-white overflow-hidden print:hidden">
              <div className="p-4 sm:p-5 border-b border-slate-100 bg-white/50 flex items-center justify-between gap-2">
                <div className="flex items-center gap-3">
                  {icon} <h3 className="font-black text-slate-800 text-sm sm:text-base">{title}</h3>
                </div>
                <span className="text-[10px] sm:text-xs text-slate-500 font-black px-3 py-1 bg-slate-100 rounded-lg">{data.length} Kayıt</span>
              </div>
              
              {/* MOBİL GÖRÜNÜM (Kart Tasarımı) */}
              <div className="md:hidden flex flex-col gap-3 p-3 bg-slate-50/50">
                {data.length === 0 ? (
                  <div className="text-center py-8 text-slate-400 font-bold text-xs">Bu kategoride henüz kayıtlı personel bulunmuyor.</div>
                ) : data.map((emp) => (
                  <div key={emp.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden transition-all hover:shadow-md">
                    {emp.isWinner && <div className="absolute top-0 left-0 w-1.5 h-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.8)]"></div>}
                    
                    <div className="flex justify-between items-start mb-3">
                      <div className="pl-1">
                        <h4 className={`font-black text-sm mb-0.5 flex items-center gap-1.5 ${emp.isWinner ? 'text-green-700' : 'text-slate-800'}`}>
                          {emp.isWinner && <i className="fa-solid fa-trophy text-yellow-500 text-xs"></i>}
                          {emp.name}
                        </h4>
                        <p className="text-[10px] font-bold text-slate-500 flex items-center gap-1"><i className="fa-solid fa-location-dot"></i> {emp.office}</p>
                      </div>
                      <div className="text-right flex flex-col items-end gap-1">
                        {emp.isWinner ? (
                          <span className="inline-flex items-center justify-center gap-1 px-2.5 py-1 rounded-lg text-[9px] font-black bg-gradient-to-r from-green-500 to-emerald-600 text-white shadow-sm">
                            KAZANDI
                          </span>
                        ) : (
                          <span className="inline-flex items-center justify-center px-2.5 py-1 rounded-lg text-[9px] font-black bg-slate-100 text-slate-500 border border-slate-200">
                            KAZANAMADI
                          </span>
                        )}
                      </div>
                    </div>
                    
                    {/* Aylar (Mobil) */}
                    {months.length > 0 && (
                      <div className="flex flex-wrap gap-1.5 mb-3 bg-slate-50 p-2 rounded-xl border border-slate-100">
                        {months.map(m => (
                           <div key={m.id} className="text-[9px] px-1.5 py-0.5 rounded bg-white border border-slate-100">
                             <span className="text-slate-400">{m.name.substring(0,3)}:</span> <span className="font-bold text-slate-700">{formatTL(emp.sales[m.id]||0)}</span>
                           </div>
                        ))}
                        {emp.returns > 0 && (
                          <div className="text-[9px] px-1.5 py-0.5 rounded bg-red-50 border border-red-100 text-red-600">
                             <span className="font-bold">İade:</span> -{formatTL(emp.returns)}
                          </div>
                        )}
                      </div>
                    )}

                    <div className="grid grid-cols-3 gap-2 text-center bg-slate-50 p-2 rounded-xl mb-3 border border-slate-100">
                      <div>
                        <p className="text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">Hedef</p>
                        <p className="text-[11px] font-black text-slate-700">{formatTL(emp.target)}</p>
                      </div>
                      <div className="border-x border-slate-200">
                        <p className="text-[9px] font-bold text-blue-400 uppercase tracking-wider mb-0.5">Net Ciro</p>
                        <p className="text-[11px] font-black text-blue-600">{formatTL(emp.netRevenue)}</p>
                      </div>
                      <div>
                        <p className="text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">Kalan</p>
                        <p className="text-[11px] font-black text-slate-700">{formatTL(emp.remaining)}</p>
                      </div>
                    </div>

                    <div className="mb-3 px-1">
                      <div className="flex justify-between items-center mb-1.5">
                        <span className="text-[10px] font-bold text-slate-500">Başarı Oranı</span>
                        <span className={`text-[10px] font-black ${emp.percentage >= 100 ? 'text-green-600' : 'text-blue-600'}`}>% {emp.percentage.toFixed(1)}</span>
                      </div>
                      <div className="w-full bg-slate-100 rounded-full h-2 overflow-hidden shadow-inner">
                        <div className={`h-full rounded-full transition-all duration-500 ${emp.percentage >= 100 ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]' : emp.percentage < 30 ? 'bg-red-500' : 'bg-blue-500'}`} style={{ width: `${Math.min(emp.percentage, 100)}%` }}></div>
                      </div>
                    </div>

                    <div className="flex justify-end gap-2 pt-3 mt-1 border-t border-slate-100">
                      <button onClick={() => onEdit(emp)} className="flex items-center justify-center gap-1.5 px-3 py-1.5 bg-blue-50 text-blue-600 rounded-lg font-bold text-[10px] active:scale-95 transition-all"><i className="fa-solid fa-pen"></i> Düzenle</button>
                      <button onClick={() => onDelete(emp.id)} className="flex items-center justify-center gap-1.5 px-3 py-1.5 bg-red-50 text-red-600 rounded-lg font-bold text-[10px] active:scale-95 transition-all"><i className="fa-solid fa-trash"></i> Sil</button>
                    </div>
                  </div>
                ))}
              </div>

              {/* MASAÜSTÜ GÖRÜNÜM (Tablo Tasarımı) */}
              <div className="hidden md:block overflow-x-auto">
                <table className="w-full text-left whitespace-nowrap">
                  <thead className="text-[10px] text-slate-400 bg-slate-50 uppercase border-b border-slate-100">
                    <tr>
                      <th className="px-4 py-3 font-black tracking-wider">Personel / Ofis</th>
                      <th className="px-3 py-3 font-black tracking-wider text-center">Giriş / Kat.</th>
                      <th className="px-3 py-3 font-black tracking-wider text-right min-w-[120px]">Satışlar</th>
                      <th className="px-3 py-3 font-black tracking-wider text-right text-red-500">İade</th>
                      <th className="px-3 py-3 font-black tracking-wider text-right text-blue-500">Net Ciro</th>
                      <th className="px-3 py-3 font-black tracking-wider text-right">Hedef / Kalan</th>
                      <th className="px-4 py-3 font-black tracking-wider w-36">İlerleme</th>
                      <th className="px-3 py-3 font-black tracking-wider text-center">Durum</th>
                      <th className="px-4 py-3 font-black tracking-wider text-center">İşlem</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-50">
                    {data.length === 0 ? (
                      <tr><td colSpan="10" className="px-4 py-8 text-center font-bold text-slate-400 text-sm">Kayıt bulunmuyor.</td></tr>
                    ) : data.map((emp) => (
                      <tr key={emp.id} className={`transition-all duration-300 hover:bg-slate-50/50 ${emp.isWinner ? 'bg-green-50/20' : ''}`}>
                        <td className="px-4 py-2.5 relative">
                          {emp.isWinner && <div className="absolute top-0 left-0 w-1 h-full bg-green-500"></div>}
                          <div className={`font-black text-[13px] flex items-center gap-1.5 ${emp.isWinner ? 'text-green-700' : 'text-slate-800'}`}>
                            {emp.isWinner && <i className="fa-solid fa-trophy text-yellow-500 text-[10px] drop-shadow-sm"></i>} {emp.name}
                          </div>
                          <div className="text-[10px] font-bold text-slate-400 mt-0.5">{emp.office}</div>
                        </td>
                        <td className="px-3 py-2.5 text-center">
                          <div className="text-[11px] font-bold text-slate-600">{formatDate(emp.entryDate)}</div>
                          <span className={`inline-block mt-0.5 px-1.5 py-0.5 rounded text-[9px] font-black border uppercase ${badgeClass}`}>{typeLabel}</span>
                        </td>
                        <td className="px-3 py-2.5 text-right text-[10px] font-bold text-slate-500 space-y-0.5">
                          {months.length === 0 ? <span>-</span> : 
                            months.map(m => (
                              <div key={m.id} className="flex justify-end gap-2">
                                <span className="text-slate-300">{m.name.substring(0,3)}:</span> 
                                <span className="text-slate-700">{formatTL(emp.sales[m.id] || 0)}</span>
                              </div>
                            ))
                          }
                        </td>
                        <td className="px-3 py-2.5 text-right text-red-500 font-black text-[11px] bg-red-50/10">
                          {emp.returns > 0 ? `-${formatTL(emp.returns)}` : '-'}
                        </td>
                        <td className="px-3 py-2.5 text-right font-black text-blue-600 text-xs bg-blue-50/10">
                          {formatTL(emp.netRevenue)}
                        </td>
                        <td className="px-3 py-2.5 text-right">
                          <div className="text-[10px] font-bold text-slate-400 border-b border-slate-100 pb-0.5 mb-0.5">H: {formatTL(emp.target)}</div>
                          <div className="text-[11px] font-black text-slate-700">{formatTL(emp.remaining)}</div>
                        </td>
                        <td className="px-4 py-2.5">
                          <div className="flex justify-between items-center mb-1">
                            <span className={`text-[10px] font-black ${emp.percentage >= 100 ? 'text-green-600' : 'text-blue-600'}`}>% {emp.percentage.toFixed(1)}</span>
                          </div>
                          <div className="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden shadow-inner">
                            <div className={`h-full rounded-full transition-all duration-500 ${emp.percentage >= 100 ? 'bg-green-500 shadow-[0_0_5px_rgba(34,197,94,0.5)]' : emp.percentage < 30 ? 'bg-red-500' : 'bg-blue-500'}`} style={{ width: `${Math.min(emp.percentage, 100)}%` }}></div>
                          </div>
                        </td>
                        <td className="px-3 py-2.5 text-center">
                          {emp.isWinner ? (
                            <span className="inline-flex items-center justify-center gap-1 px-2.5 py-1 rounded-lg text-[9px] font-black bg-gradient-to-r from-green-500 to-emerald-600 text-white shadow-sm">
                              KAZANDI
                            </span>
                          ) : (
                            <span className="inline-flex items-center justify-center px-2.5 py-1 rounded-lg text-[9px] font-black bg-slate-100 text-slate-500 border border-slate-200">
                              BEKLİYOR
                            </span>
                          )}
                        </td>
                        <td className="px-4 py-2.5 text-center">
                          <div className="flex items-center justify-center gap-1.5">
                            <button onClick={() => onEdit(emp)} className="text-blue-400 hover:text-blue-600 hover:bg-blue-50 w-7 h-7 rounded-lg flex items-center justify-center transition-all active:scale-95" title="Düzenle">
                              <i className="fa-solid fa-pen text-xs"></i>
                            </button>
                            <button onClick={() => onDelete(emp.id)} className="text-red-400 hover:text-red-600 hover:bg-red-50 w-7 h-7 rounded-lg flex items-center justify-center transition-all active:scale-95" title="Sil">
                              <i className="fa-solid fa-trash text-xs"></i>
                            </button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          );
        }

        // RAPORLAR (Daha şık tablolar)
        function ReportListSection({ title, data, target, colorClass, bgClass }) {
          if (data.length === 0) return null;
          return (
            <div className="mb-6 sm:mb-8">
              <div className={`flex flex-col sm:flex-row sm:items-end justify-between gap-2 mb-3 border-b-2 pb-2 ${colorClass}`}>
                <h3 className="text-sm sm:text-base font-black uppercase tracking-wider">{title}</h3>
                <span className="text-[10px] sm:text-xs font-bold text-slate-500 bg-white px-2 py-0.5 rounded-md border border-slate-100 shadow-sm">Hedef: {formatTL(target)}</span>
              </div>
              <div className="rounded-xl sm:rounded-2xl overflow-x-auto border border-slate-100 shadow-sm">
                <table className="w-full text-xs text-left whitespace-nowrap">
                  <thead className={`font-black uppercase tracking-wider text-[10px] sm:text-[11px] ${bgClass} ${colorClass}`}>
                    <tr>
                      <th className="px-3 sm:px-5 py-2.5 sm:py-3">Sıra</th>
                      <th className="px-3 sm:px-5 py-2.5 sm:py-3">Personel Bilgisi</th>
                      <th className="px-3 sm:px-5 py-2.5 sm:py-3 text-right">Net Ciro</th>
                      <th className="px-3 sm:px-5 py-2.5 sm:py-3 text-right">Başarı</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-50 bg-white">
                    {data.map((emp, index) => (
                      <tr key={emp.id} className="hover:bg-slate-50 transition-colors">
                        <td className="px-3 sm:px-5 py-2 sm:py-3 font-bold text-slate-400">#{index + 1}</td>
                        <td className="px-3 sm:px-5 py-2 sm:py-3">
                           <div className="font-black text-slate-800 text-xs sm:text-sm">{emp.name}</div>
                           <div className="font-bold text-slate-400 text-[9px] sm:text-[10px]">{emp.office}</div>
                        </td>
                        <td className="px-3 sm:px-5 py-2 sm:py-3 text-right font-black text-green-600 text-xs sm:text-sm">{formatTL(emp.netRevenue)}</td>
                        <td className="px-3 sm:px-5 py-2 sm:py-3 text-right">
                           <span className="bg-green-100 text-green-700 px-2 py-1 rounded-lg font-black text-[10px] sm:text-xs shadow-sm">% {emp.percentage.toFixed(0)}</span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
